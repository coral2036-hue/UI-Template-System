<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Branch UI 프롬프트 생성기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'맑은 고딕',sans-serif;font-size:12px;background:#f0f2f5;overflow:hidden;height:100vh;display:flex;flex-direction:column;}
button,input,select,textarea{font-family:inherit;}
#api-banner{display:flex;align-items:center;gap:8px;padding:5px 16px;background:#1e2535;color:#fff;font-size:11px;flex-shrink:0;height:32px;}
#api-banner.ok{background:#1a3a2a;}
#api-banner.warn{background:#3a1a1a;}
#api-key-input{height:22px;border:1px solid rgba(255,255,255,.2);border-radius:3px;background:rgba(255,255,255,.1);color:#fff;font-size:11px;padding:0 8px;width:300px;font-family:monospace;outline:none;}
#api-key-input::placeholder{color:rgba(255,255,255,.4);}
input::placeholder,textarea::placeholder{font-size:12px;color:#888;}
.field-card input[type=text],.field-card input[type=number],.field-card input[type=password],.field-card textarea{line-height:1.4;}
.api-btn{height:22px;padding:0 10px;border:1px solid rgba(255,255,255,.25);border-radius:3px;cursor:pointer;font-size:10px;background:rgba(255,255,255,.1);color:#fff;}
.api-btn:hover{background:rgba(255,255,255,.2);}
#api-status{font-size:10px;color:rgba(255,255,255,.6);flex-shrink:0;}
#api-mode-badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:rgba(255,255,255,.15);white-space:nowrap;}
#app{display:flex;flex:1;overflow:hidden;}
#left{width:240px;flex-shrink:0;display:flex;flex-direction:column;background:#fff;border-right:1px solid #e2e5ea;}
#center{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:#f0f2f5;}
#right{width:360px;min-width:320px;max-width:42vw;flex-shrink:0;display:flex;flex-direction:column;background:#fff;border-left:1px solid #e2e5ea;}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #e2e5ea;flex-shrink:0;}
.tab-btn{flex:1;height:36px;border:none;border-bottom:2px solid transparent;background:transparent;color:#888;cursor:pointer;font-size:11px;font-family:inherit;font-weight:500;transition:all .15s;white-space:nowrap;}
.tab-btn:hover{color:#444;background:#f8f9fb;}
.tab-btn.active{background:#fff;border-bottom-color:#1659c5;color:#1659c5;font-weight:700;}
.tab-btn.active.green{border-bottom-color:#2e7d32;color:#2e7d32;}
.scroll-area{flex:1;overflow-y:auto;}
.scroll-area::-webkit-scrollbar{width:4px;}
.scroll-area::-webkit-scrollbar-thumb{background:#dde;border-radius:2px;}
.sec{margin-bottom:16px;}
.sec-title{font-size:10px;font-weight:700;color:#1659c5;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #eef0f5;padding-bottom:5px;margin-bottom:8px;}
.sec-hint{font-size:10px;color:#555;margin-bottom:8px;line-height:1.6;padding:5px 8px;background:#f5f7ff;border-left:3px solid #1659c5;border-radius:0 3px 3px 0;white-space:pre-line;}
.frow{display:flex;align-items:center;margin-bottom:7px;gap:6px;min-height:26px;}
.frow .lbl{font-size:11px;color:#555;flex-shrink:0;display:flex;align-items:center;gap:3px;}
input[type=text],input[type=number],input[type=password],select{height:32px;border:1px solid #dde1e9;border-radius:4px;font-size:12px;padding:0 10px;background:#fff;font-family:inherit;color:#333;outline:none;transition:border .12s;min-width:0;max-width:100%;}
input[type=text]:focus,input[type=number]:focus,select:focus{border-color:#1659c5;}
textarea{border:1px solid #dde1e9;border-radius:4px;font-size:12px;padding:7px 10px;background:#fff;font-family:inherit;color:#333;outline:none;resize:vertical;}
textarea:focus{border-color:#1659c5;}
.panel-wrap{border-bottom:1px solid #f0f2f5;}
.panel-hd{display:flex;align-items:center;padding:8px 14px;cursor:pointer;user-select:none;background:#fafbfd;transition:background .12s;}
.panel-hd:hover{background:#f0f4ff;}
.panel-hd .arrow{font-size:9px;color:#bbb;width:10px;flex-shrink:0;}
.panel-hd .ptitle{flex:1;font-size:11px;font-weight:600;color:#555;margin-left:4px;}
.panel-hd.open .ptitle{color:#1659c5;}
.panel-hd .badge{font-size:9px;background:#e8f0fe;color:#1659c5;border-radius:8px;padding:1px 6px;margin-right:4px;font-weight:600;}
.panel-body{padding:10px 14px;background:#fff;display:none;}
.panel-body.open{display:block;}
.btn-add{height:22px;padding:0 9px;border:1px solid #1659c5;background:#fff;color:#1659c5;border-radius:3px;cursor:pointer;font-size:10px;font-weight:600;}
.btn-add:hover{background:#e8f0fe;}
.btn-icon{border:none;background:transparent;cursor:pointer;font-size:11px;padding:0 3px;line-height:1;flex-shrink:0;color:#ccc;}
.btn-icon:hover{color:#e53935;}
.tree-g{background:#f0f4ff;border-bottom:1px solid #e0e8ff;display:flex;align-items:center;padding:7px 10px;gap:2px;cursor:pointer;}
.tree-g .name{flex:1;font-weight:700;color:#1659c5;font-size:11px;}
.tree-m{background:#f8f9fd;border-bottom:1px solid #eef0f8;display:flex;align-items:center;padding:6px 10px 6px 20px;gap:2px;cursor:pointer;}
.tree-m .name{flex:1;font-weight:600;color:#444;font-size:11px;}
.tree-s{background:#fff;border-bottom:1px solid #f5f6fa;display:flex;align-items:center;padding:5px 10px 5px 30px;cursor:pointer;gap:4px;transition:background .1s;}
.tree-s:hover{background:#f5f7ff;}
.tree-s .name{flex:1;font-size:11px;color:#555;}
.tree-s.active .name{color:#1659c5;font-weight:600;}
.tree-s.active{background:#e8f0fe;}
.tree-add{color:#1659c5;font-size:10px;cursor:pointer;padding:4px 10px;opacity:.7;}
.tree-add:hover{opacity:1;background:#f0f4ff;}
.field-card,.col-card{margin-bottom:6px;background:#fafbfd;border:1px solid #eaecf2;border-radius:4px;padding:8px 10px;overflow:hidden;}
.col-card > div:first-child,.field-card > div:first-child{flex-wrap:wrap;}
.col-card select,.col-card input,.field-card select,.field-card input,.field-card textarea{max-width:100%;}
.col-card .btn-icon,.field-card .btn-icon{flex-shrink:0;}
.field-card:hover,.col-card:hover{border-color:#c5d0e8;}
#preview-wrap{flex:1;overflow:hidden;position:relative;}
.prompt-subtab{display:flex;border-bottom:1px solid #e2e5ea;background:#fff;flex-shrink:0;align-items:center;}
.prompt-subtab button{height:34px;padding:0 16px;border:none;border-bottom:2px solid transparent;background:transparent;cursor:pointer;font-size:11px;font-family:inherit;color:#888;font-weight:500;}
.prompt-subtab button:hover{color:#444;}
.prompt-subtab button.active{border-bottom-color:#1659c5;color:#1659c5;font-weight:700;}
.prompt-subtab button.active.red{border-bottom-color:#e53935;color:#e53935;}
.color-row{display:flex;gap:4px;align-items:center;}
.color-row input[type=color]{width:26px;height:26px;border:1px solid #dde1e9;border-radius:3px;padding:2px;cursor:pointer;flex-shrink:0;}
.color-row input[type=text]{width:72px;font-family:monospace;flex-shrink:0;}
.color-row select{width:62px;font-size:10px;flex-shrink:0;}
.numsel{display:flex;align-items:center;gap:4px;}
.numsel select{width:60px;}
.numsel input{width:40px;text-align:center;}
.numsel span{font-size:10px;color:#aaa;}
.arr-btns{display:flex;flex-direction:column;flex-shrink:0;}
.arr-btns button{border:none;background:transparent;cursor:pointer;color:#bbb;font-size:9px;padding:1px 0;line-height:1;}
.arr-btns button:hover:not([disabled]){color:#555;}
.arr-btns button[disabled]{color:#e8e8e8;cursor:default;}
#right-header{padding:8px 14px;border-bottom:1px solid #e2e5ea;background:#f5f7ff;font-size:11px;font-weight:700;color:#1659c5;flex-shrink:0;display:flex;align-items:center;gap:6px;}
#ai-panel{width:300px;border-left:1px solid #e2e5ea;display:flex;flex-direction:column;background:#fff;flex-shrink:0;}
#ai-history{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
#ai-history::-webkit-scrollbar{width:3px;}
#ai-history::-webkit-scrollbar-thumb{background:#dde;border-radius:2px;}
.ai-msg{display:flex;flex-direction:column;gap:3px;}
.ai-bubble{max-width:92%;padding:8px 11px;border-radius:10px;font-size:11px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.ai-bubble.user{background:#1659c5;color:#fff;border-bottom-right-radius:3px;align-self:flex-end;}
.ai-bubble.ai{background:#f5f7fb;color:#333;border-bottom-left-radius:3px;border:1px solid #eaecf2;}
.ai-name{font-size:10px;color:#aaa;}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:3000;}
#modal-overlay.open{display:flex;}
#modal-box{background:#fff;border-radius:8px;padding:22px;width:320px;box-shadow:0 12px 40px rgba(0,0,0,.2);}
#modal-title{font-weight:700;font-size:13px;margin-bottom:12px;color:#222;}
#modal-input{width:100%;height:34px;border:1px solid #dde1e9;border-radius:4px;font-size:12px;padding:0 10px;outline:none;}
#modal-input:focus{border-color:#1659c5;}
#modal-btns{display:flex;justify-content:flex-end;gap:6px;margin-top:14px;}
#popup-overlay{position:absolute;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;z-index:100;}
#popup-overlay.open{display:flex;}
#popup-box{background:#fff;border-radius:8px;width:400px;box-shadow:0 12px 40px rgba(0,0,0,.2);}
#popup-hd{padding:14px 18px;border-bottom:1px solid #eee;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center;}
#popup-body{padding:16px 18px;}
#popup-ft{padding:10px 18px;border-top:1px solid #eee;display:flex;justify-content:flex-end;gap:8px;}
.chip{height:24px;padding:0 10px;border-radius:12px;cursor:pointer;font-size:10px;font-weight:500;border:1px solid #dde1e9;background:#fff;color:#666;transition:all .15s;}
.chip.active{font-weight:600;color:#fff;}
.state-card{background:#fff;border:1px solid #e2e5ea;border-radius:8px;overflow:hidden;flex:1 1 280px;min-width:260px;}
.state-card-hd{padding:9px 14px;display:flex;align-items:center;gap:8px;}
.state-card-body{padding:14px;}
.state-card-label{font-size:10px;color:#999;margin-bottom:7px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;}
.tip{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:#d0d8ee;color:#1659c5;font-size:9px;font-weight:700;cursor:help;flex-shrink:0;margin-left:2px;vertical-align:middle;}
.tip:hover{background:#1659c5;color:#fff;}
</style>
</head>
<body>
<div id="api-banner" class="warn">
  <span id="api-mode-badge">🔑 API 키 필요</span>
  <input id="api-key-input" type="password" placeholder="Anthropic API 키 입력 (sk-ant-...)" autocomplete="off"/>
  <button class="api-btn" onclick="saveApiKey()">저장</button>
  <button class="api-btn" onclick="toggleKeyVisibility()">👁</button>
  <button class="api-btn" onclick="clearApiKey()">삭제</button>
  <span id="api-status">키를 입력하면 AI 어시스턴트가 활성화됩니다</span>
  <span style="margin-left:auto;font-size:10px;opacity:.5;">⚠ localStorage에만 저장됩니다</span>
</div>
<div id="app">
  <div id="left">
    <div class="tab-bar" id="left-tabs"></div>
    <div id="left-content" style="flex:1;display:flex;flex-direction:column;overflow:hidden;"></div>
  </div>
  <div id="center">
    <div class="tab-bar" id="main-tabs"></div>
    <div id="main-content" style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;"></div>
  </div>
  <div id="right" style="display:none;">
    <div id="right-header">✎ 메뉴</div>
    <div class="scroll-area" id="right-content"></div>
  </div>
</div>
<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-title">이름 입력</div>
    <input id="modal-input" placeholder="이름을 입력하세요"/>
    <div id="modal-btns">
      <button onclick="closeModal()" style="height:30px;padding:0 14px;border:1px solid #dde1e9;background:#fff;color:#555;border-radius:4px;cursor:pointer;font-size:12px;">취소</button>
      <button onclick="confirmModal()" style="height:30px;padding:0 14px;border:none;background:#1659c5;color:#fff;border-radius:4px;cursor:pointer;font-size:12px;">확인</button>
    </div>
  </div>
</div>

function findMenu(id){for(const g of S.tree)for(const m of g.children)for(const s of m.children)if(s.id===id)return{menu:s,mid:m,top:g};return null;}
function getSelMenu(){return S.selId?findMenu(S.selId)?.menu:null;}
function escHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

// si: 공통 인라인 스타일 문자열 (세미콜론 포함)
const si = "height:32px;border:1px solid #dde1e9;border-radius:4px;font-size:12px;padding:0 10px;background:#fff;font-family:inherit;color:#333;outline:none;";

function tip(text){
  const esc=text.replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  return `<span class="tip" data-tip="${esc}">?</span>`;
}
function hint(text){return `<div class="sec-hint">${text}</div>`;}
function frow(label,content){
  return `<div class="frow"><div class="lbl" style="width:108px;">${label}</div><div style="display:flex;align-items:center;gap:4px;flex:1;flex-wrap:wrap;min-width:0;">${content}</div></div>`;
}
function secHtml(title,content){return `<div class="sec"><div class="sec-title">${title}</div>${content}</div>`;}

function colorPick(val,onChange){
  const fn=onChange.toString();
  const opts=CPRESETS.map(p=>`<option value="${p.v}" ${p.v===val?"selected":""}>${p.n}</option>`).join("");
  return `<div class="color-row"><input type="color" value="${val}" oninput="(${fn})(this.value)"><input type="text" value="${escHtml(val)}" oninput="(${fn})(this.value)" style="width:72px;font-family:monospace;"><select onchange="if(this.value)(${fn})(this.value)"><option value="">프리셋</option>${opts}</select></div>`;
}
function numSel(val,opts,onChange,unit="px"){
  const fn=onChange.toString();
  const optHtml=opts.map(o=>`<option value="${o}" ${o===val?"selected":""}>${o}</option>`).join("");
  return `<div class="numsel"><select onchange="if(this.value)(${fn})(this.value)"><option value="">목록</option>${optHtml}</select><input type="text" value="${escHtml(val)}" oninput="(${fn})(this.value)" style="width:40px;text-align:center;">${unit?`<span>${unit}</span>`:""}</div>`;
}

// ─── API 키 관리 ───────────────────────────────
const API_KEY_STORAGE='branch_ui_anthropic_key';
function detectMode(){const h=location.hostname;if(h.includes('claude.ai')||h.includes('anthropic.com'))return'artifact';if(h==='localhost'||h==='127.0.0.1')return'proxy';return'direct';}
function getApiKey(){return localStorage.getItem(API_KEY_STORAGE)||'';}
function saveApiKey(){const v=document.getElementById('api-key-input').value.trim();if(!v){alert('API 키를 입력해 주세요.');return;}if(!v.startsWith('sk-ant-')){alert('올바른 API 키 형식이 아닙니다.\n(sk-ant-... 로 시작해야 합니다)');return;}localStorage.setItem(API_KEY_STORAGE,v);updateApiBanner();}
function clearApiKey(){if(!confirm('저장된 API 키를 삭제할까요?'))return;localStorage.removeItem(API_KEY_STORAGE);document.getElementById('api-key-input').value='';updateApiBanner();}
function toggleKeyVisibility(){const i=document.getElementById('api-key-input');i.type=i.type==='password'?'text':'password';}
function updateApiBanner(){
  const banner=document.getElementById('api-banner'),status=document.getElementById('api-status'),badge=document.getElementById('api-mode-badge');
  const mode=detectMode(),key=getApiKey();
  if(mode==='artifact'){banner.className='ok';badge.textContent='✅ Claude.ai 자동 인증';status.textContent='API 키 없이 동작합니다';document.getElementById('api-key-input').style.display='none';document.querySelectorAll('.api-btn').forEach(b=>b.style.display='none');}
  else if(mode==='proxy'){banner.className='ok';badge.textContent='✅ 프록시 서버';status.textContent='localhost 프록시 사용 중';document.getElementById('api-key-input').style.display='none';document.querySelectorAll('.api-btn').forEach(b=>b.style.display='none');}
  else if(key){banner.className='ok';badge.textContent='✅ API 키 등록됨';status.textContent='직접 호출 모드 ('+key.slice(0,12)+'...)';document.getElementById('api-key-input').value=key;}
  else{banner.className='warn';badge.textContent='🔑 API 키 필요';status.textContent='키를 입력하면 AI 어시스턴트가 활성화됩니다';}
}
async function callClaude(body){
  const mode=detectMode();
  if(mode==='artifact'){const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return r.json();}
  if(mode==='proxy'){const r=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return r.json();}
  const key=getApiKey();if(!key)throw new Error('API 키가 설정되지 않았습니다.');
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},body:JSON.stringify(body)});return r.json();
}

function buildInteractionSection(){
  const ix=S.ix,s=S.style;
  if(!ix.enabled)return"";
  const lines=["\n▣ 인터랙션 명세\n─────────────────────────────────────","[버튼 - 강조(solid)]","  hover  : filter "+ix.btnSolidHover+" / transition 150ms","  active : transform "+ix.btnSolidActive,"[버튼 - 라인(line)]","  hover  : background "+ix.btnLineHover+" / transition 150ms","  active : transform scale(0.97)"];
  if(ix.rowHover){lines.push("[그리드 행]");lines.push("  hover  : background "+s.rowHoverBg+" / cursor pointer");if(ix.rowClick==="popup")lines.push("  click  : 상세 팝업 오픈");else if(ix.rowClick==="slide")lines.push("  click  : 우측 슬라이드 패널");else if(ix.rowClick==="expand")lines.push("  click  : 행 인라인 확장");}
  if(ix.fieldFocus){lines.push("[입력 필드]");lines.push("  focus  : border 2px solid "+s.fieldFocusBorder);}
  if(ix.fieldError){lines.push("[입력 필드 - 에러]");lines.push("  border : 1px solid "+s.fieldErrorBorder);lines.push("  message: \""+ix.fieldErrorMsg+"\"");}
  lines.push("※ transition 기본값: all 0.15s ease");
  if(ix.outputRequest&&(ix.outputStates||[]).length>0){
    const SL={default:"기본 (Default) — 초기 진입 상태",hover:"호버 (Hover) — 버튼/행 마우스 오버",click:"클릭/활성 (Active) — 버튼 눌림 + 행 클릭",error:"에러 (Error) — 필수값 미입력 에러",focus:"포커스 (Focus) — 필드 선택 시 테두리 강조",disabled:"비활성 (Disabled) — 버튼·필드 disabled"};
    const fmtLabel=ix.outputFormat==="react"?"React 컴포넌트":ix.outputFormat==="html"?"HTML+CSS":"Figma 프레임";
    lines.push("\n▣ 산출물 요청\n─────────────────────────────────────");
    lines.push("출력 형식: "+fmtLabel);
    lines.push("아래 "+ix.outputStates.length+"가지 상태를 각각 독립된 화면으로 생성해 주세요.\n");
    ix.outputStates.forEach((sid,idx)=>{const label=SL[sid];if(!label)return;lines.push("["+(idx+1)+"] "+label);lines.push("");});
    if(ix.outputFormat==="react")lines.push("구현: 단일 파일, 상단 탭으로 상태 전환");
    else if(ix.outputFormat==="html")lines.push("구현: .state-hover 등 CSS 클래스 분리");
    else lines.push("구현: 각 상태를 별도 프레임으로 생성");
  }
  return lines.join("\n");
}

||[]).map(it=>it.label+(it.highlight?"(강조)":"")).join(" / "):null,(menu.notes||[]).length>0?"\n▣ 안내문구\n"+menu.notes.map(n=>"  • "+n).join("\n"):null,buildInteractionSection(),"\n▣ 금지사항\n• 토큰 외 신규 색상/스타일 생성 금지 / spacing 임의변경 금지"];

// ─── 메뉴 트리 ─────────────────────────────────
function renderTree(){
  let h=`<div style="flex:1;overflow:auto;">`;
  for(const g of S.tree){
    h+=`<div class="tree-g" data-gid="${g.id}"><span style="font-size:9px;color:#1659c5;width:10px;">${g.open?"▼":"▶"}</span><span class="name">${escHtml(g.name)}</span><button class="btn-icon" data-action="aM" data-gid="${g.id}" style="color:#1659c5;">+</button><button class="btn-icon" data-action="rG" data-gid="${g.id}">✎</button><button class="btn-icon" data-action="dG" data-gid="${g.id}">✕</button></div>`;
    if(g.open){
      for(const mid of g.children){
        h+=`<div class="tree-m" data-mid="${mid.id}" data-gid="${g.id}"><span style="font-size:9px;color:#999;width:10px;">${mid.open?"▼":"▶"}</span><span class="name">${escHtml(mid.name)}</span><button class="btn-icon" data-action="aS" data-gid="${g.id}" data-mid="${mid.id}" style="color:#1659c5;">+</button><button class="btn-icon" data-action="rM" data-mid="${mid.id}">✎</button><button class="btn-icon" data-action="dM" data-gid="${g.id}" data-mid="${mid.id}">✕</button></div>`;
        if(mid.open){
          for(const sub of mid.children){
            h+=`<div class="tree-s ${S.selId===sub.id?"active":""}" data-sid="${sub.id}" data-gid="${g.id}" data-mid="${mid.id}"><span class="name">${escHtml(sub.name)}</span><button class="btn-icon" data-action="rS" data-sid="${sub.id}">✎</button><button class="btn-icon" data-action="dS" data-gid="${g.id}" data-mid="${mid.id}" data-sid="${sub.id}">✕</button></div>`;
          }
          h+=`<div class="tree-add" style="padding-left:30px;" data-action="aS" data-gid="${g.id}" data-mid="${mid.id}">+ 소메뉴 추가</div>`;
        }
      }
      h+=`<div class="tree-add" style="padding-left:20px;" data-action="aM" data-gid="${g.id}">+ 중메뉴 추가</div>`;
    }
  }
  h+=`<div style="padding:10px;"><button onclick="openModal('aG',null,null,null,'대메뉴 추가')" style="width:100%;height:30px;border:1px dashed #1659c5;background:#f0f7ff;color:#1659c5;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;">+ 대메뉴 추가</button></div></div>`;
  return h;
}

function attachTreeEvents(){
  document.querySelectorAll(".tree-g").forEach(el=>{el.addEventListener("click",e=>{if(e.target.closest("button"))return;const g=S.tree.find(g=>g.id===el.dataset.gid);if(g){g.open=!g.open;renderLeftContent();}});});
  document.querySelectorAll(".tree-m").forEach(el=>{el.addEventListener("click",e=>{if(e.target.closest("button"))return;for(const g of S.tree)for(const m of g.children)if(m.id===el.dataset.mid){m.open=!m.open;renderLeftContent();return;}});});
  document.querySelectorAll(".tree-s").forEach(el=>{el.addEventListener("click",e=>{if(e.target.closest("button"))return;S.selId=el.dataset.sid;renderAll();});});
  document.querySelectorAll("[data-action]").forEach(btn=>{btn.addEventListener("click",e=>{e.stopPropagation();const{action,gid,mid,sid}=btn.dataset;if(action==="aG")openModal("aG",null,null,null,"대메뉴 추가");else if(action==="aM")openModal("aM",gid,null,null,"중메뉴 추가");else if(action==="aS")openModal("aS",gid,mid,null,"소메뉴 추가");else if(action==="rG")openModal("rG",gid,null,null,"이름 변경");else if(action==="rM")openModal("rM",null,mid,null,"이름 변경");else if(action==="rS")openModal("rS",null,null,sid,"이름 변경");else if(action==="dG"){S.tree=S.tree.filter(g=>g.id!==gid);renderAll();}else if(action==="dM"){for(const g of S.tree)if(g.id===gid){g.children=g.children.filter(m=>m.id!==mid);break;}renderAll();}else if(action==="dS"){for(const g of S.tree)for(const m of g.children)if(m.id===mid){m.children=m.children.filter(s=>s.id!==sid);break;}if(S.selId===sid)S.selId=null;renderAll();}});});
}

// 모달
let _mc={};
function openModal(type,gid,mid,sid,title){_mc={type,gid,mid,sid};document.getElementById("modal-title").textContent=title;document.getElementById("modal-input").value="";document.getElementById("modal-overlay").classList.add("open");setTimeout(()=>document.getElementById("modal-input").focus(),50);}
function closeModal(){document.getElementById("modal-overlay").classList.remove("open");}
function confirmModal(){
  const val=document.getElementById("modal-input").value.trim();if(!val)return;
  const{type,gid,mid,sid}=_mc;
  if(type==="aG"){S.tree.push({id:uid(),name:val,open:true,children:[]});}
  else if(type==="aM"){for(const g of S.tree)if(g.id===gid){g.children.push({id:uid(),name:val,open:true,children:[]});break;}}
  else if(type==="aS"){const ns=mkMenu({id:uid(),name:val,tabLabel:val});for(const g of S.tree)for(const m of g.children)if(m.id===mid){m.children.push(ns);S.selId=ns.id;break;}}
  else if(type==="rG"){for(const g of S.tree)if(g.id===gid){g.name=val;break;}}
  else if(type==="rM"){for(const g of S.tree)for(const m of g.children)if(m.id===mid){m.name=val;break;}}
  else if(type==="rS"){for(const g of S.tree)for(const m of g.children)for(const s of m.children)if(s.id===sid){s.name=val;break;}}
  closeModal();renderAll();
}
document.getElementById("modal-input").addEventListener("keydown",e=>{if(e.key==="Enter")confirmModal();if(e.key==="Escape")closeModal();});

      ${f.component==="Select"?`<div style="margin-top:8px;padding-top:8px;border-top:1px dashed #eef0f5;">

        <div style="display:flex;flex-direction:column;gap:3px;">${(f.options||[]).map((opt,oi)=>`<div style="display:flex;align-items:center;gap:4px;"><input type="text" value="${escHtml(opt.label)}" placeholder="표시명" style="${si}flex:1;" onblur="updateFieldOption(${i},${oi},'label',this.value)"><input type="text" value="${escHtml(opt.value||"")}" placeholder="값(코드)" style="${si}width:60px;" onblur="updateFieldOption(${i},${oi},'value',this.value)"><button class="btn-icon" style="font-size:13px;" onclick="deleteFieldOption(${i},${oi})">✕</button></div>`).join("")}</div>
      </div>`:""}

  gridBody+=`<div style="margin-bottom:10px;padding:8px 10px;background:#f5f7ff;border:1px solid #dde4f5;border-radius:4px;">
    <div style="display:flex;gap:14px;align-items:center;font-size:11px;">
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;color:#444;"><input type="checkbox" ${pg.show!==false?"checked":""} onchange="updatePagination('show',this.checked);renderRightOnly();">페이지네이션${tip("그리드 하단 페이지 번호 표시")}</label>
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;color:#444;"><input type="checkbox" ${menu.gridScrollable?"checked":""} onchange="updateMenuField('gridScrollable',this.checked);">세로스크롤${tip("그리드 높이 고정 + 세로 스크롤\n헤더가 고정되며 본문만 스크롤")}</label>
    </div>
  </div>`;
  (menu.grid||[]).forEach((col,i)=>{
    const aOpts=[{v:"left",l:"좌"},{v:"center",l:"중"},{v:"right",l:"우"}].map(a=>`<option value="${a.v}" ${col.align===a.v?"selected":""}>${a.l}</option>`).join("");
    const tOpts=GRID_TYPES.map(t=>`<option value="${t}" ${col.type===t?"selected":""}>${t}</option>`).join("");
    gridBody+=`<div class="col-card">
      <div style="display:flex;align-items:center;gap:4px;margin-bottom:5px;flex-wrap:wrap;">
        <div class="arr-btns"><button onclick="moveCol(${i},-1)" ${i===0?"disabled":""}>▲</button><button onclick="moveCol(${i},1)" ${i===(menu.grid.length-1)?"disabled":""}>▼</button></div>
        <input type="text" value="${escHtml(col.name)}" style="${si}flex:1;font-weight:600;min-width:0;" onblur="updateCol(${i},'name',this.value)" placeholder="컬럼명">
        <select style="${si}width:42px;" onchange="updateCol(${i},'align',this.value)" title="${TIPS.gridAlign}">${aOpts}</select>
        <select style="${si}width:80px;font-size:10px;" onchange="updateCol(${i},'type',this.value)" title="${TIPS.gridType}">${tOpts}</select>
        <input type="text" value="${escHtml(col.width||"")}" style="${si}width:36px;text-align:center;" onblur="updateCol(${i},'width',this.value)">
        <button class="btn-icon" onclick="deleteCol(${i})" style="font-size:14px;">✕</button>
      </div>
      <div style="display:flex;gap:12px;padding-left:16px;">
        <label style="display:flex;align-items:center;gap:3px;cursor:pointer;font-size:10px;color:#666;">${tip(TIPS.checkbox)}<input type="checkbox" ${col.checkbox?"checked":""} onchange="updateCol(${i},'checkbox',this.checked)">체크</label>
        <label style="display:flex;align-items:center;gap:3px;cursor:pointer;font-size:10px;color:#1659c5;font-weight:600;">${tip(TIPS.flex)}<input type="checkbox" ${col.flex?"checked":""} onchange="updateCol(${i},'flex',this.checked)">flex</label>
        <label style="display:flex;align-items:center;gap:3px;cursor:pointer;font-size:10px;color:#888;">${tip(TIPS.hidden)}<input type="checkbox" ${col.hidden?"checked":""} onchange="updateCol(${i},'hidden',this.checked)">숨김</label>
      </div>
    </div>`;
  });

  // 버튼
  let btnsBody=(menu.buttons||[]).map((b,i)=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap;">
    <input type="text" value="${escHtml(b.label)}" style="${si}width:80px;" onblur="updateBtn(${i},'label',this.value)">
    <select style="${si}width:60px;" onchange="updateBtn(${i},'type',this.value)"><option value="solid" ${b.type==="solid"?"selected":""}>강조</option><option value="line" ${b.type==="line"?"selected":""}>라인</option></select>
    <div style="height:26px;padding:0 12px;display:flex;align-items:center;border-radius:3px;font-size:11px;background:${b.type==="solid"?"#1659c5":"#fff"};color:${b.type==="solid"?"#fff":"#1659c5"};border:1px solid #1659c5;flex-shrink:0;font-weight:${b.type==="solid"?600:400};">${escHtml(b.label)}</div>
    <button class="btn-icon" style="margin-left:auto;font-size:14px;" onclick="deleteBtn(${i})">✕</button>
  </div>`).join("");

  // pg 우측 버튼
  const pgBtns=menu.pgRightButtons||[];
  let pgBtnsBody=pgBtns.length===0?`<div style="color:#bbb;text-align:center;padding:6px 0;font-size:11px;">없으면 비워두세요</div>`:
    pgBtns.map((b,i)=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap;">
      <input type="text" value="${escHtml(b.label)}" style="${si}flex:1;" onblur="(()=>{const m=getSelMenu();if(m){m.pgRightButtons[${i}].label=this.value;renderCenter();}})()">
      <select style="${si}width:60px;" onchange="(()=>{const m=getSelMenu();if(m){m.pgRightButtons[${i}].type=this.value;renderCenter();}})()"><option value="line" ${b.type==="line"?"selected":""}>라인</option><option value="solid" ${b.type==="solid"?"selected":""}>강조</option></select>
      <button class="btn-icon" style="font-size:14px;" onclick="(()=>{const m=getSelMenu();if(m){m.pgRightButtons=m.pgRightButtons.filter((_,xi)=>xi!==${i});renderAll();}})()">✕</button>
    </div>`).join("");

  // 안내문구
  let notesBody=(menu.notes||[]).length===0?`<div style="color:#bbb;text-align:center;padding:10px 0;font-size:11px;">그리드 하단 안내 텍스트</div>`:
    (menu.notes||[]).map((n,i)=>`<div style="display:flex;align-items:center;gap:5px;margin-bottom:5px;"><span style="color:#1659c5;font-size:12px;flex-shrink:0;">•</span><input type="text" value="${escHtml(n)}" style="${si}flex:1;" onblur="updateNote(${i},this.value)"><button class="btn-icon" style="font-size:14px;" onclick="deleteNote(${i})">✕</button></div>`).join("");

  return panel("basic","기본 정보","","",basicBody)+
    panel("banner","알림 배너",menu.banner?.show?"ON":"","",bannerBody)+
    panel("fields","입력 필드",(menu.fields||[]).length>0?(menu.fields||[]).length+"개":"",AB("추가","addField()"),fieldsBody)+
    panel("grid","그리드 컬럼",(menu.grid||[]).length+"컬럼",AB("추가","addCol()"),gridBody)+
    panel("buttons","버튼",menu.buttons.length+"개",AB("추가","addBtn()"),btnsBody)+
    panel("pgbtns","페이지네이션 우측 버튼",pgBtns.length>0?pgBtns.length+"개":"",AB("추가","addPgBtn()"),pgBtnsBody)+
    panel("notes","안내문구",(menu.notes||[]).length>0?(menu.notes||[]).length+"개":"",AB("추가","addNote()"),notesBody);
}

function togglePanel(id,hd){
  const body=document.getElementById("panel-"+id);if(!body)return;
  const open=body.classList.toggle("open");
  hd.classList.toggle("open",open);
  hd.querySelector(".arrow").textContent=open?"▼":"▶";
  hd.querySelector(".ptitle").style.color=open?"#1659c5":"#555";
}

// 메뉴 데이터 업데이트 함수들
function updateMenuField(k,v){const m=getSelMenu();if(!m)return;m[k]=v;renderCenter();}
function updateMenuBanner(k,v){const m=getSelMenu();if(!m)return;m.banner={...(m.banner||{})};m.banner[k]=v;renderCenter();}
function updatePagination(k,v){const m=getSelMenu();if(!m)return;m.pagination={...(m.pagination||{show:true,pageSize:10,pageSizeOptions:[10,20,50]})};m.pagination[k]=v;renderCenter();}
function addField(){const m=getSelMenu();if(!m)return;m.fields=[...(m.fields||[]),{label:"항목명",component:"Input",required:false,width:"180",placeholder:"",readonly:false,colspan:1,options:[]}];renderAll();}
function updateField(i,k,v){const m=getSelMenu();if(!m)return;m.fields=m.fields.map((f,fi)=>fi===i?{...f,[k]:v}:f);if(k==="component"||k==="required"||k==="colspan"){renderRightOnly();renderCenter();}else renderCenter();}
function deleteField(i){const m=getSelMenu();if(!m)return;m.fields=m.fields.filter((_,fi)=>fi!==i);renderAll();}
function moveField(i,d){const m=getSelMenu();if(!m)return;const a=[...m.fields];const j=i+d;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];m.fields=a;renderAll();}
function addFieldOption(fi){const m=getSelMenu();if(!m)return;m.fields[fi].options=[...(m.fields[fi].options||[]),{label:"항목",value:""}];renderRightOnly();}
function updateFieldOption(fi,oi,k,v){const m=getSelMenu();if(!m)return;const o=[...(m.fields[fi].options||[])];o[oi]={...o[oi],[k]:v};m.fields[fi].options=o;renderCenter();}
function deleteFieldOption(fi,oi){const m=getSelMenu();if(!m)return;m.fields[fi].options=m.fields[fi].options.filter((_,i)=>i!==oi);renderRightOnly();}
function addCol(){const m=getSelMenu();if(!m)return;m.grid=[...(m.grid||[]),{name:"컬럼",align:"left",width:"100",checkbox:false,type:"text",hidden:false,flex:false}];renderAll();}
function updateCol(i,k,v){const m=getSelMenu();if(!m)return;m.grid=m.grid.map((c,ci)=>ci===i?{...c,[k]:v}:c);if(k==="align"||k==="type"||k==="checkbox"||k==="flex"||k==="hidden"){renderRightOnly();renderCenter();}else renderCenter();}
function deleteCol(i){const m=getSelMenu();if(!m)return;m.grid=m.grid.filter((_,ci)=>ci!==i);renderAll();}
function moveCol(i,d){const m=getSelMenu();if(!m)return;const a=[...m.grid];const j=i+d;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];m.grid=a;renderAll();}
function addBtn(){const m=getSelMenu();if(!m)return;m.buttons=[...m.buttons,{label:"버튼",type:"line"}];renderAll();}
function updateBtn(i,k,v){const m=getSelMenu();if(!m)return;m.buttons=m.buttons.map((b,bi)=>bi===i?{...b,[k]:v}:b);if(k==="type"){renderRightOnly();}renderCenter();}
function deleteBtn(i){const m=getSelMenu();if(!m)return;m.buttons=m.buttons.filter((_,bi)=>bi!==i);renderAll();}
function addPgBtn(){const m=getSelMenu();if(!m)return;m.pgRightButtons=[...(m.pgRightButtons||[]),{label:"버튼",type:"line"}];renderAll();}
function addNote(){const m=getSelMenu();if(!m)return;m.notes=[...(m.notes||[]),"안내 문구"];renderAll();}
function updateNote(i,v){const m=getSelMenu();if(!m)return;m.notes=(m.notes||[]).map((n,ni)=>ni===i?v:n);renderCenter();}
function deleteNote(i){const m=getSelMenu();if(!m)return;m.notes=(m.notes||[]).filter((_,ni)=>ni!==i);renderAll();}

function toggleOutputState(id,checked){
  if(checked)S.ix.outputStates=[...(S.ix.outputStates||[]),id];
  else S.ix.outputStates=(S.ix.outputStates||[]).filter(x=>x!==id);
  regenPrompt();
}

function applyPreset(name){
  const p=LPRESETS[name];if(!p)return;
  ["inputHeight","buttonHeight","fontSize","gridRowHeight","gridHeaderHeight","fieldGap","groupGap","sectionPadding"].forEach(k=>{if(p[k])S.style[k]=p[k];});
  ["gnbHeight","subHeaderHeight","tabBarHeight","sidebarWidth"].forEach(k=>{if(p[k])S.layout[k]=p[k];});
  renderAll();
}

      });
      body+=`</tbody></table></div>`;
      if(menu.summaryBar)body+=`<div style="padding:8px 16px;background:${s.summaryBarBg};border-top:2px solid ${s.gridBorderColor};display:flex;justify-content:space-between;font-size:${fs}px;color:${s.summaryBarTextColor};">${siItems.length>0?siItems.map(it=>`<span>${escHtml(it.label)}: <b style="color:${it.highlight?s.summaryBarHighlight:"#333"};">N</b></span>`).join(""):`<span><b style="color:${s.summaryBarHighlight};">2,531</b> 건</span><span>총 입금액: <b style="color:${s.summaryBarHighlight};">359,108</b></span><span>총 출금액: <b style="color:${s.summaryBarHighlight};">245,705</b></span>`}</div>`;
      if(pg2.show)body+=`<div style="padding:6px 12px;border-top:1px solid ${s.gridBorderColor};background:${s.pgBarBg};display:flex;align-items:center;gap:8px;flex-wrap:wrap;"><select style="height:26px;border:1px solid ${s.borderColor};border-radius:${br}px;font-size:${fs-1}px;padding:0 6px;background:#fff;">${(pg2.pageSizeOptions||[10,20,50]).map(n=>`<option>${n}</option>`).join("")}</select><div style="flex:1;display:flex;align-items:center;justify-content:center;gap:2px;">${["K","‹","1","2","3","4","5","›","≥1"].map(p=>{const isA=p==="1",isC=["K","‹","›","≥1"].includes(p);return`<div style="min-width:26px;height:26px;padding:0 4px;display:flex;align-items:center;justify-content:center;border-radius:${br}px;cursor:pointer;font-size:${isC?11:fs-1}px;background:${isA?s.primaryColor:"#fff"};color:${isA?"#fff":isC?"#666":"#333"};border:1px solid ${isA?s.primaryColor:s.borderColor};font-weight:${isA?700:400};">${p}</div>`;}).join("")}</div>${(menu.pgRightButtons||[]).map(b=>`<button style="height:26px;padding:0 10px;border:1px solid ${s.lineColor};background:#fff;color:${s.lineColor};border-radius:${br}px;font-size:${fs-1}px;cursor:pointer;white-space:nowrap;">${escHtml(b.label)}</button>`).join("")}</div>`;
      body+=`</div>`;
    }
    if((menu.notes||[]).length>0)body+=`<div style="background:${l.noteBg};border:1px solid ${l.noteBorderColor};border-radius:4px;padding:10px 14px;margin-top:8px;">${menu.notes.map((n,ni)=>`<div style="font-size:${fs-1}px;color:${l.noteTextColor};margin-bottom:${ni<menu.notes.length-1?4:0}px;">• ${escHtml(n)}</div>`).join("")}</div>`;
  }
  let footer=l.showFooter==="true"?`<div style="height:34px;background:${l.footerBg};border-top:1px solid ${l.footerBorderColor};display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:12px;color:#888;flex-shrink:0;font-family:${font};"><span>${escHtml(l.footerText)}</span><span>전화상담 ${escHtml(l.footerContactNumber)}</span></div>`:"";
  return`<div style="display:flex;flex-direction:column;font-family:${font};font-size:${fs}px;height:100%;overflow:hidden;background:#fff;">${gnb}${subbar}<div style="display:flex;flex:1;overflow:hidden;min-height:0;">${sidebar}<div style="flex:1;overflow:auto;background:${s.pageBg};min-width:0;font-family:${font};"><div style="padding:${pad}px;">${body}</div></div></div>${footer}</div>`;
}

function attachPreviewEvents(){
  document.querySelectorAll(".preview-btn").forEach(btn=>{
    const isSolid=btn.dataset.type==="solid";const s=S.style;
    btn.addEventListener("mouseenter",()=>{if(!S.ix.enabled)return;btn.style.background=isSolid?"#0d47a1":(S.ix.btnLineHover||"#f0f4ff");if(!isSolid)btn.style.border="1px solid "+s.lineColor;});
    btn.addEventListener("mouseleave",()=>{btn.style.background=isSolid?s.primaryColor:"#fff";btn.style.transform="";});
    btn.addEventListener("mousedown",()=>{if(!S.ix.enabled)return;btn.style.transform="scale(0.97)";});
    btn.addEventListener("mouseup",()=>{btn.style.transform="";});
    btn.addEventListener("click",()=>{
      if(isSolid&&S.ix.enabled&&S.ix.fieldError){
        const menu=getSelMenu();
        (menu?.fields||[]).filter(f=>f.required).forEach(fld=>{
          document.querySelectorAll(`.field-error[data-label="${fld.label}"]`).forEach(el=>el.style.display="block");
          document.querySelectorAll(`.preview-field[data-label="${fld.label}"]`).forEach(el=>{el.style.border="1px solid "+S.style.fieldErrorBorder;el.style.background="#fff8f8";});
        });
        setTimeout(()=>{document.querySelectorAll(".field-error").forEach(el=>el.style.display="none");document.querySelectorAll(".preview-field").forEach(el=>{el.style.border="1px solid "+S.style.borderColor;el.style.background="#fff";});},3000);
      } else {
        document.querySelectorAll(".field-error").forEach(el=>el.style.display="none");
        document.querySelectorAll(".preview-field").forEach(el=>{el.style.border="1px solid "+S.style.borderColor;el.style.background="#fff";});
      }
    });
  });
  document.querySelectorAll(".preview-field").forEach(el=>{
    el.addEventListener("focus",()=>{if(!S.ix.enabled||!S.ix.fieldFocus)return;el.style.border="2px solid "+S.style.fieldFocusBorder;el.style.boxShadow="0 0 0 3px rgba(22,89,197,0.1)";});
    el.addEventListener("blur",()=>{el.style.border="1px solid "+S.style.borderColor;el.style.boxShadow="";});
  });
  document.querySelectorAll(".grid-row").forEach(row=>{
    const ri=parseInt(row.dataset.ri);const baseBg=ri%2===0?S.style.gridRowOdd:S.style.gridRowEven;
    row.addEventListener("mouseenter",()=>{if(S.ix.enabled&&S.ix.rowHover)row.style.background=S.style.rowHoverBg||"#e8f0fe";});
    row.addEventListener("mouseleave",()=>{row.style.background=baseBg;});
    row.addEventListener("click",()=>{
      if(!S.ix.enabled||!S.ix.rowClick||S.ix.rowClick==="none")return;
      row.style.background="#c8d8f8";setTimeout(()=>row.style.background=baseBg,400);
      if(S.ix.rowClick==="popup"){
        const d=SAMPLE[ri];
        document.getElementById("popup-body").innerHTML=Object.entries({결재구분:d.결재구분,일자:d.날짜,금액:d.금액,상태:d.상태}).map(([k,v])=>`<div style="display:flex;margin-bottom:8px;font-size:13px;"><span style="width:70px;color:#888;flex-shrink:0;">${k}</span><span style="color:#222;font-weight:500;">${escHtml(v)}</span></div>`).join("");
        document.getElementById("popup-overlay").classList.add("open");
      }
    });
  });
}
function closePopup(){document.getElementById("popup-overlay").classList.remove("open");}

// ─── 상태별 뷰 ─────────────────────────────────
function renderStateView(){
  const chipHtml=IX_STATES.map(st=>{const on=S.selStates.includes(st.id);return`<button class="chip ${on?"active":""}" style="${on?"background:"+st.color+";border-color:"+st.color:""};" onclick="toggleState('${st.id}')">${st.label}</button>`;}).join("");
  const cardHtml=IX_STATES.filter(st=>S.selStates.includes(st.id)).map(st=>renderStateCard(st)).join("");
  return`<div style="padding:6px 12px;border-bottom:1px solid #e2e5ea;background:#fff;display:flex;gap:4px;flex-wrap:wrap;align-items:center;flex-shrink:0;"><span style="font-size:10px;color:#888;margin-right:4px;">표시할 상태:</span>${chipHtml}</div>
  <div style="flex:1;overflow:auto;padding:12px;display:flex;flex-wrap:wrap;gap:12px;align-content:flex-start;">${cardHtml||`<div style="text-align:center;color:#bbb;margin-top:40px;font-size:13px;width:100%;">상태를 선택해 주세요</div>`}</div>`;
}

function renderStateCard(st){
  const menu=getSelMenu(),s=S.style;
  const ih=parseInt(s.inputHeight)||30,br=parseInt(s.borderRadius)||4,bh=parseInt(s.buttonHeight)||30,btnR=parseInt(s.buttonRadius)||4,fs=parseInt(s.fontSize)||13;
  const font=`'${s.fontFamily}',sans-serif`;
  const btns=menu?.buttons||[{label:"조회",type:"solid"},{label:"초기화",type:"line"}];
  function getBtnStyle(type){
    const base=`height:${bh}px;padding:0 16px;font-size:${fs}px;cursor:pointer;border-radius:${btnR}px;font-family:${font};`;
    if(type==="solid"){if(st.id==="hover")return base+`background:#0d47a1;color:#fff;border:none;`;if(st.id==="click")return base+`background:#0a3576;color:#fff;border:none;transform:scale(0.97);`;if(st.id==="disabled")return base+`background:#b0bec5;color:#fff;border:none;cursor:not-allowed;opacity:.6;`;return base+`background:${s.primaryColor};color:#fff;border:none;`;}
    else{if(st.id==="hover")return base+`background:${s.rowHoverBg||"#f0f4ff"};color:${s.lineColor};border:1px solid ${s.lineColor};`;if(st.id==="click")return base+`background:#dde8ff;color:${s.lineColor};border:1px solid ${s.lineColor};transform:scale(0.97);`;if(st.id==="disabled")return base+`background:#f5f5f5;color:#bbb;border:1px solid #ddd;cursor:not-allowed;`;return base+`background:#fff;color:${s.lineColor};border:1px solid ${s.lineColor};`;}
  }
  function getInputStyle(){
    const base=`height:${ih}px;border-radius:${br}px;font-size:${fs}px;padding:0 8px;box-sizing:border-box;background:#fff;outline:none;width:100%;`;
    if(st.id==="focus")return base+`border:2px solid ${s.fieldFocusBorder};box-shadow:0 0 0 3px rgba(22,89,197,.12);`;if(st.id==="error")return base+`border:1px solid ${s.fieldErrorBorder};background:#fff8f8;`;if(st.id==="disabled")return base+`background:#f5f5f5;color:#aaa;cursor:not-allowed;border:1px solid #ddd;`;if(st.id==="hover")return base+`border:1px solid #999;`;return base+`border:1px solid ${s.borderColor};`;
  }
  const visGrid=(menu?.grid||[]).filter(c=>!c.hidden).slice(0,3);
  return`<div class="state-card"><div class="state-card-hd" style="background:${st.color};"><span style="font-size:12px;font-weight:700;color:#fff;">${st.label}</span><span style="font-size:10px;color:rgba(255,255,255,.7);">${st.id.toUpperCase()}</span></div>
    <div class="state-card-body" style="font-family:${font};">
      <div class="state-card-section"><div class="state-card-label">BUTTON</div><div style="display:flex;gap:8px;flex-wrap:wrap;">${btns.map(b=>`<button style="${getBtnStyle(b.type)}" ${st.id==="disabled"?"disabled":""}>${escHtml(b.label)}</button>`).join("")}</div></div>
      <div class="state-card-section"><div class="state-card-label">INPUT</div><input style="${getInputStyle()}" placeholder="${st.id==="error"?"필수 항목입니다":st.id==="focus"?"입력 중...":"검색어 입력"}" ${st.id==="disabled"?"disabled":""} readonly>
        ${st.id==="error"?`<div style="font-size:10px;color:${s.fieldErrorBorder};margin-top:3px;">⚠ 필수 항목을 입력해 주세요.</div>`:""}
        ${st.id==="focus"?`<div style="font-size:10px;color:${s.fieldFocusBorder};margin-top:3px;">포커스 상태</div>`:""}
      </div>
      ${visGrid.length>0?`<div class="state-card-section"><div class="state-card-label">GRID ROW</div><div style="border:1px solid ${s.gridBorderColor};border-radius:2px;overflow:hidden;"><div style="background:${s.gridHeaderBg};display:flex;">${visGrid.map((col,ci)=>`<div style="flex:1;padding:5px 8px;color:${s.gridHeaderColor};font-size:10px;font-weight:600;text-align:${col.align};border-right:${ci<visGrid.length-1?"1px solid rgba(255,255,255,.1)":"none"};overflow:hidden;white-space:nowrap;">${escHtml(col.name)}</div>`).join("")}</div>${SAMPLE.slice(0,3).map((row,ri)=>`<div style="display:flex;background:${(st.id==="hover"&&ri===1)?s.rowHoverBg:(st.id==="click"&&ri===1)?"#c8d8f8":ri%2===0?s.gridRowOdd:s.gridRowEven};">${visGrid.map((col,ci)=>`<div style="flex:1;padding:5px 8px;font-size:10px;text-align:${col.align};border-right:${ci<visGrid.length-1?"1px solid "+s.gridBorderColor:"none"};border-bottom:1px solid ${s.gridBorderColor};overflow:hidden;white-space:nowrap;">${col.name.includes("금액")?row.금액:col.name==="일자"?row.날짜:col.name==="상태"?row.상태:ri+1}</div>`).join("")}</div>`).join("")}</div></div>`:""}
    </div>
  </div>`;
}

function toggleState(id){
  if(S.selStates.includes(id))S.selStates=S.selStates.filter(x=>x!==id);else S.selStates=[...S.selStates,id];
  const sv=document.querySelector("#state-view");
  if(sv)sv.innerHTML=renderStateView();
}

// ─── AI 패널 ────────────────────────────────────
function renderAiPanel(){
  const histHtml=S.aiHistory.length===0?`<div style="color:#bbb;font-size:11px;text-align:center;margin-top:20px;line-height:1.8;">현재 프롬프트 기반으로 요청하세요<br><span style="font-size:10px;">예: 인터랙션 강화 / 컬럼 추가</span></div>`:
    S.aiHistory.map((msg,i)=>{const isU=msg.role==="user";const disp=!isU?msg.text.replace(/```prompt[\s\S]*?```/g,"[↑ 프롬프트 자동 반영됨]").trim():msg.text;return`<div class="ai-msg" style="align-items:${isU?"flex-end":"flex-start"};"><div class="ai-name">${isU?"나":"AI"}</div><div class="ai-bubble ${isU?"user":"ai"}">${escHtml(disp)}</div></div>`;}).join("")+
    (S.aiLoading?`<div class="ai-bubble ai" style="color:#aaa;">● 작성 중...</div>`:"");
  return`<div id="ai-panel">
    <div style="padding:8px 12px;border-bottom:1px solid #e2e5ea;background:#f5f7ff;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
      <span style="font-size:11px;font-weight:700;color:#1659c5;">💬 AI 어시스턴트</span>
      <div style="display:flex;gap:6px;">
        <button onclick="aiSend('','improve')" style="height:22px;padding:0 9px;border:none;background:#1659c5;color:#fff;border-radius:3px;cursor:pointer;font-size:10px;">✨ 자동개선</button>
        <button onclick="S.aiHistory=[];renderMainContent();" style="border:none;background:transparent;color:#aaa;cursor:pointer;font-size:11px;">초기화</button>
      </div>
    </div>
    <div id="ai-history">${histHtml}</div>
    <div style="padding:6px 8px;border-top:1px solid #f0f0f0;display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0;">${["인터랙션 강화","컬럼 추가","조회조건 보완","에러 처리"].map(cmd=>`<button onclick="aiSend('${cmd}','chat')" style="height:22px;padding:0 7px;border:1px solid #dde1e9;background:#f8f9ff;color:#555;border-radius:10px;cursor:pointer;font-size:10px;">${cmd}</button>`).join("")}</div>
    <div style="padding:8px;border-top:1px solid #e2e5ea;display:flex;gap:6px;flex-shrink:0;">
      <textarea id="ai-input" placeholder="자유롭게 요청하세요&#10;Enter 전송" style="flex:1;height:54px;border:1px solid #dde1e9;border-radius:4px;font-size:11px;padding:6px 8px;font-family:inherit;resize:none;outline:none;line-height:1.5;"></textarea>
      <button id="ai-send" onclick="aiSendFromInput()" style="width:34px;border:none;background:#1659c5;color:#fff;border-radius:4px;cursor:pointer;font-size:16px;flex-shrink:0;">↑</button>
    </div>
  </div>`;
}

function attachAiEvents(){
  const inp=document.getElementById("ai-input");
  if(inp)inp.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();aiSendFromInput();}});
  const h=document.getElementById("ai-history");
  if(h)h.scrollTop=h.scrollHeight;
}

function aiSendFromInput(){const inp=document.getElementById("ai-input");if(!inp||!inp.value.trim())return;aiSend(inp.value.trim(),"chat");}

async function aiSend(userMsg,mode){
  if(S.aiLoading)return;S.aiLoading=true;
  const pt=S.editMode?S.editedText:buildPrompt();
  const sys="당신은 Branch 업무 시스템 UI 프롬프트 전문가입니다. 한국어로 응답하고, 프롬프트 수정 시 ```prompt ... ``` 코드블록으로 감싸주세요.";
  const content=mode==="improve"?"아래 프롬프트를 누락 보완, 모호함 구체화하여 개선해줘.\n\n현재:\n"+pt:"현재 프롬프트:\n"+pt+"\n\n요청: "+userMsg;
  S.aiHistory=[...S.aiHistory,{role:"user",text:mode==="improve"?"✨ 자동 개선 요청":userMsg}];
  renderMainContent();
  try{
    const data=await callClaude({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:[{role:"user",content}]});
    const text=data.content?.[0]?.text||(data.error?"⚠ "+(data.error.message||JSON.stringify(data.error)):"응답을 받을 수 없습니다.");
    const match=text.match(/```prompt\s*([\s\S]*?)```/);
    if(match){S.editedText=match[1].trim();S.editMode=true;}
    S.aiHistory=[...S.aiHistory,{role:"assistant",text}];
  }catch(e){S.aiHistory=[...S.aiHistory,{role:"assistant",text:"⚠️ 오류: "+e.message}];}
  S.aiLoading=false;renderMainContent();
  setTimeout(()=>{const h=document.getElementById("ai-history");if(h)h.scrollTop=h.scrollHeight;},50);
}

// ─── 프롬프트 액션 ──────────────────────────────
function regenPrompt(){const ta=document.getElementById("prompt-text");if(ta&&!S.editMode)ta.value=buildPrompt();}
function copyPrompt(){
  const text=S.editMode?S.editedText:buildPrompt();
  navigator.clipboard?.writeText(text).then(()=>{const btn=document.getElementById("copy-btn");if(btn){btn.textContent="✓ 복사됨";btn.style.background="#2e7d32";setTimeout(()=>{btn.textContent="복사";btn.style.background="#1659c5";},2000);}});
}

// ─── 초기화 ─────────────────────────────────────
updateApiBanner();
renderAll();
</script>
