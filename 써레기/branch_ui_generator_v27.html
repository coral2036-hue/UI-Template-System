<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수협 Branch UI Generator v27</title>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f0f2f5;color:#1a1a2e;overflow:hidden;height:100vh;display:flex;flex-direction:column}
input,select,textarea,button{font:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c0c0c0;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#999}

/* ===== DESIGN TOKENS (CSS Variables) ===== */
:root{
  /* Colors - Primary */
  --c-primary:#209F85;--c-primary-dark:#01565B;--c-primary-light:#e8f5f0;--c-primary-hover:#1a8a73;
  /* Colors - Semantic */
  --c-success:#22c55e;--c-warning:#f59e0b;--c-error:#ef4444;--c-info:#3b82f6;
  /* Colors - Neutral */
  --c-bg:#f0f2f5;--c-surface:#ffffff;--c-border:#e2e8f0;--c-border-light:#f1f5f9;
  --c-text:#1a1a2e;--c-text-secondary:#64748b;--c-text-muted:#94a3b8;
  /* Radius */
  --r-sm:6px;--r-md:8px;--r-lg:12px;--r-xl:16px;--r-pill:9999px;
  /* Shadow */
  --sh-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --sh-md:0 4px 12px rgba(0,0,0,0.08);
  --sh-lg:0 8px 24px rgba(0,0,0,0.12);
  --sh-xl:0 16px 48px rgba(0,0,0,0.16);
  /* Spacing */
  --sp-xs:4px;--sp-sm:8px;--sp-md:12px;--sp-lg:16px;--sp-xl:20px;--sp-2xl:24px;--sp-3xl:32px;
  /* Typography */
  --fs-xs:11px;--fs-sm:12px;--fs-base:14px;--fs-md:15px;--fs-lg:18px;--fs-xl:22px;--fs-2xl:28px;
  --fw-normal:400;--fw-medium:500;--fw-semibold:600;--fw-bold:700;
  /* Layout */
  --gnb-h:56px;--sidebar-w:220px;--panel-left-w:260px;--panel-right-w:360px;
  /* Transition */
  --tr-fast:0.15s ease;--tr-base:0.2s ease;--tr-slow:0.3s ease;
}

/* ===== TOOL LAYOUT (3-Panel) ===== */
#app{display:flex;flex:1;overflow:hidden;min-height:0}

/* Left Panel */
#panelLeft{width:var(--panel-left-w);min-width:var(--panel-left-w);background:var(--c-surface);border-right:1px solid var(--c-border);display:flex;flex-direction:column;z-index:10}
#panelLeft .panel-header{padding:var(--sp-lg);border-bottom:1px solid var(--c-border);display:flex;align-items:center;gap:var(--sp-sm)}
#panelLeft .panel-header h2{font-size:var(--fs-md);font-weight:var(--fw-semibold);color:var(--c-primary-dark)}
.left-tabs{display:flex;border-bottom:1px solid var(--c-border)}
.left-tabs button{flex:1;padding:var(--sp-sm) var(--sp-md);font-size:var(--fs-sm);font-weight:var(--fw-medium);color:var(--c-text-secondary);background:none;border:none;border-bottom:2px solid transparent;transition:var(--tr-fast)}
.left-tabs button.active{color:var(--c-primary);border-bottom-color:var(--c-primary)}
.left-tabs button:hover{background:var(--c-primary-light)}
.left-tab-content{flex:1;overflow-y:auto;padding:var(--sp-sm)}
.left-tab-content[data-tab]{display:none}
.left-tab-content.active{display:block}

/* Center Panel */
#panelCenter{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.center-toolbar{display:flex;align-items:center;gap:var(--sp-sm);padding:var(--sp-sm) var(--sp-lg);background:var(--c-surface);border-bottom:1px solid var(--c-border)}
.center-toolbar .tb-group{display:flex;align-items:center;gap:var(--sp-xs)}
.center-toolbar .tb-sep{width:1px;height:20px;background:var(--c-border);margin:0 var(--sp-sm)}
.center-toolbar select,.center-toolbar input{height:30px;border:1px solid var(--c-border);border-radius:var(--r-sm);padding:0 var(--sp-sm);font-size:var(--fs-sm)}
.center-tabs{display:flex;background:var(--c-surface);border-bottom:1px solid var(--c-border);padding:0 var(--sp-lg)}
.center-tabs button{padding:var(--sp-sm) var(--sp-lg);font-size:var(--fs-sm);font-weight:var(--fw-medium);color:var(--c-text-secondary);border:none;background:none;border-bottom:2px solid transparent;transition:var(--tr-fast)}
.center-tabs button.active{color:var(--c-primary);border-bottom-color:var(--c-primary)}
.center-tabs button:hover{color:var(--c-text)}
#previewWrap{flex:1;overflow:auto;padding:var(--sp-xl);background:var(--c-bg);min-height:0}
#promptWrap{flex:1;overflow:auto;background:#1e1e2e;display:none;flex-direction:column}
#promptWrap pre{font-family:'Consolas','Monaco',monospace;font-size:var(--fs-sm);color:#e2e8f0;white-space:pre-wrap;word-break:break-all;line-height:1.7;padding:var(--sp-lg);flex:1;overflow:auto;margin:0}

/* Right Panel */
#panelRight{width:var(--panel-right-w);min-width:var(--panel-right-w);background:var(--c-surface);border-left:1px solid var(--c-border);display:flex;flex-direction:column;z-index:10}
#panelRight .panel-header{padding:var(--sp-lg);border-bottom:1px solid var(--c-border)}
#panelRight .panel-header h2{font-size:var(--fs-md);font-weight:var(--fw-semibold)}
.right-tabs{display:flex;border-bottom:1px solid var(--c-border)}
.right-tabs button{flex:1;padding:var(--sp-sm) var(--sp-md);font-size:var(--fs-sm);font-weight:var(--fw-medium);color:var(--c-text-secondary);background:none;border:none;border-bottom:2px solid transparent;transition:var(--tr-fast)}
.right-tabs button.active{color:var(--c-primary);border-bottom-color:var(--c-primary)}
.right-tab-content{flex:1;overflow-y:auto;padding:var(--sp-md)}
.right-tab-content[data-tab]{display:none}
.right-tab-content.active{display:block}

/* ===== SHARED UI COMPONENTS ===== */
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:var(--sp-xs);padding:var(--sp-sm) var(--sp-lg);font-size:var(--fs-sm);font-weight:var(--fw-medium);border-radius:var(--r-md);transition:var(--tr-fast);white-space:nowrap}
.btn-primary{background:var(--c-primary);color:#fff}.btn-primary:hover{background:var(--c-primary-hover)}
.btn-outline{border:1px solid var(--c-border);color:var(--c-text-secondary);background:var(--c-surface)}.btn-outline:hover{border-color:var(--c-primary);color:var(--c-primary)}
.btn-ghost{color:var(--c-text-secondary)}.btn-ghost:hover{background:var(--c-bg);color:var(--c-text)}
.btn-sm{padding:var(--sp-xs) var(--sp-sm);font-size:var(--fs-xs)}
.btn-danger{background:var(--c-error);color:#fff}.btn-danger:hover{opacity:0.9}
.btn-icon{width:28px;height:28px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--r-sm)}

/* Form */
.form-group{margin-bottom:var(--sp-md)}
.form-label{display:block;font-size:var(--fs-xs);font-weight:var(--fw-medium);color:var(--c-text-secondary);margin-bottom:var(--sp-xs);text-transform:uppercase;letter-spacing:0.5px}
.form-input,.form-select{width:100%;height:32px;padding:0 var(--sp-sm);border:1px solid var(--c-border);border-radius:var(--r-sm);font-size:var(--fs-sm);background:var(--c-surface);transition:var(--tr-fast)}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--c-primary);box-shadow:0 0 0 3px rgba(32,159,133,0.15)}
.form-row{display:flex;gap:var(--sp-sm)}
.form-row>*{flex:1}
.form-textarea{width:100%;min-height:64px;padding:var(--sp-sm);border:1px solid var(--c-border);border-radius:var(--r-sm);font-size:var(--fs-sm);background:var(--c-surface);resize:vertical;transition:var(--tr-fast)}
.form-textarea:focus{outline:none;border-color:var(--c-primary);box-shadow:0 0 0 3px rgba(32,159,133,0.15)}
.form-checkbox{display:flex;align-items:center;gap:var(--sp-xs);font-size:var(--fs-sm);cursor:pointer}
.form-checkbox input{accent-color:var(--c-primary)}

/* Card */
.card{background:var(--c-surface);border-radius:var(--r-lg);box-shadow:var(--sh-sm);border:1px solid var(--c-border-light)}
.card-header{padding:var(--sp-md) var(--sp-lg);border-bottom:1px solid var(--c-border-light);display:flex;align-items:center;justify-content:space-between}
.card-body{padding:var(--sp-lg)}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 8px;font-size:var(--fs-xs);font-weight:var(--fw-medium);border-radius:var(--r-pill);white-space:nowrap}
.badge-success{background:#dcfce7;color:#15803d}
.badge-warning{background:#fef3c7;color:#92400e}
.badge-error{background:#fee2e2;color:#991b1b}
.badge-info{background:#dbeafe;color:#1e40af}
.badge-neutral{background:#f1f5f9;color:#475569}

/* Tree */
.tree-group{margin-bottom:2px}
.tree-group-label{display:flex;align-items:center;gap:var(--sp-xs);padding:var(--sp-xs) var(--sp-sm);font-size:var(--fs-sm);font-weight:var(--fw-semibold);color:var(--c-text);cursor:pointer;border-radius:var(--r-sm);user-select:none}
.tree-group-label:hover{background:var(--c-bg)}
.tree-group-label .chevron{font-size:10px;transition:transform var(--tr-fast);color:var(--c-text-muted)}
.tree-group.open>.tree-group-label .chevron{transform:rotate(90deg)}
.tree-children{padding-left:var(--sp-lg);display:none}
.tree-group.open>.tree-children{display:block}
.tree-mid{margin-bottom:2px}
.tree-mid>.tree-children{display:none}
.tree-mid.open>.tree-children{display:block}
.tree-mid-label{display:flex;align-items:center;gap:var(--sp-xs);padding:2px var(--sp-sm);font-size:var(--fs-xs);font-weight:var(--fw-medium);color:var(--c-text-secondary);cursor:pointer;border-radius:var(--r-sm)}
.tree-mid-label:hover{background:var(--c-bg)}
.tree-mid>.tree-mid-label .chevron{transition:transform var(--tr-fast)}
.tree-mid.open>.tree-mid-label .chevron{transform:rotate(90deg)}
.tree-item{padding:4px var(--sp-sm) 4px var(--sp-xl);font-size:var(--fs-sm);color:var(--c-text-secondary);cursor:pointer;border-radius:var(--r-sm);transition:var(--tr-fast);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree-item:hover{background:var(--c-primary-light);color:var(--c-text)}
.tree-item.active{background:var(--c-primary);color:#fff;font-weight:var(--fw-medium)}

/* Color swatch */
.swatch{width:24px;height:24px;border-radius:var(--r-sm);border:2px solid var(--c-border);cursor:pointer;transition:var(--tr-fast)}
.swatch:hover{transform:scale(1.1)}
.swatch.active{border-color:var(--c-primary);box-shadow:0 0 0 2px rgba(32,159,133,0.3)}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:var(--sp-sm) var(--sp-xl);background:#1a1a2e;color:#fff;border-radius:var(--r-pill);font-size:var(--fs-sm);z-index:9999;opacity:0;transition:opacity var(--tr-base);pointer-events:none}
.toast.show{opacity:1}

/* Preset grid */
.preset-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-sm)}
.preset-card{display:flex;flex-direction:column;align-items:center;gap:var(--sp-xs);padding:var(--sp-sm);border:2px solid var(--c-border);border-radius:var(--r-md);cursor:pointer;transition:var(--tr-fast);text-align:center}
.preset-card:hover{border-color:var(--c-primary-light);background:var(--c-primary-light)}
.preset-card.active{border-color:var(--c-primary);background:var(--c-primary-light)}
.preset-card .preset-colors{display:flex;gap:2px}
.preset-card .preset-colors span{width:12px;height:12px;border-radius:50%}
.preset-card .preset-name{font-size:var(--fs-xs);font-weight:var(--fw-medium);color:var(--c-text-secondary)}

/* Section */
.section-title{font-size:var(--fs-xs);font-weight:var(--fw-semibold);color:var(--c-text-muted);text-transform:uppercase;letter-spacing:0.5px;margin:var(--sp-lg) 0 var(--sp-sm);padding:0 var(--sp-xs)}

/* Editor list */
.edit-list{display:flex;flex-direction:column;gap:var(--sp-xs)}
.edit-item{display:flex;align-items:center;gap:var(--sp-sm);padding:var(--sp-sm);background:var(--c-bg);border-radius:var(--r-sm);font-size:var(--fs-sm)}
.edit-item .edit-item-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.edit-item .edit-item-actions{display:flex;gap:2px}

/* ===== PREVIEW STYLES ===== */
#previewFrame{background:var(--c-surface);border-radius:var(--r-lg);box-shadow:var(--sh-md);overflow:hidden;min-height:600px;width:1440px;max-width:100%;transform-origin:top left}

/* ===== API BANNER ===== */
#apiBanner{display:none;padding:var(--sp-sm) var(--sp-lg);background:linear-gradient(135deg,#fef3c7,#fde68a);border-bottom:1px solid #f59e0b;font-size:var(--fs-sm);color:#92400e;align-items:center;gap:var(--sp-sm)}
#apiBanner.show{display:flex}
#apiBanner input{flex:1;height:28px;padding:0 var(--sp-sm);border:1px solid #f59e0b;border-radius:var(--r-sm);background:#fff;font-size:var(--fs-sm)}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--c-surface);border-radius:var(--r-xl);box-shadow:var(--sh-xl);width:90%;max-width:560px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column}
.modal-header{padding:var(--sp-lg) var(--sp-xl);border-bottom:1px solid var(--c-border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:var(--fs-lg);font-weight:var(--fw-semibold)}
.modal-body{padding:var(--sp-xl);overflow-y:auto;flex:1}
.modal-footer{padding:var(--sp-md) var(--sp-xl);border-top:1px solid var(--c-border);display:flex;justify-content:flex-end;gap:var(--sp-sm)}

/* ===== PROMPT HEADER ===== */
.prompt-header{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-sm) var(--sp-lg);background:#2d2d44;border-bottom:1px solid #3d3d5c}
.prompt-header .prompt-tabs{display:flex;gap:var(--sp-xs)}
.prompt-header .prompt-tabs button{padding:var(--sp-xs) var(--sp-md);font-size:var(--fs-sm);color:#94a3b8;background:none;border:1px solid transparent;border-radius:var(--r-sm)}
.prompt-header .prompt-tabs button.active{color:#e2e8f0;background:#3d3d5c;border-color:#4d4d6c}
.prompt-header .copy-btn{padding:var(--sp-xs) var(--sp-md);font-size:var(--fs-sm);color:#94a3b8;background:#3d3d5c;border:1px solid #4d4d6c;border-radius:var(--r-sm);cursor:pointer}
.prompt-header .copy-btn:hover{background:#4d4d6c;color:#e2e8f0}

/* ===== DARK MODE ===== */
body.dark-mode{--c-bg:#0f1117;--c-surface:#1a1b23;--c-border:#2a2b35;--c-border-light:#22232d;--c-text:#e2e8f0;--c-text-secondary:#94a3b8;--c-text-muted:#64748b}
body.dark-mode #panelLeft,body.dark-mode #panelRight,body.dark-mode .center-toolbar,body.dark-mode .center-tabs,body.dark-mode .left-tabs,body.dark-mode .right-tabs{background:var(--c-surface);border-color:var(--c-border)}
body.dark-mode .form-input,body.dark-mode .form-select,body.dark-mode .form-textarea{background:var(--c-bg);border-color:var(--c-border);color:var(--c-text)}
body.dark-mode .edit-item{background:var(--c-bg)}
body.dark-mode .preset-card{border-color:var(--c-border)}
body.dark-mode .tree-item:hover{background:rgba(255,255,255,0.05)}
body.dark-mode .modal{background:var(--c-surface);border:1px solid var(--c-border)}
body.dark-mode .toast{background:#e2e8f0;color:#1a1a2e}
body.dark-mode .badge-neutral{background:#2a2b35;color:#94a3b8}

/* ===== DEVICE FRAME ===== */
.device-mobile #previewFrame{width:375px!important;margin:0 auto;border-radius:var(--r-xl);box-shadow:var(--sh-lg)}
.device-tablet #previewFrame{width:768px!important;margin:0 auto;border-radius:var(--r-xl);box-shadow:var(--sh-lg)}
.device-desktop #previewFrame{width:1440px!important}
.device-mobile #previewFrame::before,.device-tablet #previewFrame::before{content:'';display:block;height:24px;background:linear-gradient(to bottom,rgba(0,0,0,0.03),transparent);border-radius:var(--r-xl) var(--r-xl) 0 0}

/* ===== ACCESSIBILITY INDICATOR ===== */
.a11y-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:var(--r-pill);font-size:10px;font-weight:600}
.a11y-pass{background:#dcfce7;color:#15803d}
.a11y-warn{background:#fef3c7;color:#92400e}
.a11y-fail{background:#fee2e2;color:#991b1b}
.a11y-section{padding:var(--sp-sm);background:var(--c-bg);border-radius:var(--r-md);margin-bottom:var(--sp-sm)}
.a11y-row{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-xs) 0;font-size:var(--fs-xs)}

/* ===== FLOW CONNECTOR ===== */
.flow-canvas{padding:var(--sp-lg);min-height:200px}
.flow-node{padding:var(--sp-sm) var(--sp-md);background:var(--c-surface);border:2px solid var(--c-border);border-radius:var(--r-md);font-size:var(--fs-sm);cursor:pointer;text-align:center;min-width:100px;transition:var(--tr-fast);display:inline-block}
.flow-node:hover{border-color:var(--c-primary)}
.flow-node.active{border-color:var(--c-primary);background:var(--c-primary-light)}
.flow-node.flow-start{border-color:var(--c-success);border-style:dashed}
.flow-node.flow-end{border-color:var(--c-error);border-style:dashed}
.flow-arrow{color:var(--c-text-muted);font-size:18px;display:inline-flex;align-items:center;margin:0 var(--sp-sm)}
.flow-row{display:flex;align-items:center;flex-wrap:wrap;gap:var(--sp-sm);margin-bottom:var(--sp-sm)}

/* ===== PROMPT DIFF ===== */
.diff-add{background:#dcfce7;color:#15803d;padding:0 2px}
.diff-del{background:#fee2e2;color:#991b1b;text-decoration:line-through;padding:0 2px}

/* ===== CARD TYPE BADGES ===== */
.card-type-selector{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:var(--sp-md)}
.card-type-btn{padding:var(--sp-xs) var(--sp-sm);font-size:var(--fs-xs);border:1px solid var(--c-border);border-radius:var(--r-pill);cursor:pointer;transition:var(--tr-fast);background:var(--c-surface)}
.card-type-btn:hover{border-color:var(--c-primary);color:var(--c-primary)}
.card-type-btn.active{background:var(--c-primary);color:#fff;border-color:var(--c-primary)}

/* ===== STATE PREVIEW TABS ===== */
.state-tabs{display:flex;gap:4px;margin-bottom:var(--sp-sm)}
.state-tab{padding:2px var(--sp-sm);font-size:var(--fs-xs);border-radius:var(--r-pill);border:1px solid var(--c-border);cursor:pointer;transition:var(--tr-fast);background:var(--c-surface)}
.state-tab:hover{border-color:var(--c-primary)}
.state-tab.active{background:var(--c-primary);color:#fff;border-color:var(--c-primary)}

/* ===== PROJECT SELECTOR ===== */
.project-selector{display:flex;align-items:center;gap:var(--sp-sm);padding:var(--sp-xs) var(--sp-sm);background:var(--c-bg);border-radius:var(--r-md);font-size:var(--fs-sm)}

/* ===== DRAG HANDLE ===== */
.drag-handle{cursor:grab;color:var(--c-text-muted);font-size:var(--fs-xs);padding:0 2px;user-select:none}
.drag-handle:active{cursor:grabbing}

/* ===== COLLAPSIBLE SECTION ===== */
.collapsible-header{display:flex;align-items:center;gap:var(--sp-xs);padding:var(--sp-sm);cursor:pointer;border-radius:var(--r-sm);font-size:var(--fs-sm);font-weight:var(--fw-semibold);color:var(--c-text)}
.collapsible-header:hover{background:var(--c-bg)}
.collapsible-body{padding:0 var(--sp-sm) var(--sp-sm)}

/* ===== RESPONSIVE ===== */
@media(max-width:1200px){
  :root{--panel-left-w:220px;--panel-right-w:300px}
}
@media(max-width:900px){
  #panelLeft{display:none}
  #panelRight{display:none}
  :root{--panel-left-w:0px;--panel-right-w:0px}
}
</style>
</head>
<body>

<!-- ===== API Banner ===== -->
<div id="apiBanner">
  <span>🔑 AI API Key:</span>
  <select id="aiProvider" style="width:100px"><option value="claude">Claude</option><option value="gemini">Gemini</option><option value="gpt">GPT</option></select>
  <input id="apiKeyInput" type="password" placeholder="API Key를 입력하세요">
  <button class="btn btn-sm btn-outline" onclick="saveApiKey()">저장</button>
  <button class="btn btn-sm btn-ghost" onclick="toggleApiBanner(false)">✕</button>
</div>

<!-- ===== Main App ===== -->
<div id="app">

  <!-- LEFT PANEL -->
  <div id="panelLeft">
    <div class="panel-header">
      <span style="font-size:20px">🏦</span>
      <h2>Sh-Branch v27</h2>
      <span style="margin-left:auto;font-size:var(--fs-xs);color:var(--c-text-muted)">Part1</span>
    </div>

// ===== ACCESSIBILITY UTILITIES =====
function getLuminance(hex){
  const c=hex.replace('#','');
  const r=parseInt(c.substr(0,2),16)/255;
  const g=parseInt(c.substr(2,2),16)/255;
  const b=parseInt(c.substr(4,2),16)/255;
  const f=v=>v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);
  return 0.2126*f(r)+0.7152*f(g)+0.0722*f(b);
}
function getContrast(hex1,hex2){
  const l1=getLuminance(hex1);
  const l2=getLuminance(hex2);
  const lighter=Math.max(l1,l2);
  const darker=Math.min(l1,l2);
  return (lighter+0.05)/(darker+0.05);
}
function a11yLevel(ratio){
  if(ratio>=7) return {level:'AAA',cls:'a11y-pass'};
  if(ratio>=4.5) return {level:'AA',cls:'a11y-pass'};
  if(ratio>=3) return {level:'AA Large',cls:'a11y-warn'};

}

// ===== SAMPLE DATA INFERENCE =====
function inferSampleValue(col,ri){
  const name=String(col?.name||'').trim();
  const type=String(col?.type||'text');
  const legacy=SAMPLE[ri%SAMPLE.length]||SAMPLE[0];
  if(name==='NO') return String(ri+1);
  if(type==='checkbox') return ri%3===0;
  if(type==='progress') return [25,50,75,100,60][ri%5];
  if(type==='date'||/일자|날짜|등록일|생성일|거래일시/.test(name)) return legacy.날짜;
  if(type==='amount'||/금액|잔액|입금액|출금액|이체금액|총금액/.test(name)) return ['15,000,000','8,500,000','3,200,000','1,200,000','500,000'][ri%5];
  if(type==='status'||name==='상태') return ['대기','완료','반려','대기','완료'][ri%5];
  if(type==='badge'||/유형|구분|통화/.test(name)){
    if(/유형/.test(name)) return ['일일보고서','주간보고서','월간보고서','일일보고서','주간보고서'][ri%5];
    if(/결재구분/.test(name)) return legacy.결재구분;
    if(/통화/.test(name)) return ['KRW','KRW','USD','KRW','EUR'][ri%5];
    return ['A','B','C','D','E'][ri%5];
  }
  if(type==='link'||/보고서명|제목/.test(name)){
    if(/보고서/.test(name)) return ['2026년 3월 일일보고서','주간실적 보고서 (3월 3주)','월간 자금운용 보고서','지출내역 분석 보고서','이체현황 종합보고서'][ri%5];
    return legacy.제목;
  }
  if(/은행/.test(name)) return ['농협','신한','하나','기업','우리'][ri%5];
  if(/계좌|출금계좌/.test(name)) return ['110-xxx-1234','220-xxx-5678','330-xxx-9012','110-xxx-3456','220-xxx-7890'][ri%5];
  if(/계좌명/.test(name)) return ['보통예금','법인계좌','외화예금','정기적금','CMA'][ri%5];
  if(/담당|사업장|회사|수취인/.test(name)) return ['웹케시씨엔에스(주)','(주)삼성전자','LG화학(주)','현대자동차(주)','SK텔레콤(주)'][ri%5];
  if(/기안자|담당자/.test(name)) return ['홍길동','김영희','이수진','박민수','최지훈'][ri%5];
  if(/적요/.test(name)) return ['업무대금','용역비','식비','교통비','사무용품'][ri%5];
  if(/기간/.test(name)) return ['2026.03.01~03.07','2026.03.08~03.14','2026.03.01~03.31','2026.02.01~02.28','2026.01.01~01.31'][ri%5];
  if(/거래점/.test(name)) return ['본점','강남','여의도','종로','마포'][ri%5];
  if(/건수/.test(name)) return [15,23,8,42,5][ri%5];
  if(type==='actions') return '';
  return name+' '+(ri+1);
}

function buildSampleRows(menu,count=5){
  if(!menu) return [];
  return Array.from({length:count},(_,i)=>{
    const row={};
    (menu.grid||[]).forEach(col=>{row[col.name]=inferSampleValue(col,i)});
    return row;
  });
}

function getSampleRows(menu){
  if(!menu) return [];
  if(!Array.isArray(menu.sampleData)||!menu.sampleData.length) menu.sampleData=buildSampleRows(menu);
  return menu.sampleData;
}

// ===== SELECTION HELPERS =====
function getSelMenu(){
  const{group:g,mid:m,menu:mi}=S.sel;
  if(mi===-1) return null;
  if(mi===-2) return null;
  try{return S.tree[g].mids[m].menus[mi]}catch(e){return null}
}
function getSelLabel(){
  const{menu:mi}=S.sel;
  if(mi===-1) return S.home.name;
  if(mi===-2) return '로그인';
  const m=getSelMenu();
  return m?.name||'선택 없음';
}
function selectMenu(g,m,mi){
  S.sel={group:g,mid:m,menu:mi};
  render();
}
function selectHome(){S.sel={group:0,mid:0,menu:-1};render()}
function selectLogin(){S.sel={group:0,mid:0,menu:-2};render()}
function getBreadcrumb(){
  const g=S.tree[S.sel.group];
  const mid=g?.mids[S.sel.mid];
  const m=getSelMenu();
  return [g?.name,mid?.name,m?.name].filter(Boolean).join(' > ');
}

const _leftTabMap={tree:'메뉴',style:'스타일',layout:'레이아웃',flow:'흐름'};
const _centerTabMap={preview:'미리보기',prompt:'프롬프트'};
const _rightTabNames=['fields','grid','buttons','sample','cards','a11y'];
const _rightTabLabels=['필드','그리드','버튼','데이터','카드','접근성'];

function switchLeftTab(tab){
  $$('.left-tabs button').forEach(b=>b.classList.toggle('active',b.textContent===_leftTabMap[tab]));
  $$('.left-tab-content').forEach(el=>el.classList.toggle('active',el.dataset.tab===tab));
}
function switchCenterTab(tab){
  $$('.center-tabs button').forEach(b=>b.classList.toggle('active',b.textContent===_centerTabMap[tab]));
  $('#previewWrap').style.display=tab==='preview'?'block':'none';
  $('#promptWrap').style.display=tab==='prompt'?'flex':'none';
  if(tab==='prompt'&&typeof renderPrompt==='function') renderPrompt();
}
function switchRightTab(tab){
  $$('.right-tabs button').forEach((b,i)=>b.classList.toggle('active',_rightTabNames[i]===tab));
  $$('.right-tab-content').forEach(el=>el.classList.toggle('active',el.dataset.tab===tab));
}
function switchPromptTab(tab){
  S.promptTab=tab;
  const ptMap={html:'HTML',pencil:'Pencil.dev',figma:'Figma',diff:'Diff'};
  $$('.prompt-tabs button').forEach(b=>b.classList.toggle('active',b.textContent===ptMap[tab]));
  if(typeof renderPrompt==='function') renderPrompt();
}

  S.zoom=parseFloat(v);
  const f=$('#previewFrame');
  if(f){f.style.transform=`scale(${S.zoom})`;f.style.transformOrigin='top left'}
}

// ===== DEVICE =====
function setDevice(d){
  S.device=d;
  const wrap=$('#previewWrap');
  wrap.classList.remove('device-mobile','device-tablet','device-desktop');
  wrap.classList.add('device-'+d);
  ['devDesktop','devTablet','devMobile'].forEach(id=>{
    const el=$('#'+id);
    if(el) el.style.fontWeight=id==='dev'+d.charAt(0).toUpperCase()+d.slice(1)?'700':'400';
  });
  if(typeof renderPreviewOnly==='function') renderPreviewOnly();

// ===== UNDO / REDO =====
let _historyTimer=null;
function pushHistory(){
  clearTimeout(_historyTimer);
  _historyTimer=setTimeout(()=>{
    try{
      const snapshot=JSON.stringify({tree:S.tree,home:S.home,login:S.login,style:S.style,sel:S.sel,layoutOpts:S.layoutOpts,gnbSettings:S.gnbSettings,sidebarSettings:S.sidebarSettings,pageHeaderSettings:S.pageHeaderSettings,customStatusColors:S.customStatusColors,flows:S.flows});
      // Truncate future if we're in the middle
      if(S._historyIdx<S._history.length-1){
        S._history=S._history.slice(0,S._historyIdx+1);
      }
      S._history.push(snapshot);
      if(S._history.length>S._historyMax) S._history.shift();
      S._historyIdx=S._history.length-1;
    }catch(e){}
  },500);
}
function undoAction(){
  if(S._historyIdx<=0){showToast('더 이상 실행 취소할 수 없습니다');return}
  S._historyIdx--;
  _restoreHistory();
  showToast('실행 취소');
}
function redoAction(){
  if(S._historyIdx>=S._history.length-1){showToast('더 이상 다시 실행할 수 없습니다');return}
  S._historyIdx++;
  _restoreHistory();
  showToast('다시 실행');
}
function _restoreHistory(){
  try{
    const d=JSON.parse(S._history[S._historyIdx]);
    if(d.tree) S.tree.splice(0,S.tree.length,...d.tree);
    if(d.home) Object.assign(S.home,d.home);
    if(d.login) Object.assign(S.login,d.login);
    if(d.style){S.style=d.style;applyStyleVars()}
    if(d.sel) S.sel=d.sel;
    if(d.layoutOpts) Object.assign(S.layoutOpts,d.layoutOpts);
    if(d.gnbSettings) Object.assign(S.gnbSettings,d.gnbSettings);
    if(d.sidebarSettings) Object.assign(S.sidebarSettings,d.sidebarSettings);
    if(d.pageHeaderSettings) Object.assign(S.pageHeaderSettings,d.pageHeaderSettings);
    if(d.customStatusColors) S.customStatusColors=d.customStatusColors;
    if(d.flows) S.flows=d.flows;
    if(typeof render==='function') render();
  }catch(e){}
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown',e=>{
  const ctrl=e.ctrlKey||e.metaKey;
  if(ctrl&&e.key==='z'&&!e.shiftKey){e.preventDefault();undoAction()}
  if(ctrl&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redoAction()}
  if(ctrl&&e.key==='s'){e.preventDefault();doSave()}
});

// ===== SAVE / LOAD =====
function doSave(){
  try{
    localStorage.setItem('kbranch_v27',JSON.stringify({
      tree:S.tree,home:S.home,login:S.login,style:S.style,brandIdx:S.brandIdx,
      layoutOpts:S.layoutOpts,gnbSettings:S.gnbSettings,sidebarSettings:S.sidebarSettings,

    }));

  }catch(e){showToast('저장 실패: '+e.message)}
}
function doLoad(){
  try{
    const d=JSON.parse(localStorage.getItem('kbranch_v27'));
    if(!d){showToast('저장된 데이터가 없습니다');return}
    if(d.tree) S.tree.splice(0,S.tree.length,...d.tree);
    if(d.home) Object.assign(S.home,d.home);
    if(d.login) Object.assign(S.login,d.login);
    if(d.style){S.style={...d.style};applyStyleVars()}
    if(d.brandIdx!=null) S.brandIdx=d.brandIdx;
    if(d.layoutOpts) Object.assign(S.layoutOpts,d.layoutOpts);
    if(d.gnbSettings) Object.assign(S.gnbSettings,d.gnbSettings);
    if(d.sidebarSettings) Object.assign(S.sidebarSettings,d.sidebarSettings);
    if(d.pageHeaderSettings) Object.assign(S.pageHeaderSettings,d.pageHeaderSettings);
    if(d.styleExt) Object.assign(S.styleExt,d.styleExt);
    if(d.flows) S.flows=d.flows;
    if(d.projects) S.projects=d.projects;
    if(d.customStatusColors) S.customStatusColors=d.customStatusColors;
    S.sel={group:0,mid:0,menu:-1};
    if(typeof render==='function') render();
    showToast('불러오기 완료!');
  }catch(e){showToast('불러오기 실패: '+e.message)}
}
function exportJSON(){
  const d=JSON.stringify({
    version:'v27',tree:S.tree,home:S.home,login:S.login,style:S.style,brandIdx:S.brandIdx,
    layoutOpts:S.layoutOpts,gnbSettings:S.gnbSettings,sidebarSettings:S.sidebarSettings,
    pageHeaderSettings:S.pageHeaderSettings,styleExt:S.styleExt,flows:S.flows,
    projects:S.projects,customStatusColors:S.customStatusColors
  },null,2);
  const blob=new Blob([d],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='kbranch_v27_export.json';a.click();
  showToast('JSON 내보내기 완료');
}
function importJSON(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.tree) S.tree.splice(0,S.tree.length,...d.tree);
        if(d.home) Object.assign(S.home,d.home);
        if(d.login) Object.assign(S.login,d.login);
        if(d.style){S.style={...d.style};applyStyleVars()}
        if(d.brandIdx!=null) S.brandIdx=d.brandIdx;
        if(d.layoutOpts) Object.assign(S.layoutOpts,d.layoutOpts);
        if(d.gnbSettings) Object.assign(S.gnbSettings,d.gnbSettings);
        if(d.sidebarSettings) Object.assign(S.sidebarSettings,d.sidebarSettings);
        if(d.pageHeaderSettings) Object.assign(S.pageHeaderSettings,d.pageHeaderSettings);
        if(d.customStatusColors) S.customStatusColors=d.customStatusColors;
        if(d.flows) S.flows=d.flows;
        S.sel={group:0,mid:0,menu:-1};
        if(typeof render==='function') render();
        showToast('JSON 가져오기 완료!');
      }catch(err){showToast('JSON 파싱 실패')}
    };
    reader.readAsText(f);
  };
  input.click();
}

// ===== renderTree =====
function renderTree(){
  const el=$('#leftTabTree');
  if(!el)return;
  const s=S.sel;
  let h='';
  // Home
  h+=`<div class="tree-item${s.menu===-1?' active':''}" onclick="selectHome()" style="margin-bottom:2px;font-weight:600">🏠 ${escHtml(S.home.name)}</div>`;
  // Login
  h+=`<div class="tree-item${s.menu===-2?' active':''}" onclick="selectLogin()" style="margin-bottom:6px">🔑 로그인</div>`;
  // Groups
  S.tree.forEach((g,gi)=>{
    h+=`<div class="tree-group${g.open?' open':''}">`;
    h+=`<div class="tree-group-label" onclick="S.tree[${gi}].open=!S.tree[${gi}].open;renderTree()">`;
    h+=`<span class="chevron">▶</span> ${escHtml(g.icon||'')} ${escHtml(g.name)}`;
    h+=`<span style="margin-left:auto;display:flex;gap:2px"><button class="btn-icon btn-ghost" onclick="event.stopPropagation();editTreeGroup(${gi})" title="그룹 편집">✏️</button></span>`;
    h+=`</div><div class="tree-children">`;
    (g.mids||[]).forEach((mid,mi)=>{
      h+=`<div class="tree-mid${mid.open?' open':''}">`;
      h+=`<div class="tree-mid-label" onclick="S.tree[${gi}].mids[${mi}].open=!S.tree[${gi}].mids[${mi}].open;renderTree()">`;
      h+=`<span class="chevron">▶</span> ${escHtml(mid.name)}`;
      h+=`<span style="margin-left:auto;display:flex;gap:2px"><button class="btn-icon btn-ghost" onclick="event.stopPropagation();editTreeMid(${gi},${mi})" title="중분류 편집">✏️</button></span>`;
      h+=`</div><div class="tree-children">`;
      (mid.menus||[]).forEach((menu,mmi)=>{
        const active=(s.group===gi&&s.mid===mi&&s.menu===mmi);
        h+=`<div class="tree-item${active?' active':''}" onclick="selectMenu(${gi},${mi},${mmi})">${escHtml(menu.name||'메뉴 '+(mmi+1))}</div>`;
      });
      h+=`<div class="tree-item" style="color:var(--c-primary);font-size:11px" onclick="addMenuToMid(${gi},${mi})">+ 메뉴</div>`;
      h+=`</div></div>`;
    });
    h+=`<div class="tree-item" style="color:var(--c-primary);font-size:11px" onclick="addMidToGroup(${gi})">+ 중분류</div>`;
    h+=`</div></div>`;
  });
  h+=`<div class="tree-item" style="color:var(--c-primary);font-weight:600;margin-top:8px" onclick="addTreeGroup()">+ 그룹 추가</div>`;
  el.innerHTML=h;
}

// ===== GNB / Sidebar / SubHeader HTML builders =====
function buildGnbHtml(s){
  const gs=S.gnbSettings;
  const lo=S.layoutOpts;
  const gnbStyle=lo.gnb||'dark';
  const bgColor=gnbStyle==='dark'?s.gnbBg:(gnbStyle==='light'?s.surface:'rgba(255,255,255,0.85)');
  const txtColor=gnbStyle==='dark'?'#fff':s.text;
  const blur=gnbStyle==='blur'?'backdrop-filter:blur(12px);':'';
  const h=gs.height||56;
  let html=`<div style="height:${h}px;background:${bgColor};color:${txtColor};display:flex;align-items:center;padding:0 24px;${blur}border-bottom:1px solid ${gnbStyle==='dark'?'rgba(255,255,255,0.1)':s.border}">`;
  html+=`<div style="font-weight:700;font-size:16px;margin-right:32px">${escHtml(gs.logoText||'K-Branch')}</div>`;
  html+=`<div style="display:flex;gap:4px;flex:1">`;
  S.tree.forEach((g,gi)=>{
    const active=(S.sel.group===gi&&S.sel.menu>=0);
    const abg=active?(gnbStyle==='dark'?'rgba(255,255,255,0.15)':'rgba(0,0,0,0.06)'):'transparent';
    html+=`<div style="padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;background:${abg};font-weight:${active?'600':'400'}" onclick="S.sel.group=${gi};S.sel.mid=0;S.sel.menu=0;render()">${escHtml(g.icon||'')} ${escHtml(g.name)}</div>`;
  });
  html+=`</div>`;
  if(gs.showSearch) html+=`<div style="margin-right:12px;opacity:0.7;cursor:pointer">🔍</div>`;
  if(gs.showNotification) html+=`<div style="margin-right:12px;opacity:0.7;cursor:pointer;position:relative">🔔<span style="position:absolute;top:-4px;right:-6px;width:8px;height:8px;background:#ef4444;border-radius:50%"></span></div>`;
  if(gs.showAvatar) html+=`<div style="width:32px;height:32px;border-radius:50%;background:${gnbStyle==='dark'?'rgba(255,255,255,0.2)':'#e2e8f0'};display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer">👤</div>`;
  html+=`</div>`;
  return html;
}

function buildSidebarHtml(s){
  const lo=S.layoutOpts;
  if(lo.sidebar==='hidden')return '';
  const ss=S.sidebarSettings;
  const w=ss.width||220;
  const g=S.tree[S.sel.group];
  if(!g)return '';
  let html=`<div style="width:${w}px;min-width:${w}px;background:${s.sidebarBg||'#f8fafc'};border-right:1px solid ${s.border};padding:12px 0;overflow-y:auto">`;

    if(ss.showGroupLabel) html+=`<div style="padding:6px 16px;font-size:11px;color:${s.textSecondary};font-weight:500;margin-top:4px">${escHtml(mid.name)}</div>`;
    (mid.menus||[]).forEach((menu,mmi)=>{
      const active=(S.sel.mid===mi&&S.sel.menu===mmi);
      const indicator=active&&ss.activeIndicator==='left-bar'?`border-left:3px solid ${s.primary};`:'';
      const abg=active?`background:${s.primary}12;color:${s.primary};font-weight:600;`:`color:${s.text};`;
      html+=`<div style="padding:8px 16px 8px ${ss.showIcon?'16':'20'}px;font-size:13px;cursor:pointer;${abg}${indicator}" onclick="selectMenu(${S.sel.group},${mi},${mmi})">${escHtml(menu.name||'메뉴')}</div>`;

function buildSubHeaderHtml(s){

  });
  html+=`</div>`;
  return html;

// ===== renderFieldPreviewHtml =====
function renderFieldPreviewHtml(f,s,sizeOpts){
  const _so=sizeOpts||{};
  const _fh=_so.fieldHeight||34;
  const _ff=_so.fieldFont||13;
  const _lf=_so.labelFont||12;
  const lbl=`<label style="display:block;font-size:${_lf}px;font-weight:500;color:${s.textSecondary};margin-bottom:4px">${escHtml(f.label)}${f.required?'<span style="color:#ef4444"> *</span>':''}</label>`;
  const base=`height:${_fh}px;width:100%;padding:0 10px;border:1px solid ${s.border};border-radius:${s.radius||6}px;font-size:${_ff}px;background:${s.surface};color:${s.text}`;
  switch(f.type){
    case 'select': return lbl+`<select style="${base}">${(f.options||['전체']).map(o=>`<option>${escHtml(o)}</option>`).join('')}</select>`;
    case 'dateRange': return lbl+`<div style="display:flex;gap:6px;align-items:center"><input type="date" style="${base};flex:1"><span style="color:${s.textSecondary}">~</span><input type="date" style="${base};flex:1"></div>`;
    case 'date': return lbl+`<input type="date" style="${base}">`;
    case 'number': return lbl+`<input type="number" style="${base}" placeholder="${escHtml(f.placeholder||'')}">`;
    case 'amount': return lbl+`<div style="position:relative"><span style="position:absolute;left:10px;top:8px;font-size:12px;color:${s.textSecondary}">₩</span><input type="text" style="${base};padding-left:24px" placeholder="${escHtml(f.placeholder||'0')}"></div>`;
    case 'password': return lbl+`<input type="password" style="${base}" placeholder="${escHtml(f.placeholder||'••••••')}">`;
    case 'textarea': return lbl+`<textarea style="width:100%;min-height:64px;padding:8px 10px;border:1px solid ${s.border};border-radius:${s.radius||6}px;font-size:13px;background:${s.surface};color:${s.text};resize:vertical" placeholder="${escHtml(f.placeholder||'')}"></textarea>`;
    case 'checkbox': return `<label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;color:${s.text}"><input type="checkbox" style="accent-color:${s.primary}"> ${escHtml(f.label)}</label>`;
    case 'radio': return `<div style="font-size:12px;font-weight:500;color:${s.textSecondary};margin-bottom:4px">${escHtml(f.label)}</div><div style="display:flex;gap:12px">${(f.options||['옵션1','옵션2']).map((o,i)=>`<label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;color:${s.text}"><input type="radio" name="r_${escHtml(f.label)}" ${i===0?'checked':''}>${escHtml(o)}</label>`).join('')}</div>`;
    case 'file': return lbl+`<div style="${base};display:flex;align-items:center;cursor:pointer;color:${s.textSecondary}">📎 파일을 선택하세요</div>`;
    case 'hidden': return `<div style="font-size:11px;color:${s.textSecondary};padding:4px 8px;background:${s.bg};border-radius:4px;border:1px dashed ${s.border}">🔒 ${escHtml(f.label)} (숨김 필드)</div>`;
    default: return lbl+`<input type="text" style="${base}" placeholder="${escHtml(f.placeholder||'')}">`;
  }
}

// ===== renderGridCellHtml =====
function renderGridCellHtml(col,val,ri,s){
  const sc=S.customStatusColors||STATUS_COLORS;
  switch(col.type){
    case 'amount': return `<span style="font-variant-numeric:tabular-nums">${escHtml(val)}</span>`;
    case 'status':{
      const st=sc[val]||{bg:'#f1f5f9',color:'#475569'};
      return `<span style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:500;background:${st.bg};color:${st.color}">${escHtml(val)}</span>`;
    }
    case 'badge':{
      const colors=['#dbeafe:#1e40af','#dcfce7:#15803d','#fef3c7:#92400e','#fee2e2:#991b1b','#f3e8ff:#6b21a8'];
      const [bg,color]=(colors[ri%colors.length]).split(':');
      return `<span style="display:inline-flex;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:500;background:${bg};color:${color}">${escHtml(val)}</span>`;
    }
    case 'link': return `<a style="color:${s.primary};text-decoration:none;cursor:pointer;font-size:13px">${escHtml(val)}</a>`;
    case 'date': return `<span style="color:${s.textSecondary};font-size:12px">${escHtml(val)}</span>`;
    case 'actions': return `<div style="display:flex;gap:4px;justify-content:center"><button style="padding:2px 8px;font-size:11px;border:1px solid ${s.border};border-radius:4px;background:${s.surface};cursor:pointer">상세</button></div>`;
    case 'checkbox': return `<input type="checkbox" ${val?'checked':''} style="accent-color:${s.primary}">`;
    case 'icon': return `<span style="font-size:16px">${escHtml(val||'📄')}</span>`;
    case 'progress':{
      const pct=parseInt(val)||0;
      return `<div style="display:flex;align-items:center;gap:6px"><div style="flex:1;height:6px;background:${s.border};border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${s.primary};border-radius:3px"></div></div><span style="font-size:11px;color:${s.textSecondary}">${pct}%</span></div>`;
    }
    case 'avatar': return `<div style="width:28px;height:28px;border-radius:50%;background:${s.primary}20;display:flex;align-items:center;justify-content:center;font-size:12px">👤</div>`;
    case 'number': return `<span style="font-variant-numeric:tabular-nums">${escHtml(val)}</span>`;
    default: return `<span>${escHtml(val)}</span>`;
  }
}

// ===== renderBtnPreviewHtml =====
function renderBtnPreviewHtml(b,s){
  const sz=BTN_SIZES.find(x=>x.id===b.size)||BTN_SIZES[2];
  const bc=BTN_COLORS.find(x=>x.id===b.color);
  const c=bc?.hex||s.primary;
  const icon=BTN_ICONS.find(x=>x.id===b.icon)?.icon||'';
  let st=`height:${sz.h}px;padding:0 ${sz.px}px;font-size:${sz.fs}px;border-radius:${s.buttonRadius||s.radius||6}px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-weight:500;transition:all 0.15s ease;border:none;`;
  if(b.disabled) st+=`opacity:0.5;cursor:not-allowed;`;
  switch(b.type||b.variant){
    case 'solid': st+=`background:${c};color:#fff;`;break;
    case 'line': st+=`background:transparent;color:${c};border:1px solid ${c};`;break;
    case 'ghost': st+=`background:transparent;color:${c};`;break;
    case 'link': st+=`background:transparent;color:${c};text-decoration:underline;padding:0 ${sz.px/2}px;`;break;
    default: st+=`background:${c};color:#fff;`;
  }
  return `<button style="${st}"${b.disabled?' disabled':''}>${icon?icon+' ':''}${escHtml(b.label)}</button>`;
}

// ===== renderMenuPreview =====
function renderMenuPreview(){
  const frame=$('#previewFrame');
  if(!frame)return;
  const s=S.style;
  const menu=getSelMenu();
  if(!menu){frame.innerHTML=`<div style="padding:60px;text-align:center;color:${s.textSecondary}">메뉴를 선택하세요</div>`;return}

  const overlay=renderStateOverlay(s);
  const gnb=buildGnbHtml(s);
  const subHeader=buildSubHeaderHtml(s);
  const sidebar=buildSidebarHtml(s);
  const phs=S.pageHeaderSettings;

  // Breadcrumb
  const bc=phs.showBreadcrumb?`<div style="font-size:12px;color:${s.textSecondary};margin-bottom:4px">${escHtml(getBreadcrumb())}</div>`:'';

  // Page header
  const pageHeader=`<div style="margin-bottom:20px">
    ${bc}
    <h2 style="font-size:20px;font-weight:700;color:${s.text}">${escHtml(menu.name)}</h2>
    ${phs.showDescription&&menu.desc?`<p style="font-size:13px;color:${s.textSecondary};margin-top:4px">${escHtml(menu.desc)}</p>`:''}
  </div>`;

  // Banner
  const bannerColors={info:{bg:'#dbeafe',border:'#3b82f6',color:'#1e40af',icon:'ℹ️'},warning:{bg:'#fef3c7',border:'#f59e0b',color:'#92400e',icon:'⚠️'},success:{bg:'#dcfce7',border:'#22c55e',color:'#15803d',icon:'✅'},error:{bg:'#fee2e2',border:'#ef4444',color:'#991b1b',icon:'🚫'}};
  const banner=menu.banner?.show?(() => {
    const bc=bannerColors[menu.banner.type||'info']||bannerColors.info;
    return `<div style="padding:12px 16px;background:${bc.bg};border:1px solid ${bc.border}30;border-radius:${s.radius||8}px;color:${bc.color};font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px">${bc.icon} ${escHtml(menu.banner.text||'')}</div>`;
  })():'';

  // Size options
  const so=menu.sizeOpts||{};

  // Card style helpers
  const scs=(key)=>{const cs=_cs(menu,key);return `background:${cs.bg||s.surface};border-radius:${cs.radius||(s.cardRadius||12)}px;box-shadow:${shadowVal(cs.shadow||'sm')};${cs.border!==false?`border:1px solid ${s.border};`:''}padding:${cs.padding||'20'}px;`};

  // Fields HTML
  const fieldsHtml=(menu.fields||[]).length?`<div style="display:grid;grid-template-columns:repeat(${menu.fieldCols||2},1fr);gap:12px 16px">${menu.fields.map(f=>{const span=f.type==='dateRange'?`grid-column:span ${Math.min(menu.fieldCols||2,2)}`:'';return `<div style="${span}">${renderFieldPreviewHtml(f,s,so)}</div>`}).join('')}</div>`:'';

  // Buttons HTML
  const buttonsHtml=(menu.buttons||[]).length?`<div style="display:flex;gap:8px;justify-content:${so.btnAlign||'flex-end'};margin-top:16px">${menu.buttons.map(b=>renderBtnPreviewHtml(b,s)).join('')}</div>`:'';

  // Grid HTML
  const gridHtml=(cols,rows)=>{
    if(!cols||!cols.length)return '';
    const gs=menu;
    const rh=gs.gridRowHeight||40;
    const compact=gs.gridCompact;
    const cp=compact?'4px 8px':'8px 12px';
    const bordered=gs.gridBordered;
    const striped=gs.gridStriped;
    const scrollable=gs.gridScrollable;
    const fixedH=gs.gridFixedHeight||300;
    const pageSize=gs.pagination?.show?gs.pagination.pageSize:null;
    const displayCount=pageSize||gs.displayRows||5;
    const shownRows=rows.slice(0,displayCount);

    let gh=`<div style="${scrollable?`max-height:${fixedH}px;overflow-y:auto;`:''}">`;
    gh+=`<table style="width:100%;border-collapse:collapse;font-size:13px">`;
    gh+=`<thead><tr style="background:${s.bg};${scrollable?'position:sticky;top:0;z-index:1;':''}">`;
    cols.forEach(c=>{
      const w=c.width?`width:${c.width}px`:(c.flex?'':'');
      gh+=`<th style="padding:${cp};text-align:${c.align||'left'};font-weight:600;font-size:12px;color:${s.textSecondary};border-bottom:2px solid ${s.border};white-space:nowrap;${w}">${escHtml(c.name)}${c.sortable?` <span style="opacity:0.4;font-size:10px">↕</span>`:''}</th>`;
    });
    gh+=`</tr></thead><tbody>`;
    shownRows.forEach((row,ri)=>{
      const bg=striped&&ri%2===1?s.bg+'80':'transparent';
      gh+=`<tr style="background:${bg};${bordered?`border-bottom:1px solid ${s.border};`:''}">`;
      cols.forEach(c=>{
        const val=row[c.name]??'';
        const w=c.width?`width:${c.width}px`:(c.flex?'':'');
        const fixed=c.fixed?`position:sticky;left:0;background:${s.surface};z-index:1;`:'';
        gh+=`<td style="padding:${cp};text-align:${c.align||'left'};height:${rh}px;vertical-align:middle;${bordered?`border-bottom:1px solid ${s.border};`:''}${w}${fixed}">${renderGridCellHtml(c,val,ri,s)}</td>`;
      });
      gh+=`</tr>`;
    });
    gh+=`</tbody></table></div>`;
    return gh;
  };

  // Summary bar
  const summaryBarHtml=()=>{
    if(!menu.summaryBar)return '';
    const rows=getSampleRows(menu);
    const count=rows.length;
    const sum=rows.reduce((a,r)=>{
      const amtCol=(menu.grid||[]).find(c=>c.type==='amount');
      if(!amtCol)return a;
      return a+parseInt(String(r[amtCol.name]||'0').replace(/,/g,''))||0;
    },0);
    return `<div style="display:flex;gap:24px;padding:12px 16px;background:${s.bg};border-radius:${s.radius||8}px;margin-top:12px;font-size:13px">
      ${(menu.summaryItems||[]).map(si=>{
        let val='—';
        if(si.key==='count') val=count+'건';
        else if(si.key==='total') val='₩'+sum.toLocaleString();
        else val='—';
        return `<div><span style="color:${s.textSecondary};margin-right:6px">${escHtml(si.label)}</span><span style="font-weight:${si.highlight?'700':'500'};color:${si.highlight?s.primary:s.text}">${val}</span></div>`;
      }).join('')}
    </div>`;
  };

  // Pagination
  const paginationHtml=()=>{
    if(!menu.pagination?.show)return '';
    const ps=menu.pagination.pageSize||10;
    const totalRows=rows.length||ps*3;
    const totalPages=Math.max(1,Math.ceil(totalRows/ps));
    const btnBase=`padding:4px 10px;border-radius:${s.radius||6}px;font-size:12px;cursor:pointer;`;
    const btnActive=`${btnBase}border:1px solid ${s.primary};background:${s.primary};color:#fff;font-weight:600;`;
    const btnNormal=`${btnBase}border:1px solid ${s.border};background:${s.surface};color:${s.text};`;
    const btnDisabled=`${btnBase}border:1px solid ${s.border};background:${s.bg};color:${s.textSecondary};cursor:default;`;
    const pages=Array.from({length:Math.min(totalPages,5)},(_,i)=>i+1);
    return `<div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:1px solid ${s.border}30;font-size:12px">
      <div style="display:flex;align-items:center;gap:6px;color:${s.textSecondary}">
        <select style="height:28px;padding:0 6px;border:1px solid ${s.border};border-radius:${s.radius||6}px;font-size:12px;background:${s.surface};color:${s.text}">
          ${[5,10,20,30,50,100].map(n=>`<option${n===ps?' selected':''}>${n}</option>`).join('')}
        </select>
        <span>건씩</span>
      </div>
      <div style="display:flex;align-items:center;gap:3px">
        <button style="${btnDisabled}">‹</button>
        ${pages.map(p=>`<button style="${p===1?btnActive:btnNormal}">${p}</button>`).join('')}
        ${totalPages>5?`<span style="padding:0 4px;color:${s.textSecondary}">...</span><button style="${btnNormal}">${totalPages}</button>`:''}
        <button style="${btnNormal}">›</button>
      </div>
      <div style="color:${s.textSecondary}">총 <strong style="color:${s.text}">${totalRows}</strong>건</div>
    </div>`;
  };

  // === SECTION RENDERERS (각 영역을 독립 함수로) ===
  const rows=getSampleRows(menu);
  const type=menu.type||'search';

  const SEC={
    kpi:()=>{
      if(!menu.statItems||!menu.statItems.length) menu.statItems=[
        {label:"총 건수",value:"1,284",change:"+12.5%",up:true},
        {label:"총 금액",value:"₩4.2억",change:"+8.3%",up:true},
        {label:"평균 단가",value:"₩327,000",change:"-2.1%",up:false},
        {label:"처리율",value:"94.7%",change:"+1.2%",up:true}
      ];
      return `<div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">${(menu.statItems||[]).map(st=>`
        <div style="flex:1;min-width:${so.kpiMinWidth||140}px;${scs('stat')}">
          <div style="font-size:12px;color:${s.textSecondary}">${escHtml(st.label)}</div>
          <div style="font-size:22px;font-weight:700;color:${s.text};margin-top:4px">${escHtml(st.value)}</div>
          ${st.change?`<div style="font-size:11px;color:${st.up?'#22c55e':'#ef4444'};margin-top:2px">${st.up?'▲':'▼'} ${escHtml(st.change)}</div>`:''}
        </div>`).join('')}</div>`;
    },
    search:()=>`<div style="${scs('search')};margin-bottom:16px">${fieldsHtml}${buttonsHtml}</div>`,
    grid:()=>`<div style="${scs('data')}">${gridHtml(menu.grid,rows)}${summaryBarHtml()}${paginationHtml()}</div>`,
    chart:()=>`<div style="${scs('data')};min-height:${so.chartHeight||300}px;display:flex;align-items:center;justify-content:center">
      <div style="text-align:center;color:${s.textSecondary}"><div style="font-size:48px;margin-bottom:8px">📈</div><div>차트 영역</div><div style="font-size:12px;margin-top:4px">${escHtml(menu.chartType||'bar')} chart · ${escHtml(menu.chartTitle||menu.name)}</div></div>
    </div>`,
    timeline:()=>{
      const items=menu.timelineItems||[{date:'2026-03-19',title:'이벤트 1',desc:'설명'},{date:'2026-03-18',title:'이벤트 2',desc:'설명'}];
      return `<div style="${scs('data')}">
        ${items.map((it,i)=>`<div style="display:flex;gap:16px;padding:${so.timelineGap||16}px 0;${i<items.length-1?`border-bottom:1px solid ${s.border};`:''}">
          <div style="display:flex;flex-direction:column;align-items:center"><div style="width:10px;height:10px;border-radius:50%;background:${s.primary};margin-top:4px"></div>${i<items.length-1?`<div style="width:2px;flex:1;background:${s.border};margin-top:4px"></div>`:''}</div>
          <div><div style="font-size:11px;color:${s.textSecondary}">${escHtml(it.date||'')}</div><div style="font-size:14px;font-weight:600;color:${s.text};margin-top:2px">${it.icon?escHtml(it.icon)+' ':''}${escHtml(it.title||'')}</div>${it.status?`<span style="display:inline-block;margin-top:4px;padding:2px 8px;border-radius:9999px;font-size:11px;background:${s.primary}15;color:${s.primary}">${escHtml(it.status)}</span>`:''}<div style="font-size:13px;color:${s.textSecondary};margin-top:4px">${escHtml(it.desc||'')}</div></div>
        </div>`).join('')}
      </div>`;
    },
    form:()=>{
      const sections=menu.formSections||[{title:'기본 정보',fields:['필드1','필드2']}];
      return `<div style="${scs('form')}">
        ${sections.map(sec=>`<div style="margin-bottom:24px"><h3 style="font-size:15px;font-weight:600;color:${s.text};margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid ${s.border}">${escHtml(sec.title)}</h3>
          <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">${(sec.fields||[]).map(fl=>`<div><label style="display:block;font-size:12px;font-weight:500;color:${s.textSecondary};margin-bottom:4px">${escHtml(fl)}</label><input type="text" style="width:100%;height:34px;padding:0 10px;border:1px solid ${s.border};border-radius:${s.radius||6}px;font-size:13px;background:${s.surface}"></div>`).join('')}</div>
        </div>`).join('')}
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">${(menu.buttons||[]).map(b=>renderBtnPreviewHtml(b,s)).join('')}</div>
      </div>`;
    },
    calendar:()=>{
      const days=['일','월','화','수','목','금','토'];
      const events=menu.calendarEvents||[];
      return `<div style="${scs('data')}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <button style="padding:4px 12px;border:1px solid ${s.border};border-radius:4px;background:${s.surface};cursor:pointer">‹</button>
          <span style="font-size:16px;font-weight:600;color:${s.text}">2026년 3월</span>
          <button style="padding:4px 12px;border:1px solid ${s.border};border-radius:4px;background:${s.surface};cursor:pointer">›</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px">
          ${days.map(d=>`<div style="text-align:center;padding:8px;font-size:12px;font-weight:600;color:${s.textSecondary}">${d}</div>`).join('')}
          ${Array.from({length:31},(_,i)=>{
            const ev=events.find(e=>parseInt(e.date?.split('-')[2])===i+1);
            return `<div style="text-align:center;padding:6px 4px;font-size:12px;border:1px solid ${s.border}40;min-height:60px;cursor:pointer;border-radius:4px${i+1===19?`;background:${s.primary}10;font-weight:700;color:${s.primary}`:''}">${i+1}${ev?`<div style="margin-top:2px;padding:2px 4px;border-radius:3px;background:${ev.type==='입금'?'#22c55e15':'#ef444415'};color:${ev.type==='입금'?'#22c55e':'#ef4444'};font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(ev.title||'')}</div>`:''}</div>`;
          }).join('')}
        </div>
      </div>`;
    },
    kanban:()=>{
      const cols=menu.kanbanColumns||[{name:'대기',color:'#f59e0b',items:[]},{name:'진행중',color:'#3b82f6',items:[]},{name:'완료',color:'#22c55e',items:[]}];
      return `<div style="display:flex;gap:16px;overflow-x:auto;padding-bottom:8px">
        ${cols.map(c=>{
          const items=c.items||[{title:'작업 항목 1',assignee:'홍길동',priority:'중간'},{title:'작업 항목 2',assignee:'김영희',priority:'높음'}];
          return `<div style="min-width:${so.kanbanColWidth||260}px;flex:1;background:${s.bg};border-radius:${s.cardRadius||12}px;padding:12px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><div style="width:8px;height:8px;border-radius:50%;background:${c.color}"></div><span style="font-size:13px;font-weight:600;color:${s.text}">${escHtml(c.title||'')}</span><span style="font-size:11px;color:${s.textSecondary};margin-left:auto">${items.length}</span></div>
          ${items.map(it=>`<div style="background:${s.surface};border-radius:${s.radius||8}px;padding:12px;margin-bottom:8px;border:1px solid ${s.border};cursor:pointer">
            <div style="font-size:13px;font-weight:500;color:${s.text}">${escHtml(it.title)}</div>
            <div style="font-size:11px;color:${s.textSecondary};margin-top:4px">${escHtml(it.assignee||'')}${it.priority?` · ${it.priority}`:''}</div>
          </div>`).join('')}
        </div>`}).join('')}
      </div>`;
    },
    profile:()=>{
      const pd=menu.profileData||{name:'홍길동',avatar:'👤',subtitle:'경영지원실 · 실장',fields:[{label:'사번',value:'EMP-001'},{label:'입사일',value:'2020-03-15'}],stats:[]};
      return `<div style="display:flex;gap:24px;flex-wrap:wrap">
        <div style="flex:0 0 ${so.profileWidth||280}px;${scs('stat')};text-align:center">
          <div style="width:80px;height:80px;border-radius:50%;background:${s.primary}20;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px">${escHtml(pd.avatar||'👤')}</div>
          <div style="font-size:18px;font-weight:700;color:${s.text}">${escHtml(pd.name)}</div>
          <div style="font-size:13px;color:${s.textSecondary};margin-top:4px">${escHtml(pd.subtitle||'')}</div>
          ${(pd.stats||[]).length?`<div style="display:flex;gap:12px;margin-top:16px;padding-top:16px;border-top:1px solid ${s.border}">${pd.stats.map(st=>`<div style="flex:1"><div style="font-size:11px;color:${s.textSecondary}">${escHtml(st.label)}</div><div style="font-size:15px;font-weight:700;color:${s.text};margin-top:2px">${escHtml(st.value)}</div></div>`).join('')}</div>`:''}
          <div style="margin-top:16px;padding-top:16px;border-top:1px solid ${s.border}">
            ${(pd.fields||[]).map(it=>`<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px"><span style="color:${s.textSecondary}">${escHtml(it.label)}</span><span style="color:${s.text};font-weight:500">${escHtml(it.value)}</span></div>`).join('')}
          </div>
        </div>
        <div style="flex:1;min-width:300px;${scs('data')}">
          <h3 style="font-size:15px;font-weight:600;color:${s.text};margin-bottom:12px">활동 내역</h3>
          ${[{t:'결재 완료: 경비 지출건',d:'2026-03-19 14:30'},{t:'이체 요청: (주)웹케시',d:'2026-03-19 10:15'},{t:'보고서 조회: 월간보고서',d:'2026-03-18 16:45'}].map(it=>`<div style="padding:10px 0;border-bottom:1px solid ${s.border}"><div style="font-size:13px;color:${s.text}">${it.t}</div><div style="font-size:11px;color:${s.textSecondary};margin-top:2px">${it.d}</div></div>`).join('')}
        </div>
      </div>`;
    },
    gallery:()=>{
      const colCount=menu.galleryCols||3;
      const items=menu.galleryItems||[1,2,3,4,5,6].map(i=>({title:'항목 '+i,date:'2026-03-'+String(20-i).padStart(2,'0'),type:'문서',size:'1.2MB'}));
      return `<div style="display:grid;grid-template-columns:repeat(${colCount},1fr);gap:16px">
        ${items.map((it,i)=>`<div style="${scs('data')};overflow:hidden;cursor:pointer">
          <div style="height:${so.thumbHeight||100}px;background:${s.primary}${(10+i*3).toString(16)};display:flex;align-items:center;justify-content:center;font-size:28px">${it.type==='영수증'?'🧾':it.type==='계약서'?'📜':it.type==='견적서'?'📋':it.type==='세금계산서'?'🧮':'🖼'}</div>
          <div style="padding:10px"><div style="font-size:13px;font-weight:600;color:${s.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(typeof it==='object'?it.title:'항목 '+it)}</div><div style="font-size:11px;color:${s.textSecondary};margin-top:4px">${typeof it==='object'?(it.date||'')+(it.size?' · '+it.size:''):'설명'}</div></div>
        </div>`).join('')}
      </div>`;
    },
    splitLeft:()=>`<div style="flex:1;${scs('data')}">${gridHtml(menu.grid,rows)}</div>`,
    splitRight:()=>`<div style="flex:1;${scs('data')}"><div style="text-align:center;padding:40px;color:${s.textSecondary}"><div style="font-size:32px;margin-bottom:8px">📄</div><div>항목을 선택하면 상세 정보가 표시됩니다</div></div></div>`,
    dashboard:()=>{
      const widgets=menu.dashboardWidgets||[{type:'chart',title:'매출 추이',span:2},{type:'stat',title:'핵심 지표',span:1},{type:'list',title:'최근 활동',span:1}];
      return `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
        ${widgets.map(w=>`<div style="grid-column:span ${w.span||1};${scs('data')};min-height:${so.widgetMinHeight||200}px">
          <div style="font-size:14px;font-weight:600;color:${s.text};margin-bottom:12px">${escHtml(w.title)}</div>
          <div style="display:flex;align-items:center;justify-content:center;height:140px;color:${s.textSecondary};font-size:13px">${w.type==='chart'?'📈 차트':w.type==='stat'?'📊 통계':'📋 목록'}</div>
        </div>`).join('')}
      </div>`;
    },
    buttons:()=>(menu.buttons||[]).length?`<div style="display:flex;gap:8px;justify-content:${so.btnAlign||'flex-end'};margin-top:16px">${(menu.buttons||[]).map(b=>renderBtnPreviewHtml(b,s)).join('')}</div>`:''
  };

  // 기본 섹션 순서 (카드타입별)
  const DEFAULT_SECTIONS={
    search:['search','grid'],
    kpiDetail:['kpi','search','grid'],
    chart:['search','chart'],
    timeline:['search','timeline'],
    form:['form'],
    stat:['search','kpi','grid'],
    calendar:['search','calendar'],
    kanban:['kanban'],
    profile:['profile'],
    gallery:['search','gallery'],
    splitView:['search','splitLeft','splitRight'],
    dashboard:['search','dashboard'],
    detail:['search','grid','buttons']
  };

  // 사용자 커스텀 섹션 또는 기본값
  const activeSections=menu.sections||(DEFAULT_SECTIONS[type]||['search','grid']);

  let contentHtml='';
  if(overlay){
    contentHtml=overlay;
  } else if(type==='splitView'){
    // splitView는 flex 래퍼 필요
    const pre=activeSections.filter(s=>s!=='splitLeft'&&s!=='splitRight');
    pre.forEach(sec=>{if(SEC[sec]&&(sec!=='search'||menu.showSearchCard!==false)) contentHtml+=SEC[sec]()});
    contentHtml+=`<div style="display:flex;gap:16px">${SEC.splitLeft()}${SEC.splitRight()}</div>`;
  } else {
    activeSections.forEach(sec=>{
      if(!SEC[sec]) return;
      // 조건 체크
      if(sec==='search'&&(menu.showSearchCard===false||!(menu.fields||[]).length)) return;
      if(sec==='grid'&&(menu.showDataGrid===false||!(menu.grid||[]).length)) return;
      contentHtml+=SEC[sec]();
    });
  }

  frame.innerHTML=`
    ${gnb}${subHeader}
    <div style="display:flex;min-height:600px">
      ${sidebar}
      <div style="flex:1;padding:24px;background:${s.bg};overflow-y:auto;max-width:${S.layoutOpts.contentMaxWidth||1200}px">
        ${pageHeader}${banner}${contentHtml}
      </div>
    </div>
  `;
}

// ===== renderStyleTab =====
function renderStyleTab(){
  const el=$('#leftTabStyle');
  if(!el)return;
  const s=S.style;
  // Brand presets
  let h=`<div class="section-title">브랜드 프리셋</div>`;
  h+=`<div class="preset-grid">${BRAND_PRESETS.map((p,i)=>`
    <div class="preset-card${S.brandIdx===i?' active':''}" onclick="applyBrandPreset(${i})">
      <div class="preset-colors"><span style="background:${p.primary}"></span><span style="background:${p.primaryDark}"></span><span style="background:${p.gnbBg}"></span></div>
      <div class="preset-name">${escHtml(p.name)}</div>
    </div>`).join('')}</div>`;

  // Custom colors
  h+=`<div class="section-title">커스텀 색상</div>`;
  const colorFields=[
    {key:'primary',label:'Primary'},
    {key:'primaryDark',label:'Primary Dark'},
    {key:'bg',label:'배경'},
    {key:'surface',label:'Surface'},
    {key:'border',label:'Border'},
    {key:'text',label:'텍스트'},
    {key:'textSecondary',label:'보조 텍스트'},
    {key:'gnbBg',label:'GNB 배경'},
    {key:'gnbText',label:'GNB 텍스트'},
    {key:'sidebarBg',label:'사이드바 배경'}
  ];
  colorFields.forEach(cf=>{
    h+=`<div class="form-group" style="display:flex;align-items:center;gap:8px">
      <input type="color" value="${s[cf.key]||'#000000'}" onchange="S.style.${cf.key}=this.value;applyStyleVars();renderPreviewOnly()" style="width:28px;height:28px;padding:0;border:1px solid var(--c-border);border-radius:4px;cursor:pointer">
      <span style="font-size:12px;flex:1;color:var(--c-text-secondary)">${cf.label}</span>
      <input class="form-input" value="${escHtml(s[cf.key]||'')}" onchange="S.style.${cf.key}=this.value;applyStyleVars();renderPreviewOnly()" style="width:80px;height:24px;font-size:11px;text-align:center">
    </div>`;
  });

  // Typography
  h+=`<div class="section-title">타이포그래피</div>`;
  h+=`<div class="form-group"><label class="form-label">폰트</label><input class="form-input" value="${escHtml(s.fontFamily||'')}" onchange="S.style.fontFamily=this.value;renderPreviewOnly()"></div>`;
  h+=`<div class="form-group"><label class="form-label">카드 Radius</label><input type="range" min="0" max="24" value="${s.cardRadius||12}" oninput="S.style.cardRadius=this.value;applyStyleVars();renderPreviewOnly()" style="width:100%"><span style="font-size:11px;color:var(--c-text-muted)">${s.cardRadius||12}px</span></div>`;
  h+=`<div class="form-group"><label class="form-label">버튼 Radius</label><input type="range" min="0" max="24" value="${s.buttonRadius||s.radius||8}" oninput="S.style.buttonRadius=this.value;renderPreviewOnly()" style="width:100%"><span style="font-size:11px;color:var(--c-text-muted)">${s.buttonRadius||s.radius||8}px</span></div>`;
  h+=`<div class="form-group"><label class="form-label">기본 Radius</label><input type="range" min="0" max="16" value="${s.radius||8}" oninput="S.style.radius=this.value;applyStyleVars();renderPreviewOnly()" style="width:100%"><span style="font-size:11px;color:var(--c-text-muted)">${s.radius||8}px</span></div>`;

  el.innerHTML=h;
}

// ===== renderLayoutTab =====

  const lo=S.layoutOpts;

  h+=`<div class="form-group"><select class="form-select" value="${lo.sidebar}" onchange="setLayoutOpt('sidebar',this.value)">
    <option value="icon-label"${lo.sidebar==='icon-label'?' selected':''}>아이콘+텍스트</option>
    <option value="label"${lo.sidebar==='label'?' selected':''}>텍스트만</option>
    <option value="icon"${lo.sidebar==='icon'?' selected':''}>아이콘만</option>
    <option value="hidden"${lo.sidebar==='hidden'?' selected':''}>숨김</option>
  </select></div>`;
  h+=`<div class="form-group"><label class="form-label">사이드바 너비</label><input type="range" min="160" max="300" value="${S.sidebarSettings.width||220}" oninput="S.sidebarSettings.width=parseInt(this.value);renderPreviewOnly()" style="width:100%"><span style="font-size:11px;color:var(--c-text-muted)">${S.sidebarSettings.width||220}px</span></div>`;

  h+=`<div class="section-title">GNB</div>`;

function renderDynRightPanel(){
  const tabs=getContextTabs();
  if(!tabs.length)return;
  // Update right panel tabs
  const rightTabs=$$('.right-tabs button');
  const rightContents=$$('.right-tab-content');
  const tabsContainer=$('#panelRight .right-tabs');
  const titleEl=$('#rightTitle');

  if(!_dynRightTab||!tabs.find(t=>t.id===_dynRightTab)){
    _dynRightTab=tabs[0].id;
  }

  if(tabsContainer){
    tabsContainer.innerHTML=tabs.map(t=>`<button class="${t.id===_dynRightTab?'active':''}" onclick="switchDynRightTab('${t.id}')">${escHtml(t.label)}</button>`).join('');
  }

  // Find active tab
  const activeTabDef=tabs.find(t=>t.id===_dynRightTab);
  if(!activeTabDef)return;

  // We use the first right-tab-content as the render target, hide others
  const allContents=$$('#panelRight .right-tab-content');
  allContents.forEach((el,i)=>{
    if(i===0){el.classList.add('active');el.style.display='block';}
    else{el.classList.remove('active');el.style.display='none';}
  });

  const target=allContents[0];
  if(target&&activeTabDef.render){
    activeTabDef.render(target);
  }

  if(titleEl){
    const mi=S.sel.menu;
    if(mi===-1) titleEl.textContent='홈 편집';
    else if(mi===-2) titleEl.textContent='로그인 편집';
    else titleEl.textContent=(getSelMenu()?.name||'메뉴')+' 편집';
  }
}

function renderMenuBasicEditor(el,menu){
  let h=`
    <div class="form-group"><label class="form-label">메뉴명</label><input class="form-input" value="${escHtml(menu.name||'')}" oninput="getSelMenu().name=this.value;render()"></div>

    <div class="form-group"><label class="form-label">유형</label>
      <div class="card-type-selector">${CARD_TYPES.map(ct=>`<div class="card-type-btn${menu.type===ct.id?' active':''}" onclick="getSelMenu().type='${ct.id}';getSelMenu().sections=null;render()" title="${escHtml(ct.desc)}">${ct.icon} ${escHtml(ct.name)}</div>`).join('')}</div>
    </div>
  `;
  // === 카드타입별 관련 설정만 표시 ===
  const type=menu.type||'search';
  // 그리드가 있는 타입
  const hasGrid=['search','kpiDetail','splitView','stat','detail'].includes(type);
  // 조회조건(필드)이 있는 타입
  const hasSearch=['search','kpiDetail','splitView','chart','timeline','stat','dashboard','detail','calendar','kanban'].includes(type);
  // 배너: 모든 타입에서 사용 가능
  h+=`<div class="section-title">배너</div>`;
  h+=`<label class="form-checkbox"><input type="checkbox" ${menu.banner?.show?'checked':''} onchange="getSelMenu().banner.show=this.checked;renderPreviewOnly();renderDynRightPanel()"> 배너 표시</label>`;
  if(menu.banner?.show){
    h+=`<div class="form-group" style="margin-top:8px"><select class="form-select" onchange="getSelMenu().banner.type=this.value;renderPreviewOnly()">
      ${['info','warning','success','error'].map(t=>`<option value="${t}"${menu.banner.type===t?' selected':''}>${t}</option>`).join('')}
    </select></div>`;
    h+=`<div class="form-group"><input class="form-input" value="${escHtml(menu.banner.text||'')}" placeholder="배너 텍스트" oninput="getSelMenu().banner.text=this.value;renderPreviewOnly()"></div>`;
  }
  // 조회조건 관련 (검색/KPI/분할/차트/타임라인)
  if(hasSearch){
    h+=`<div class="section-title">검색 설정</div>`;
    h+=`<div class="form-group"><label class="form-label">검색 필드 열수</label><select class="form-select" onchange="getSelMenu().fieldCols=parseInt(this.value);renderPreviewOnly()">
      ${[1,2,3,4].map(n=>`<option value="${n}"${(menu.fieldCols||2)===n?' selected':''}>${n}열</option>`).join('')}
    </select></div>`;
    h+=`<label class="form-checkbox"><input type="checkbox" ${menu.showSearchCard!==false?'checked':''} onchange="getSelMenu().showSearchCard=this.checked;renderPreviewOnly()"> 검색카드 표시</label>`;
  }
  // 그리드 관련 (조회+테이블/KPI상세/분할/통계)
  if(hasGrid){
    h+=`<div class="section-title">그리드 설정</div>`;
    h+=`<div class="form-group"><label class="form-label">표시 행수</label><input type="number" class="form-input" value="${menu.displayRows||5}" min="1" max="50" onchange="getSelMenu().displayRows=parseInt(this.value);renderPreviewOnly()"></div>`;
    h+=`<label class="form-checkbox"><input type="checkbox" ${menu.gridScrollable?'checked':''} onchange="getSelMenu().gridScrollable=this.checked;renderPreviewOnly();renderDynRightPanel()"> 스크롤 고정 높이</label>`;
    if(menu.gridScrollable){
      h+=`<div class="form-group" style="margin-top:4px"><label class="form-label">고정 높이(px)</label><input type="number" class="form-input" value="${menu.gridFixedHeight||300}" min="100" max="800" onchange="getSelMenu().gridFixedHeight=parseInt(this.value);renderPreviewOnly()"></div>`;
    }
    h+=`<label class="form-checkbox"><input type="checkbox" ${menu.gridStriped?'checked':''} onchange="getSelMenu().gridStriped=this.checked;renderPreviewOnly()"> 줄무늬(striped)</label>`;
    h+=`<label class="form-checkbox"><input type="checkbox" ${menu.gridBordered?'checked':''} onchange="getSelMenu().gridBordered=this.checked;renderPreviewOnly()"> 테두리선(bordered)</label>`;
    h+=`<label class="form-checkbox"><input type="checkbox" ${menu.gridCompact?'checked':''} onchange="getSelMenu().gridCompact=this.checked;renderPreviewOnly()"> 컴팩트</label>`;
    h+=`<div class="form-group"><label class="form-label">행 높이</label><input type="range" min="28" max="60" value="${menu.gridRowHeight||40}" oninput="getSelMenu().gridRowHeight=parseInt(this.value);this.nextElementSibling.textContent=this.value+'px';renderPreviewOnly()" style="width:100%"><span style="font-size:11px;color:var(--c-text-muted)">${menu.gridRowHeight||40}px</span></div>`;
    h+=`<label class="form-checkbox"><input type="checkbox" ${menu.showDataGrid!==false?'checked':''} onchange="getSelMenu().showDataGrid=this.checked;renderPreviewOnly()"> 데이터그리드 표시</label>`;
    // 페이지네이션 (그리드가 있을 때만)
    h+=`<div class="section-title">페이지네이션</div>`;
    h+=`<label class="form-checkbox"><input type="checkbox" ${menu.pagination?.show?'checked':''} onchange="getSelMenu().pagination.show=this.checked;renderPreviewOnly();renderDynRightPanel()"> 페이지네이션 표시</label>`;
    if(menu.pagination?.show){
      h+=`<div class="form-group" style="margin-top:4px"><label class="form-label">건수/페이지</label><select class="form-select" onchange="getSelMenu().pagination.pageSize=parseInt(this.value);renderPreviewOnly()">
        ${[5,10,20,30,50,100].map(n=>`<option value="${n}"${(menu.pagination.pageSize||10)===n?' selected':''}>${n}</option>`).join('')}
      </select></div>`;
    }
    // 합계 바 (그리드가 있을 때만)
    h+=`<div class="section-title">합계 바</div>`;
    h+=`<label class="form-checkbox"><input type="checkbox" ${menu.summaryBar?'checked':''} onchange="getSelMenu().summaryBar=this.checked;renderPreviewOnly();renderDynRightPanel()"> 합계 바 표시</label>`;
  }

  // === 섹션 순서 편집 ===
  const SECTION_LABELS={search:'🔍 조회조건',grid:'📊 데이터그리드',kpi:'📈 KPI카드',chart:'📉 차트',timeline:'🕐 타임라인',form:'📝 입력폼',calendar:'🗓 캘린더',kanban:'📋 칸반보드',profile:'👤 프로필',gallery:'🖼 갤러리',splitLeft:'◧ 좌측패널',splitRight:'◨ 우측패널',dashboard:'🎛 대시보드',buttons:'🔘 버튼'};
  const DEFAULT_SECTIONS_MAP={search:['search','grid'],kpiDetail:['kpi','search','grid'],chart:['search','chart'],timeline:['search','timeline'],form:['form'],stat:['search','kpi','grid'],calendar:['search','calendar'],kanban:['kanban'],profile:['profile'],gallery:['search','gallery'],splitView:['search','splitLeft','splitRight'],dashboard:['search','dashboard'],detail:['search','grid','buttons']};
  const secs=menu.sections||(DEFAULT_SECTIONS_MAP[type]||['search','grid']);
  const allSecs=Object.keys(SECTION_LABELS);
  const availableSecs=allSecs.filter(k=>!secs.includes(k));

  h+=`<div class="section-title">화면 섹션 구성</div>`;
  h+=`<div style="font-size:11px;color:var(--c-text-muted);margin-bottom:8px">섹션 순서를 변경하거나 추가/제거합니다</div>`;
  h+=`<div class="edit-list">`;
  secs.forEach((sec,i)=>{
    h+=`<div class="edit-item">
      <span style="font-size:12px">${SECTION_LABELS[sec]||sec}</span>
      <div class="edit-item-actions">
        <button class="btn-icon btn-ghost" onclick="moveSec(${i},'up')">↑</button>
        <button class="btn-icon btn-ghost" onclick="moveSec(${i},'down')">↓</button>
        <button class="btn-icon btn-ghost" onclick="removeSec(${i})">✕</button>
      </div>
    </div>`;
  });
  h+=`</div>`;
  if(availableSecs.length){
    h+=`<div style="margin-top:6px"><select class="form-select" style="font-size:12px" onchange="if(this.value){addSec(this.value);this.value=''}">
      <option value="">+ 섹션 추가...</option>
      ${availableSecs.map(k=>`<option value="${k}">${SECTION_LABELS[k]||k}</option>`).join('')}
    </select></div>`;
  }

  el.innerHTML=h;
}
function moveSec(i,dir){const m=getSelMenu();if(!m)return;const secs=m.sections||(m.sections=[...({search:['search','grid'],kpiDetail:['kpi','search','grid'],chart:['search','chart'],timeline:['search','timeline'],form:['form'],stat:['search','kpi','grid'],calendar:['search','calendar'],kanban:['kanban'],profile:['profile'],gallery:['search','gallery'],splitView:['search','splitLeft','splitRight'],dashboard:['search','dashboard'],detail:['search','grid','buttons']}[m.type||'search']||['search','grid'])]);const j=dir==='up'?i-1:i+1;if(j<0||j>=secs.length)return;[secs[i],secs[j]]=[secs[j],secs[i]];m.sections=secs;render()}
function removeSec(i){const m=getSelMenu();if(!m)return;const secs=m.sections||(m.sections=[...({search:['search','grid'],kpiDetail:['kpi','search','grid'],chart:['search','chart'],timeline:['search','timeline'],form:['form'],stat:['search','kpi','grid'],calendar:['search','calendar'],kanban:['kanban'],profile:['profile'],gallery:['search','gallery'],splitView:['search','splitLeft','splitRight'],dashboard:['search','dashboard'],detail:['search','grid','buttons']}[m.type||'search']||['search','grid'])]);secs.splice(i,1);m.sections=secs;render()}
function addSec(sec){const m=getSelMenu();if(!m)return;if(!m.sections)m.sections=[...({search:['search','grid'],kpiDetail:['kpi','search','grid'],chart:['search','chart'],timeline:['search','timeline'],form:['form'],stat:['search','kpi','grid'],calendar:['search','calendar'],kanban:['kanban'],profile:['profile'],gallery:['search','gallery'],splitView:['search','splitLeft','splitRight'],dashboard:['search','dashboard'],detail:['search','grid','buttons']}[m.type||'search']||['search','grid'])];m.sections.push(sec);render()}

// ===== SAMPLE DATA EDITOR =====
function renderSampleEditor(el,menu){
  const rows=getSampleRows(menu);
  const cols=menu.grid||[];
  let h=`<div class="section-title">샘플 데이터 (${rows.length}행)</div>`;
  h+=`<div style="display:flex;gap:4px;margin-bottom:8px">
    <button class="btn btn-sm btn-outline" onclick="addSampleRow()">+ 행 추가</button>
    <button class="btn btn-sm btn-outline" onclick="regenerateSample()">🔄 재생성</button>
  </div>`;
  h+=`<div style="overflow-x:auto;max-height:400px;overflow-y:auto">`;
  h+=`<table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr>`;
  cols.forEach(c=>{h+=`<th style="padding:4px 6px;border:1px solid var(--c-border);background:var(--c-bg);font-weight:600;white-space:nowrap">${escHtml(c.name)}</th>`});
  h+=`<th style="padding:4px;border:1px solid var(--c-border);background:var(--c-bg);width:30px"></th></tr></thead><tbody>`;
  rows.forEach((row,ri)=>{
    h+=`<tr>`;
    cols.forEach(c=>{
      h+=`<td style="padding:2px 4px;border:1px solid var(--c-border)"><input style="width:100%;border:none;background:transparent;font-size:11px;padding:2px" value="${escHtml(row[c.name]??'')}" onchange="updateSampleCell(${ri},'${escHtml(c.name)}',this.value)"></td>`;
    });
    h+=`<td style="padding:2px;border:1px solid var(--c-border);text-align:center"><button class="btn-icon btn-ghost" onclick="removeSampleRow(${ri})" style="font-size:10px">✕</button></td>`;
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;
  el.innerHTML=h;
}
function addSampleRow(){
  const menu=getSelMenu();if(!menu)return;
  const rows=getSampleRows(menu);
  const newRow={};
  (menu.grid||[]).forEach(c=>{newRow[c.name]=inferSampleValue(c,rows.length)});
  menu.sampleData.push(newRow);
  render();
}
function removeSampleRow(i){
  const menu=getSelMenu();if(!menu||!menu.sampleData)return;
  menu.sampleData.splice(i,1);render();
}
function regenerateSample(){
  const menu=getSelMenu();if(!menu)return;
  menu.sampleData=buildSampleRows(menu,menu.displayRows||5);
  render();
}
function updateSampleCell(ri,colName,val){
  const menu=getSelMenu();if(!menu||!menu.sampleData)return;
  if(menu.sampleData[ri]) menu.sampleData[ri][colName]=val;
  renderPreviewOnly();
}

function renderCardStyleEditor(el,menu){
  const keys=['search','data','stat','form'];
  const labels={search:'검색 카드',data:'데이터 카드',stat:'통계 카드',form:'폼 카드'};
  if(!menu.cardStyles) menu.cardStyles={};
  let h=`<div class="section-title">카드 스타일 오버라이드</div>`;
  keys.forEach(k=>{
    const cs=menu.cardStyles[k]||{};
    h+=`<div style="margin-bottom:12px;padding:8px;background:var(--c-bg);border-radius:6px">`;
    h+=`<div style="font-size:12px;font-weight:600;margin-bottom:6px">${labels[k]||k}</div>`;
    h+=buildCardStyleFields(k,cs);
    h+=`</div>`;
