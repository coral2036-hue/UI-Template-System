function buildCardStyleFields(key,cs){
  return `
    <div class="form-group" style="margin-bottom:4px"><label class="form-label">배경색</label><input class="form-input" value="${escHtml(cs.bg||'')}" placeholder="기본값" onchange="setCardStyle('${key}','bg',this.value)" style="height:24px;font-size:11px"></div>
    <div class="form-group" style="margin-bottom:4px"><label class="form-label">Radius</label><input class="form-input" value="${escHtml(cs.radius||'')}" placeholder="기본값" onchange="setCardStyle('${key}','radius',this.value)" style="height:24px;font-size:11px"></div>
    <div class="form-group" style="margin-bottom:4px"><label class="form-label">Shadow</label><select class="form-select" onchange="setCardStyle('${key}','shadow',this.value)" style="height:24px;font-size:11px">
      ${['none','sm','md','lg'].map(v=>`<option value="${v}"${(cs.shadow||'sm')===v?' selected':''}>${v}</option>`).join('')}
    </select></div>
    <div class="form-group" style="margin-bottom:4px"><label class="form-label">Padding</label><input class="form-input" value="${escHtml(cs.padding||'')}" placeholder="기본값" onchange="setCardStyle('${key}','padding',this.value)" style="height:24px;font-size:11px"></div>
    <label class="form-checkbox" style="font-size:11px"><input type="checkbox" ${cs.border!==false?'checked':''} onchange="setCardStyle('${key}','border',this.checked)"> 테두리</label>
  `;
}
function setCardStyle(key,prop,val){
  const menu=getSelMenu();if(!menu)return;
  if(!menu.cardStyles) menu.cardStyles={};
  if(!menu.cardStyles[key]) menu.cardStyles[key]={};
  menu.cardStyles[key][prop]=val;
  renderPreviewOnly();
}
function getCardStyle(key){
  const menu=getSelMenu();
  return menu?.cardStyles?.[key]||{};
}

}

    h+=`<div style="display:flex;align-items:center;gap:4px;margin-bottom:8px"><span style="font-size:13px;font-weight:600">${escHtml(f.name)}</span>
      <button class="btn-icon btn-ghost" onclick="const v=prompt('흐름명',S.flows[${fi}].name);if(v)S.flows[${fi}].name=v;renderFlowTab()" style="margin-left:auto">✏️</button>
      <button class="btn-icon btn-ghost" onclick="S.flows.splice(${fi},1);renderFlowTab()">✕</button>
    </div>`;
    h+=`<div class="flow-row">${f.nodes.map((n,ni)=>`${ni>0?'<span class="flow-arrow">→</span>':''}<span class="flow-node ${n.type==='start'?'flow-start':n.type==='end'?'flow-end':''}">${escHtml(n.label)}</span>`).join('')}</div>`;
    h+=`<button class="btn btn-sm btn-ghost" onclick="S.flows[${fi}].nodes.splice(S.flows[${fi}].nodes.length-1,0,{id:uid(),label:'단계',type:'normal'});renderFlowTab()">+ 단계</button>`;
    h+=`</div>`;
  });
  h+=`<button class="btn btn-sm btn-outline" onclick="addFlow()">+ 흐름 추가</button>`;
  el.innerHTML=h;
}

// ===== CUSTOM COMPONENTS =====
function registerComponent(){
  const menu=getSelMenu();
  if(!menu){showToast('메뉴를 먼저 선택하세요');return}
  const name=prompt('컴포넌트 이름',menu.name+' 템플릿');
  if(!name)return;
  S.customComponents.push({id:uid(),name,data:JSON.parse(JSON.stringify(menu))});
  showToast(`"${name}" 컴포넌트 등록됨`);
}
function applyComponent(idx){
  const comp=S.customComponents[idx];
  if(!comp)return;
  const menu=getSelMenu();
  if(!menu){showToast('메뉴를 먼저 선택하세요');return}
  Object.assign(menu,JSON.parse(JSON.stringify(comp.data)));
  render();
  showToast(`"${comp.name}" 적용됨`);
}

function renderPrompt(){
  const el=$('#promptOutput');
  if(!el)return;
  switch(S.promptTab){
    case 'html': el.textContent=buildHtmlPrompt();break;
    case 'pencil': el.textContent=buildPencilPrompt();break;

function buildMenuContentPrompt(menu,s){
  if(!menu) return '';
  const type=menu.type||'search';
  const defaultSecs={search:['search','grid'],kpiDetail:['kpi','search','grid'],chart:['search','chart'],timeline:['search','timeline'],form:['form'],stat:['search','kpi','grid'],calendar:['search','calendar'],kanban:['kanban'],profile:['profile'],gallery:['search','gallery'],splitView:['search','splitLeft','splitRight'],dashboard:['search','dashboard'],detail:['search','grid','buttons']};
  let p='';

  // 전체 레이아웃 구조 (구체적 수치 포함)
  const sw=S.sidebarSettings.width||220;
  const gh=S.gnbSettings.height||56;
  p+=`\n## 전체 레이아웃 구조\n`;
  p+=`\`\`\`\n`;
  p+=`┌─────────────────────────────────────────────────────┐\n`;
  p+=`│ GNB (h:${gh}px, bg:${s.gnbBg||s.primaryDark})${' '.repeat(Math.max(0,30-String(gh).length))}│\n`;
  p+=`├─────────────────────────────────────────────────────┤\n`;
  p+=`│ SubHeader (h:44px, 중분류 탭)${' '.repeat(22)}│\n`;
  if(S.layoutOpts.sidebar!=='hidden'){
    p+=`├────────┬────────────────────────────────────────────┤\n`;
    p+=`│Sidebar │ Content Area                               │\n`;
    p+=`│w:${sw}px│ padding: 24px, gap: 16px                   │\n`;
    p+=`│        │                                            │\n`;
    p+=`│ 메뉴   │ [페이지 헤더] 타이틀 20px bold             │\n`;
    p+=`│ 목록   │ [배너] (선택적)                            │\n`;
    const sLabels={search:'[조회조건 카드]',grid:'[데이터 카드]',kpi:'[KPI 카드]',chart:'[차트 카드]',timeline:'[타임라인]',form:'[입력 폼]',calendar:'[캘린더]',kanban:'[칸반 보드]',profile:'[프로필]',gallery:'[갤러리]',dashboard:'[대시보드]',buttons:'[버튼 영역]'};
    (menu.sections||(defaultSecs[type]||['search','grid'])).forEach(sec=>{
      p+=`│        │ ${(sLabels[sec]||sec).padEnd(40)}│\n`;
    });
  } else {
    p+=`│ Content Area (full width)                          │\n`;
  }
  p+=`└────────┴────────────────────────────────────────────┘\n`;
  p+=`\`\`\`\n`;
  p+=`- 전체: 1440×900px\n`;
  p+=`- GNB: height ${gh}px, 가로 전체\n`;
  p+=`- SubHeader: height 44px, 가로 전체\n`;
  if(S.layoutOpts.sidebar!=='hidden') p+=`- Sidebar: width ${sw}px, 세로 전체(GNB/SubHeader 제외)\n`;
  p+=`- Content: flex:1, padding 24px, gap 16px\n`;

  // Sub-header tabs
  const g=S.tree[S.sel.group];
  if(g){
    p+=`\n[서브헤더 탭]\n`;
    (g.mids||[]).forEach((mid,mi)=>{
      p+=`  ${mi===S.sel.mid?'● ':'○ '}${mid.name}\n`;
    });
  }

  // Sidebar
  if(S.layoutOpts.sidebar!=='hidden'&&g){
    p+=`\n[사이드바 메뉴] (${S.sidebarSettings.width}px)\n`;
    (g.mids||[]).forEach((mid,mi)=>{
      p+=`  [${mid.name}]\n`;
      (mid.menus||[]).forEach((m,mmi)=>{
        const active=(S.sel.mid===mi&&S.sel.menu===mmi);
        p+=`    ${active?'▶ ':'  '}${m.name}\n`;
      });
    });
  }

  // Breadcrumb
  p+=`\n[Breadcrumb] ${getBreadcrumb()}\n`;
  p+=`[페이지 제목] ${menu.name}\n`;
  if(menu.desc) p+=`[설명] ${menu.desc}\n`;

  // ★ 섹션 구성 (순서대로 렌더링)
  const SLABELS={search:'조회조건 카드',grid:'데이터 그리드',kpi:'KPI 통계 카드',chart:'차트',timeline:'타임라인',form:'입력 폼',calendar:'캘린더',kanban:'칸반 보드',profile:'프로필',gallery:'갤러리',splitLeft:'좌측 패널(그리드)',splitRight:'우측 패널(상세)',dashboard:'대시보드 위젯',buttons:'버튼 영역'};
  const secs=menu.sections||(defaultSecs[type]||['search','grid']);
  p+=`\n[화면 섹션 구성] (위에서 아래 순서)\n`;
  secs.forEach((sec,i)=>{p+=`  ${i+1}. ${SLABELS[sec]||sec}\n`});
  p+=`\n⚠️ 위 섹션 순서를 정확히 따르세요. 임의로 필드/컬럼/버튼을 추가하지 마세요.\n`;

  // Banner
  if(menu.banner?.show){
    p+=`\n[배너] type=${menu.banner.type}, text="${menu.banner.text}"\n`;
  }

  // Fields with CSS specs
  const so=menu.sizeOpts||{};
  const _fh=so.fieldHeight||34;
  const _ff=so.fieldFont||13;
  const _lf=so.labelFont||12;
  if((menu.fields||[]).length){
    const searchCs=_cs(menu,'search');
    p+=`\n### 조회조건 카드\n`;
    p+=`- background: ${searchCs.bg||s.surface}, border-radius: ${searchCs.radius||(s.cardRadius||12)}px\n`;
    p+=`- box-shadow: ${searchCs.shadow||'sm'==='sm'?'0 1px 3px rgba(0,0,0,0.06)':searchCs.shadow}\n`;
    p+=`- border: ${searchCs.border!==false?'1px solid '+s.border:'none'}\n`;
    p+=`- padding: ${searchCs.padding||'20'}px, margin-bottom: 16px\n`;
    p+=`- 내부 grid: ${menu.fieldCols||2}열, gap 12px 16px\n`;
    p+=`- 필드:\n`;
    menu.fields.forEach((f,i)=>{
      p+=`  - "${f.label}" (${f.type})`;
      if(f.type==='dateRange') p+=` → 시작일 ~ 종료일 (2개 input, gap 6px)`;
      if(f.options?.length) p+=` 옵션: [${f.options.join(', ')}]`;
      if(f.placeholder) p+=` placeholder="${f.placeholder}"`;
      if(f.required) p+=` *필수`;
      p+=`\n    → label: ${_lf}px, 500, ${s.textSecondary}\n`;
      p+=`    → input: height ${_fh}px, border 1px ${s.border}, radius ${s.radius||6}px, font ${_ff}px\n`;
    });
  }

  // Buttons with CSS
  if((menu.buttons||[]).length){
    p+=`- 버튼 영역: flex, justify-content: ${so.btnAlign||'flex-end'}, gap 8px, margin-top 16px\n`;
    menu.buttons.forEach(b=>{
      const sz=BTN_SIZES.find(x=>x.id===b.size);
      const h=sz?.h||36;
      const isSolid=b.type==='solid';
      const colorMap={primary:s.primary,success:'#22c55e',warning:'#f59e0b',danger:'#ef4444',info:'#3b82f6',neutral:s.textSecondary};
      const c=colorMap[b.color]||s.primary;
      p+=`  - "${b.label}" h:${h}px, px:20px, r:${s.buttonRadius||8}px, ${isSolid?`bg:${c} color:#fff`:`border:1px ${s.border} color:${s.textSecondary}`}${b.icon&&b.icon!=='none'?' icon:'+b.icon:''}${b.disabled?' disabled':''}\n`;
    });
  }

  // Grid with CSS
  if((menu.grid||[]).length){
    const dataCs=_cs(menu,'data');
    p+=`\n### 데이터 카드\n`;
    p+=`- background: ${dataCs.bg||s.surface}, border-radius: ${dataCs.radius||(s.cardRadius||12)}px\n`;
    p+=`- box-shadow: ${dataCs.shadow||'sm'==='sm'?'0 1px 3px rgba(0,0,0,0.06)':dataCs.shadow}\n`;
    p+=`- border: ${dataCs.border!==false?'1px solid '+s.border:'none'}\n`;
    p+=`- padding: ${dataCs.padding||'20'}px\n`;
    const rh=menu.gridRowHeight||40;
    const compact=menu.gridCompact;
    const cp=compact?'4px 8px':'8px 12px';
    p+=`\n### 그리드 테이블\n`;
    p+=`- 헤더: bg ${s.bg}, font 12px 600, color ${s.textSecondary}, padding ${cp}\n`;
    p+=`- 행 높이: ${rh}px, padding: ${cp}, font 13px\n`;
    if(menu.gridStriped) p+=`- 줄무늬: 짝수행 bg ${s.bg}80\n`;
    if(menu.gridBordered) p+=`- 행 구분선: border-bottom 1px solid ${s.border}\n`;
    if(menu.gridScrollable) p+=`- 스크롤: max-height ${menu.gridFixedHeight||300}px, sticky header\n`;
    p+=`- 컬럼:\n`;
    menu.grid.forEach((c,i)=>{
      p+=`  ${i+1}. "${c.name}" type=${c.type} align=${c.align} width=${c.width?c.width+'px':'auto'}${c.flex?' flex:1':''}\n`;
    });
  }

  // Pagination
  if(menu.pagination?.show){
    p+=`\n[페이지네이션] 건수/페이지: ${menu.pagination.pageSize||10}\n`;
  }

  // Summary bar
  if(menu.summaryBar&&(menu.summaryItems||[]).length){
    p+=`\n[합계 바]\n`;
    menu.summaryItems.forEach(si=>{
      p+=`  "${si.label}" key=${si.key}${si.highlight?' highlight':''}\n`;
    });
  }

  // Status badge colors — 해당 메뉴 샘플 데이터에서 사용되는 상태만
  const statusCols=(menu.grid||[]).filter(c=>c.type==='status');
  if(statusCols.length){
    const usedStatuses=new Set();
    const sRows=getSampleRows(menu);
    statusCols.forEach(sc=>{sRows.forEach(r=>{if(r[sc.name])usedStatuses.add(r[sc.name])})});
    // 옵션에서도 추출
    (menu.fields||[]).forEach(f=>{if(f.label==='상태'&&f.options)f.options.forEach(o=>{if(o!=='전체')usedStatuses.add(o)})});
    if(usedStatuses.size){
      p+=`\n### 상태 뱃지 스타일\n`;
      usedStatuses.forEach(k=>{
        const sc=S.customStatusColors[k]||{bg:'#94a3b815',color:'#94a3b8'};
        p+=`- "${k}": bg ${sc.bg}, color ${sc.color}, padding 2px 10px, radius 9999px, font 12px 500\n`;
      });
    }
  }

  // Sample data
  const rows=getSampleRows(menu);
  if(rows.length&&(menu.grid||[]).length){
    p+=`\n[샘플 데이터] (${rows.length}행)\n`;
    const cols=menu.grid;
    p+=`  | ${cols.map(c=>c.name.padEnd(12)).join(' | ')} |\n`;
    p+=`  |${cols.map(()=>''.padEnd(14,'-')).join('|')}|\n`;
    rows.slice(0,3).forEach(r=>{
      p+=`  | ${cols.map(c=>String(r[c.name]??'').padEnd(12).slice(0,12)).join(' | ')} |\n`;
    });
    if(rows.length>3) p+=`  ... (${rows.length-3}행 더)\n`;
  }

  // Card styles — 커스텀 오버라이드가 있는 경우만
  const csKeys=['search','data','stat','form'];
  const csOverrides=csKeys.filter(k=>{const cs=_cs(menu,k);return cs.bg||cs.radius||(cs.padding&&cs.padding!=='20'&&cs.padding!=='24')||(cs.shadow&&cs.shadow!=='sm')||cs.border===false});
  if(csOverrides.length){
    p+=`\n### 카드 스타일 오버라이드\n`;
    csOverrides.forEach(k=>{
      const cs=_cs(menu,k);
      const parts=[];
      if(cs.bg)parts.push(`bg:${cs.bg}`);
      if(cs.radius)parts.push(`radius:${cs.radius}px`);
      if(cs.shadow&&cs.shadow!=='sm')parts.push(`shadow:${cs.shadow}`);
      if(cs.padding)parts.push(`padding:${cs.padding}px`);
      if(cs.border===false)parts.push(`border:none`);
      p+=`- ${k} 카드: ${parts.join(', ')}\n`;
    });
  }

  // Screenshot ref
  // Type-specific data
  if(type==='chart'&&menu.chartData){
    p+=`\n[차트 데이터]\n`;
    p+=`  타입: ${menu.chartType||'bar'}\n`;
    if(menu.chartData.labels) p+=`  라벨: ${menu.chartData.labels.join(', ')}\n`;
    (menu.chartData.datasets||[]).forEach(ds=>{p+=`  데이터셋 "${ds.label}": [${(ds.data||[]).join(',')}]\n`});
  }
  if((type==='timeline')&&(menu.timelineItems||[]).length){
    p+=`\n[타임라인 항목] (${menu.timelineItems.length}건)\n`;
    menu.timelineItems.forEach(it=>{p+=`  ${it.date||''} | ${it.icon||''} ${it.title||''} | ${it.status||''} | ${it.desc||''}\n`});
  }
  if(type==='calendar'&&(menu.calendarEvents||[]).length){
    p+=`\n[캘린더 이벤트] (${menu.calendarEvents.length}건)\n`;
    menu.calendarEvents.forEach(ev=>{p+=`  ${ev.date||''} | ${ev.title||''} | ${ev.amount||''} | ${ev.type||''}\n`});
  }
  if(type==='kanban'&&(menu.kanbanColumns||[]).length){
    p+=`\n[칸반 컬럼]\n`;
    menu.kanbanColumns.forEach(c=>{
      p+=`  [${c.title||''}] (color:${c.color||''})\n`;
      (c.items||[]).forEach(it=>{p+=`    - ${it.title||''} (${it.assignee||''}, ${it.priority||''})\n`});
    });
  }
  if(type==='profile'&&menu.profileData){
    const pd=menu.profileData;
    p+=`\n[프로필]\n`;
    p+=`  이름: ${pd.name||''}, 아바타: ${pd.avatar||''}, 서브: ${pd.subtitle||''}\n`;
    (pd.fields||[]).forEach(f=>{p+=`  ${f.label}: ${f.value}\n`});
    (pd.stats||[]).forEach(st=>{p+=`  [통계] ${st.label}: ${st.value}\n`});
  }
  if(type==='gallery'&&(menu.galleryItems||[]).length){
    p+=`\n[갤러리 항목] (${menu.galleryItems.length}건, ${menu.galleryCols||3}열)\n`;
    menu.galleryItems.forEach(it=>{p+=`  ${typeof it==='object'?`${it.title||''} | ${it.date||''} | ${it.type||''} | ${it.size||''}`:it}\n`});
  }
  if(type==='form'&&(menu.formSections||[]).length){
    p+=`\n[폼 섹션]\n`;
    menu.formSections.forEach(sec=>{p+=`  [${sec.title}] 필드: ${(sec.fields||[]).join(', ')}\n`});
  }
  if(type==='dashboard'&&(menu.dashboardWidgets||[]).length){
    p+=`\n[대시보드 위젯]\n`;
    menu.dashboardWidgets.forEach(w=>{p+=`  "${w.title}" type=${w.type} span=${w.span||1}\n`});
  }
  if((type==='kpiDetail'||type==='stat')&&(menu.statItems||[]).length){
    p+=`\n[KPI/통계 항목]\n`;
    menu.statItems.forEach(st=>{p+=`  "${st.label}" value="${st.value}"${st.change?' change='+st.change:''}${st.up?' ▲':''}${st.up===false?' ▼':''}\n`});
  }

  p+=`\n📸 프롬프트 편집 및 스크린샷을 참고하세요.\n`;

  return p;
}

function buildStyleSection(s){
  let p='\n[스타일 토큰]\n';
  p+=`  Primary: ${s.primary}\n  Primary Dark: ${s.primaryDark}\n`;
  p+=`  Background: ${s.bg}\n  Surface: ${s.surface}\n  Border: ${s.border}\n`;
  p+=`  Text: ${s.text}\n  Text Secondary: ${s.textSecondary}\n`;
  p+=`  GNB: bg=${s.gnbBg} text=${s.gnbText||'#fff'}\n`;
  p+=`  Sidebar: bg=${s.sidebarBg||'#f8fafc'}\n`;
  p+=`  Radius: ${s.radius}px  Card Radius: ${s.cardRadius}px  Button Radius: ${s.buttonRadius||s.radius}px\n`;
  p+=`  Font: ${s.fontFamily}\n`;
  return p;
}

  p+=`브랜드: ${BRAND_PRESETS[S.brandIdx].name}\n`;

  if(mi===-1){
    // Home
    p+=`\n## 홈 화면\n`;

    p+=`\n[KPI 카드] (${S.home.kpis.length}개, 가로 flex)\n`;
    S.home.kpis.forEach(k=>{p+=`  ${k.icon} ${k.label}: ${k.value} (trend: ${k.trend||'없음'}, highlight: ${k.highlight})\n`});
    p+=`\n[대시보드 카드]\n`;
    S.home.cards.filter(c=>c.enabled).forEach(c=>{
      p+=`  "${c.label}" type=${c.type}\n`;
      const data=S.home.cardData[c.id]||[];
      if(data.length) data.forEach(d=>{p+=`    - ${d.title}${d.right?' | '+d.right:''}${d.badge?' ['+d.badge+']':''}\n`});
    });
    p+=`\n[빠른 메뉴] ${S.home.quickActions.join(', ')}\n`;
  } else if(mi===-2){

  p+=`- Heading/MD: 18px / SemiBold(600) / line-height 1.4\n`;

  p+=`- Main Component: 재사용 UI(Button, Input, Badge, Card, TableRow 등)\n`;
  p+=`- Instance: Main Component를 참조하여 props 오버라이드\n`;
  p+=`- Variant Property: type(solid/line), color(primary/danger/...), size(sm/md/lg), state(default/hover/disabled)\n`;

function buildFigmaComponents(menu,s){
  let p=`\n## 5. 컴포넌트 정의 (Main Components)\n`;

  // Button
  p+=`\n### Button\n`;
  p+=`- Variants: type=[solid,line], color=[primary,success,warning,danger,info,neutral], size=[xs,sm,md,lg,xl]\n`;
  BTN_SIZES.forEach(sz=>{
    p+=`  - ${sz.id}: height ${sz.h}px, padding 0 ${sz.px}px, font ${sz.fs}px Medium(500), radius ${s.buttonRadius||s.radius||8}px\n`;
  });
  p+=`  - solid: Fill=color값, Text=#ffffff\n`;
  p+=`  - line: Stroke=1px ${s.border}, Text=${s.textSecondary}, Fill=transparent\n`;

  // Input
  p+=`\n### Input\n`;
  const so=menu?.sizeOpts||{};
  const fh=so.fieldHeight||34;
  const ff=so.fieldFont||13;
  const lf=so.labelFont||12;
  p+=`- height: ${fh}px, padding: 0 8px, font: ${ff}px, radius: ${s.radius||6}px\n`;
  p+=`- Stroke: 1px ${s.border}, Fill: ${s.surface}\n`;
  p+=`- Focus: Stroke ${s.primary}, shadow 0 0 0 3px rgba(32,159,133,0.15)\n`;
  p+=`- Label: ${lf}px Medium(500), color ${s.textSecondary}\n`;
  p+=`- Variants: type=[text,select,dateRange,password]\n`;

  // Badge / Status
  p+=`\n### Badge (Status)\n`;
  p+=`- padding: 2px 10px, radius: 9999px, font: 12px Medium(500)\n`;
  const sc=S.customStatusColors;
  Object.keys(sc).forEach(k=>{
    p+=`  - "${k}": Fill ${sc[k].bg}, Text ${sc[k].color}\n`;
  });

  // Card
  p+=`\n### Card\n`;
  p+=`- Auto Layout: Vertical, padding 20px, gap 12px\n`;
  p+=`- Fill: ${s.surface}, Stroke: 1px ${s.border}, radius: ${s.cardRadius||12}px\n`;
  p+=`- Effect: Shadow/SM\n`;
  p+=`- Variants: type=[search,data,stat,form]\n`;

  // Table
  if(menu&&(menu.grid||[]).length){
    p+=`\n### Table\n`;
    p+=`- Header Row: Fill ${s.bg}, font 12px SemiBold(600), color ${s.textSecondary}, height 40px\n`;
    p+=`- Body Row: font 13px, height ${menu.gridRowHeight||40}px${menu.gridStriped?' (짝수행 Fill '+s.bg+'80)':''}\n`;
    p+=`- Cell: padding 8px 12px, Stroke bottom 1px ${s.border}\n`;
  }

  return p;
}

    p+=`- 로그인 버튼: "${activeTab.loginBtnText||'로그인'}"\n`;
    p+=`  → Button/Primary/LG, Fill container (width), height 48px\n`;
    if(activeTab.extraLinks?.length){
      p+=`- 링크: ${activeTab.extraLinks.join(', ')}\n`;
      p+=`  → Body/SM, color: ${s.textSecondary}, text-decoration: underline\n`;
    }

    // Social Login
    if(S.login.socialLogins?.length){
      p+=`\n#### 소셜 로그인\n`;
      p+=`- 구분선: "또는" 텍스트 + 양쪽 hr 선\n`;
      p+=`- Auto Layout: Horizontal, gap: 12px, justify: center\n`;
      S.login.socialLogins.forEach(sl=>{
        p+=`  - "${sl}" 버튼: 아이콘 + 텍스트, radius: ${s.radius||6}px, Stroke: 1px ${s.border}\n`;
      });
    }

    // Notice
    if(S.login.noticeText){
      p+=`\n#### 공지\n`;
      p+=`- name="Notice", padding: 12px 16px, radius: ${s.radius||6}px, Fill: #fef3c7\n`;
      p+=`- icon: ⚠️ + "${S.login.noticeText}" → Caption, color: #92400e\n`;
    }

    // Footer
    if(S.login.footerLinks?.length){
      p+=`\n#### 푸터\n`;
      p+=`- Auto Layout: Horizontal, gap: 16px, justify: center\n`;
      p+=`- ${S.login.footerLinks.join(' | ')}\n`;
      p+=`- → Caption, color: ${s.textSecondary}\n`;
    }

  } else {
    // === 일반 메뉴 ===
    const menu=getSelMenu();
    if(menu){
      p+=`\n## 3~4. 메뉴: ${menu.name} (type: ${menu.type||'search'})\n`;
      p+=buildMenuContentPrompt(menu,s);

      // 5. 컴포넌트 정의
      p+=buildFigmaComponents(menu,s);
    }
    return p;
  }

  // 홈/로그인에도 기본 컴포넌트 정의 포함
  p+=buildFigmaComponents(mi===-1?null:null,s);

  p+=`\n## 6. 주의사항\n`;
  p+=`- 위 프롬프트에 명시된 요소만 생성하세요. 임의로 추가하지 마세요.\n`;
  p+=`- 모든 색상값은 디자인 토큰의 hex 값을 정확히 사용하세요.\n`;
  p+=`- Auto Layout의 방향, gap, padding 수치를 정확히 따르세요.\n`;
  p+=`- 컴포넌트는 Main Component로 정의 후 Instance로 재사용하세요.\n`;

  return p;
}

function buildDiffPrompt(){
  // Simple diff placeholder - shows current config summary
  const mi=S.sel.menu;
  let p=`# K-Branch UI — Diff 프롬프트\n`;
  p+=`이 프롬프트는 기존 구현 대비 변경사항을 표시합니다.\n`;
  p+=`현재 선택: ${getSelLabel()}\n\n`;

  if(mi>=0){
    const menu=getSelMenu();
    if(menu){
      p+=`[변경 대상]\n`;
      p+=`  메뉴: ${menu.name}\n`;
      p+=`  유형: ${menu.type||'search'}\n`;
      p+=`  필드 수: ${(menu.fields||[]).length}\n`;
      p+=`  컬럼 수: ${(menu.grid||[]).length}\n`;
      p+=`  버튼 수: ${(menu.buttons||[]).length}\n\n`;
      p+=`위 프롬프트(HTML/Pencil/Figma)를 기존 코드와 비교하여\n`;
      p+=`변경된 부분만 반영하세요.\n`;
    }
  }
  return p;
}

// ============================================================
// INIT (final)
// ============================================================
function init(){
  initBrandSelect();
  initProjectSelect();
  applyStyleVars();
  render();
  renderFlowTab();
}
document.addEventListener('DOMContentLoaded',init);

</script>
