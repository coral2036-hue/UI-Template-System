<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Branch UI 프롬프트 생성기 v25</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'맑은 고딕',sans-serif;font-size:12px;background:#f0f2f5;overflow:hidden;height:100vh;display:flex;flex-direction:column;}
button,input,select,textarea{font-family:inherit;}
#api-banner{display:flex;align-items:center;gap:8px;padding:6px 16px;background:#1e2535;color:#fff;font-size:11px;flex-shrink:0;min-height:44px;flex-wrap:wrap;}
#api-banner.ok{background:#1a3a2a;}
#api-banner.warn{background:#3a1a1a;}
#api-key-input{height:22px;border:1px solid rgba(255,255,255,.2);border-radius:3px;background:rgba(255,255,255,.1);color:#fff;font-size:11px;padding:0 8px;width:280px;min-width:180px;font-family:monospace;outline:none;}
#api-key-input::placeholder{color:rgba(255,255,255,.4);}
#api-provider-select,#api-model-select{height:22px;border:1px solid rgba(255,255,255,.2);border-radius:3px;background:rgba(255,255,255,.1);color:#fff;font-size:11px;padding:0 6px;outline:none;max-width:260px;}
#api-provider-select option,#api-model-select option{color:#222;}
#api-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
#api-tail-note{margin-left:auto;font-size:10px;opacity:.5;}
input::placeholder,textarea::placeholder{font-size:12px;color:#888;}
.field-card input[type=text],.field-card input[type=number],.field-card input[type=password],.field-card textarea{line-height:1.4;}
.api-btn{height:22px;padding:0 10px;border:1px solid rgba(255,255,255,.25);border-radius:3px;cursor:pointer;font-size:10px;background:rgba(255,255,255,.1);color:#fff;}
.api-btn:hover{background:rgba(255,255,255,.2);}
#api-status{font-size:10px;color:rgba(255,255,255,.6);flex-shrink:0;}
#api-mode-badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:rgba(255,255,255,.15);white-space:nowrap;}
#app{display:flex;flex:1;overflow:hidden;}
#left{width:240px;flex-shrink:0;display:flex;flex-direction:column;background:#fff;border-right:1px solid #e2e5ea;}
#center{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:#f0f2f5;}
#right{width:360px;min-width:320px;max-width:42vw;flex-shrink:0;display:flex;flex-direction:column;background:#fff;border-left:1px solid #e2e5ea;}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #e2e5ea;flex-shrink:0;}
.tab-btn{flex:1;height:36px;border:none;border-bottom:2px solid transparent;background:transparent;color:#888;cursor:pointer;font-size:11px;font-family:inherit;font-weight:500;transition:all .15s;white-space:nowrap;}
.tab-btn:hover{color:#444;background:#f8f9fb;}
.tab-btn.active{background:#fff;border-bottom-color:#1659c5;color:#1659c5;font-weight:700;}
.tab-btn.active.green{border-bottom-color:#2e7d32;color:#2e7d32;}
.tab-btn.active.ai{border-bottom-color:#7c3aed;color:#7c3aed;}
.scroll-area{flex:1;overflow-y:auto;}
.scroll-area::-webkit-scrollbar{width:4px;}
.scroll-area::-webkit-scrollbar-thumb{background:#dde;border-radius:2px;}
.sec{margin-bottom:16px;}
.sec-title{font-size:10px;font-weight:700;color:#1659c5;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #eef0f5;padding-bottom:5px;margin-bottom:8px;}
.sec-hint{font-size:10px;color:#555;margin-bottom:8px;line-height:1.6;padding:5px 8px;background:#f5f7ff;border-left:3px solid #1659c5;border-radius:0 3px 3px 0;white-space:pre-line;}
.frow{display:flex;align-items:center;margin-bottom:7px;gap:6px;min-height:26px;}
.frow .lbl{font-size:11px;color:#555;flex-shrink:0;display:flex;align-items:center;gap:3px;}
input[type=text],input[type=number],input[type=password],select{height:32px;border:1px solid #dde1e9;border-radius:4px;font-size:12px;padding:0 10px;background:#fff;font-family:inherit;color:#333;outline:none;transition:border .12s;min-width:0;max-width:100%;}
input[type=text]:focus,input[type=number]:focus,select:focus{border-color:#1659c5;}
textarea{border:1px solid #dde1e9;border-radius:4px;font-size:12px;padding:7px 10px;background:#fff;font-family:inherit;color:#333;outline:none;resize:vertical;}
textarea:focus{border-color:#1659c5;}
.panel-wrap{border-bottom:1px solid #f0f2f5;}
.panel-hd{display:flex;align-items:center;padding:8px 14px;cursor:pointer;user-select:none;background:#fafbfd;transition:background .12s;}
.panel-hd:hover{background:#f0f4ff;}
.panel-hd .arrow{font-size:9px;color:#bbb;width:10px;flex-shrink:0;}
.panel-hd .ptitle{flex:1;font-size:11px;font-weight:600;color:#555;margin-left:4px;}
.panel-hd.open .ptitle{color:#1659c5;}
.panel-hd .badge{font-size:9px;background:#e8f0fe;color:#1659c5;border-radius:8px;padding:1px 6px;margin-right:4px;font-weight:600;}
.panel-body{padding:10px 14px;background:#fff;display:none;}
.panel-body.open{display:block;}
.btn-add{height:22px;padding:0 9px;border:1px solid #1659c5;background:#fff;color:#1659c5;border-radius:3px;cursor:pointer;font-size:10px;font-weight:600;}
.btn-add:hover{background:#e8f0fe;}
.btn-icon{border:none;background:transparent;cursor:pointer;font-size:11px;padding:0 3px;line-height:1;flex-shrink:0;color:#ccc;}
.btn-icon:hover{color:#e53935;}
.tree-g{background:#f0f4ff;border-bottom:1px solid #e0e8ff;display:flex;align-items:center;padding:7px 10px;gap:2px;cursor:pointer;}
.tree-g .name{flex:1;font-weight:700;color:#1659c5;font-size:11px;}
.tree-m{background:#f8f9fd;border-bottom:1px solid #eef0f8;display:flex;align-items:center;padding:6px 10px 6px 20px;gap:2px;cursor:pointer;}
.tree-m .name{flex:1;font-weight:600;color:#444;font-size:11px;}
.tree-s{background:#fff;border-bottom:1px solid #f5f6fa;display:flex;align-items:center;padding:5px 10px 5px 30px;cursor:pointer;gap:4px;transition:background .1s;}
.tree-s:hover{background:#f5f7ff;}
.tree-s .name{flex:1;font-size:11px;color:#555;}
.tree-s.active .name{color:#1659c5;font-weight:600;}
.tree-s.active{background:#e8f0fe;}
.tree-add{color:#1659c5;font-size:10px;cursor:pointer;padding:4px 10px;opacity:.7;}
.tree-add:hover{opacity:1;background:#f0f4ff;}
.field-card,.col-card{margin-bottom:6px;background:#fafbfd;border:1px solid #eaecf2;border-radius:4px;padding:8px 10px;overflow:hidden;}
.col-card > div:first-child,.field-card > div:first-child{flex-wrap:nowrap;}
.col-card select,.col-card input,.field-card select,.field-card input,.field-card textarea{max-width:100%;}
.col-card .btn-icon,.field-card .btn-icon{flex-shrink:0;}
.col-card-top{display:grid !important;grid-template-columns:14px 12px minmax(0,1fr) 54px 84px 56px 14px;gap:4px;align-items:center;}
.col-align-select{text-align-last:center;padding:0 18px 0 6px !important;}
.col-type-select{padding:0 18px 0 6px !important;}
.col-card-flags{display:flex;gap:12px;padding-left:34px;flex-wrap:wrap;}
.col-card-top input[type=text]{min-width:0;width:100%;}
.col-card-top select{min-width:0;}
.field-card:hover,.col-card:hover{border-color:#c5d0e8;}
#preview-wrap{flex:1;overflow:hidden;position:relative;}
.prompt-subtab{display:flex;border-bottom:1px solid #e2e5ea;background:#fff;flex-shrink:0;align-items:center;}
.prompt-subtab button{height:34px;padding:0 16px;border:none;border-bottom:2px solid transparent;background:transparent;cursor:pointer;font-size:11px;font-family:inherit;color:#888;font-weight:500;}
.prompt-subtab button:hover{color:#444;}
.prompt-subtab button.active{border-bottom-color:#1659c5;color:#1659c5;font-weight:700;}
.prompt-subtab button.active.red{border-bottom-color:#e53935;color:#e53935;}
.color-row{display:flex;gap:4px;align-items:center;}
.color-row input[type=color]{width:26px;height:26px;border:1px solid #dde1e9;border-radius:3px;padding:2px;cursor:pointer;flex-shrink:0;}
.color-row input[type=text]{width:72px;font-family:monospace;flex-shrink:0;}
.color-row select{width:62px;font-size:10px;flex-shrink:0;}
.numsel{display:flex;align-items:center;gap:4px;}
.numsel select{width:60px;}
.numsel input{width:40px;text-align:center;}
.numsel span{font-size:10px;color:#aaa;}
.arr-btns{display:flex;flex-direction:column;flex-shrink:0;}
.arr-btns button{border:none;background:transparent;cursor:pointer;color:#bbb;font-size:9px;padding:1px 0;line-height:1;}
.arr-btns button:hover:not([disabled]){color:#555;}
.arr-btns button[disabled]{color:#e8e8e8;cursor:default;}
.drag-handle{cursor:grab;color:#888;font-size:16px;padding:0 3px;flex-shrink:0;user-select:none;line-height:1;display:flex;align-items:center;}
.drag-handle:hover{color:#333;}
.dnd-card-over{outline:2px dashed #1659c5;background:#f0f6ff !important;opacity:.85;}
.dnd-tree-over{background:#dde8ff !important;outline:1px dashed #1659c5;}
#right-header{padding:8px 14px;border-bottom:1px solid #e2e5ea;background:#f5f7ff;font-size:11px;font-weight:700;color:#1659c5;flex-shrink:0;display:flex;align-items:center;gap:6px;}
#ai-panel{width:300px;border-left:1px solid #e2e5ea;display:flex;flex-direction:column;background:#fff;flex-shrink:0;}
#ai-history{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
#ai-history::-webkit-scrollbar{width:3px;}
#ai-history::-webkit-scrollbar-thumb{background:#dde;border-radius:2px;}
.ai-msg{display:flex;flex-direction:column;gap:3px;}
.ai-bubble{max-width:92%;padding:8px 11px;border-radius:10px;font-size:11px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.ai-bubble.user{background:#1659c5;color:#fff;border-bottom-right-radius:3px;align-self:flex-end;}
.ai-bubble.ai{background:#f5f7fb;color:#333;border-bottom-left-radius:3px;border:1px solid #eaecf2;}
.ai-name{font-size:10px;color:#aaa;}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:3000;}
#modal-overlay.open{display:flex;}
#modal-box{background:#fff;border-radius:8px;padding:22px;width:320px;box-shadow:0 12px 40px rgba(0,0,0,.2);}
#modal-title{font-weight:700;font-size:13px;margin-bottom:12px;color:#222;}
#modal-input{width:100%;height:34px;border:1px solid #dde1e9;border-radius:4px;font-size:12px;padding:0 10px;outline:none;}
#modal-input:focus{border-color:#1659c5;}
#modal-btns{display:flex;justify-content:flex-end;gap:6px;margin-top:14px;}
#popup-overlay{position:absolute;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;z-index:100;}
#popup-overlay.open{display:flex;}
#popup-box{background:#fff;border-radius:8px;width:400px;box-shadow:0 12px 40px rgba(0,0,0,.2);}
#popup-hd{padding:14px 18px;border-bottom:1px solid #eee;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center;}
#popup-body{padding:16px 18px;}
#popup-ft{padding:10px 18px;border-top:1px solid #eee;display:flex;justify-content:flex-end;gap:8px;}
.chip{height:24px;padding:0 10px;border-radius:12px;cursor:pointer;font-size:10px;font-weight:500;border:1px solid #dde1e9;background:#fff;color:#666;transition:all .15s;}
.chip.active{font-weight:600;color:#fff;}
.state-card{background:#fff;border:1px solid #e2e5ea;border-radius:8px;overflow:hidden;flex:1 1 280px;min-width:260px;}
.state-card-hd{padding:9px 14px;display:flex;align-items:center;gap:8px;}
.state-card-body{padding:14px;}
.state-card-label{font-size:10px;color:#999;margin-bottom:7px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;}
.tip{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:#d0d8ee;color:#1659c5;font-size:9px;font-weight:700;cursor:help;flex-shrink:0;margin-left:2px;vertical-align:middle;}
.tip:hover{background:#1659c5;color:#fff;}
.sample-row-card{background:#fff;border:1px solid #eaecf2;border-radius:4px;padding:8px 10px;margin-bottom:8px;}
.sample-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 8px;}
.sample-cell label{display:block;font-size:10px;color:#777;margin-bottom:3px;}
#json-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:3200;}
#json-modal-overlay.open{display:flex;}
#json-modal-box{background:#fff;border-radius:10px;width:min(720px,92vw);box-shadow:0 16px 48px rgba(0,0,0,.24);overflow:hidden;}
#json-modal-hd{padding:14px 18px;border-bottom:1px solid #eee;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center;}
#json-modal-body{padding:14px 18px;}
#json-modal-text{width:100%;height:320px;border:1px solid #dde1e9;border-radius:6px;font-size:12px;padding:10px 12px;font-family:Consolas,monospace;resize:vertical;outline:none;}
#json-modal-ft{padding:12px 18px;border-top:1px solid #eee;display:flex;justify-content:flex-end;gap:8px;}
</style>
</head>
<body>
<div id="api-banner" class="warn">
  <span id="api-mode-badge">🔑 API 키 필요</span>
  <select id="api-provider-select" onchange="changeAiProvider(this.value)">
    <option value="claude">Claude</option>
    <option value="gemini">Gemini</option>
  </select>
  <select id="api-model-select" onchange="changeAiModel(this.value)"></select>
  <div id="api-actions">
    <input id="api-key-input" type="password" placeholder="API 키 입력" autocomplete="off"/>
    <button class="api-btn" onclick="saveApiKey()">저장</button>
    <button class="api-btn" onclick="toggleKeyVisibility()">👁</button>
    <button class="api-btn" onclick="clearApiKey()">삭제</button>
    <button class="api-btn" onclick="addCustomModel()">+모델</button>
    <button class="api-btn" onclick="removeCurrentCustomModel()">-모델</button>
  </div>
  <span id="api-status">키를 입력하면 AI 어시스턴트가 활성화됩니다</span>
  <span id="api-tail-note">⚠ localStorage에만 저장됩니다</span>
  <div style="margin-left:auto;display:flex;gap:4px;flex-shrink:0;">
    <button class="api-btn" onclick="saveAppState()" title="전체 상태 저장">💾 저장</button>
    <button class="api-btn" onclick="loadAppState();renderAll();showToast('📂 불러왔습니다');" title="저장된 상태 불러오기">📂 불러오기</button>
    <button class="api-btn" onclick="resetAppState()" title="초기값으로 초기화">↺ 초기화</button>
    <button class="api-btn" onclick="exportAllJson()" title="전체 설정 JSON 파일로 내보내기">📤 내보내기</button>
    <button class="api-btn" onclick="importAllJson()" title="JSON 파일에서 전체 설정 가져오기">📥 가져오기</button>
    <button class="api-btn" onclick="exportHtml()" title="현재 화면을 HTML 파일로 내보내기">🌐 HTML 내보내기</button>
    <button class="api-btn" onclick="openFigmaModal()" title="Figma 링크로 자동 스타일 설정" style="background:rgba(100,180,255,.18);border-color:rgba(100,200,255,.4);">🎨 Figma 연동</button>
  </div>
</div>
<div id="app">
  <div id="left">
    <div class="tab-bar" id="left-tabs"></div>
    <div id="left-content" style="flex:1;display:flex;flex-direction:column;overflow:hidden;"></div>
  </div>
  <div id="center">
    <div class="tab-bar" id="main-tabs"></div>
    <div id="main-content" style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;"></div>
  </div>
  <div id="right" style="display:none;">
    <div id="right-header">✎ 메뉴</div>
    <div class="scroll-area" id="right-content"></div>
  </div>
</div>
<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-title">이름 입력</div>
    <input id="modal-input" placeholder="이름을 입력하세요"/>
    <div id="modal-btns">
      <button onclick="closeModal()" style="height:30px;padding:0 14px;border:1px solid #dde1e9;background:#fff;color:#555;border-radius:4px;cursor:pointer;font-size:12px;">취소</button>
      <button onclick="confirmModal()" style="height:30px;padding:0 14px;border:none;background:#1659c5;color:#fff;border-radius:4px;cursor:pointer;font-size:12px;">확인</button>
    </div>
  </div>
</div>

<div id="json-modal-overlay">
  <div id="json-modal-box">
    <div id="json-modal-hd">
      <span id="json-modal-title">샘플 데이터 JSON</span>
      <button onclick="closeJsonModal()" style="border:none;background:transparent;cursor:pointer;font-size:18px;color:#888;">×</button>
    </div>
    <div id="json-modal-body">
      <div style="font-size:11px;color:#666;line-height:1.7;margin-bottom:8px;">JSON 배열 형태로 붙여넣거나, 현재 데이터를 확인할 수 있습니다.</div>
      <textarea id="json-modal-text" spellcheck="false"></textarea>
    </div>
    <div id="json-modal-ft">
      <button onclick="closeJsonModal()" style="height:32px;padding:0 14px;border:1px solid #dde1e9;background:#fff;color:#555;border-radius:4px;cursor:pointer;font-size:12px;">닫기</button>
      <button id="json-copy-btn" onclick="copyJsonModalText()" style="height:32px;padding:0 14px;border:1px solid #1659c5;background:#fff;color:#1659c5;border-radius:4px;cursor:pointer;font-size:12px;">복사</button>
      <button id="json-apply-btn" onclick="applySampleJsonImport()" style="height:32px;padding:0 14px;border:none;background:#1659c5;color:#fff;border-radius:4px;cursor:pointer;font-size:12px;display:none;">적용</button>
    </div>
  </div>
</div>

<!-- ── Figma 연동 모달 ── -->
<div id="figma-modal-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:3300;">
  <div style="background:#fff;border-radius:12px;width:min(580px,94vw);box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden;font-family:'맑은 고딕',sans-serif;font-size:12px;">
    <div style="padding:16px 20px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;background:#1a2035;">
      <div style="display:flex;align-items:center;gap:8px;"><span style="font-size:18px;">🎨</span><span style="font-weight:700;font-size:14px;color:#fff;">Figma 연동 — 자동 스타일 추출</span></div>
      <button onclick="closeFigmaModal()" style="border:none;background:transparent;cursor:pointer;font-size:20px;color:#aaa;line-height:1;">×</button>
    </div>
    <div style="padding:18px 20px;display:flex;flex-direction:column;gap:12px;">
      <div style="background:#f0f7ff;border:1px solid #c5d8ff;border-radius:6px;padding:10px 12px;font-size:11px;color:#1659c5;line-height:1.7;">
        💡 Figma 파일 URL과 Personal Access Token을 입력하면 디자인 토큰(색상, 크기, 폰트)을 자동 추출하여 스타일에 적용합니다.
      </div>
      <div>
        <label style="display:block;font-size:11px;color:#555;margin-bottom:4px;font-weight:600;">Figma 파일 URL</label>
        <input id="figma-url-input" type="text" placeholder="https://www.figma.com/design/XXXXX/..." style="width:100%;height:32px;border:1px solid #dde1e9;border-radius:4px;padding:0 10px;font-size:12px;font-family:monospace;outline:none;">
      </div>
      <div>
        <label style="display:block;font-size:11px;color:#555;margin-bottom:4px;font-weight:600;">Personal Access Token <span style="font-weight:400;color:#aaa;">(figma.com → 계정설정 → Access tokens)</span></label>
        <input id="figma-token-input" type="password" placeholder="figd_..." style="width:100%;height:32px;border:1px solid #dde1e9;border-radius:4px;padding:0 10px;font-size:12px;font-family:monospace;outline:none;">
        <div style="margin-top:4px;display:flex;gap:6px;align-items:center;">
          <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:#888;cursor:pointer;"><input type="checkbox" id="figma-token-save" checked> 토큰 저장</label>
          <button onclick="document.getElementById('figma-token-input').type=document.getElementById('figma-token-input').type==='password'?'text':'password'" style="height:20px;padding:0 8px;border:1px solid #dde1e9;background:#fff;color:#666;border-radius:3px;cursor:pointer;font-size:10px;">👁 보기</button>
        </div>
      </div>
      <div>

function inferSampleValue(col,rowIndex){
  const name=String(col?.name||'').trim();
  const type=String(col?.type||'text');
  const legacy=SAMPLE[rowIndex % SAMPLE.length]||SAMPLE[0];
  if(col?.checkbox||name==='☐') return !!legacy.checked;
  if(name==='NO') return String(rowIndex+1);
  if(type==='date' || /일자|날짜|등록일/.test(name)) return legacy.날짜;
  if(type==='amount' || /금액/.test(name)) return String(legacy.금액||'0').replace(/,/g,'');
  if(type==='status' || name==='상태') return legacy.상태;
  if(/은행/.test(name)) return legacy.은행;
  if(/계좌번호/.test(name)) return legacy.계좌;
  if(/계좌별칭/.test(name)) return legacy.별칭||'';
  if(/사업장|회사|거래처|담당/.test(name)) return legacy.담당;
  if(/적요/.test(name)) return legacy.적요||'';
  if(/제목/.test(name)) return legacy.제목;
  if(/수취인명|기안자|담당자/.test(name)) return ['홍길동','김영희','이수진','박민수','최지훈'][rowIndex%5];
  if(/결재구분|계좌종류/.test(name)) return legacy.결재구분;
  if(/시간/.test(name)) return legacy.시간;
  if(type==='number') return String((rowIndex+1)*10);
  return `${name || '값'} ${rowIndex+1}`;
}
function buildSampleRowFromMenu(menu,rowIndex){
  const row={};
  (menu?.grid||[]).forEach(col=>{ row[col.name]=inferSampleValue(col,rowIndex); });
  return row;
}
function normalizeSampleRows(rows,menu){
  const list=Array.isArray(rows)?rows:[];
  const cols=(menu?.grid||[]).map(c=>c.name);
  return list.map((row,ri)=>{
    const src=(row && typeof row==='object' && !Array.isArray(row))?row:{};
    const next={};
    cols.forEach(name=>{
      if(Object.prototype.hasOwnProperty.call(src,name)) next[name]=src[name];
      else {
        const col=(menu?.grid||[]).find(c=>c.name===name);
        next[name]=inferSampleValue(col,ri);
      }
    });
    return next;
  });
}
function ensureMenuSampleData(menu){
  if(!menu) return [];
  if(!Array.isArray(menu.sampleData) || !menu.sampleData.length){ menu.sampleData=Array.from({length:5},(_,i)=>buildSampleRowFromMenu(menu,i)); }
  else{ menu.sampleData=normalizeSampleRows(menu.sampleData,menu); }
  return menu.sampleData;
}
function getSampleRows(menu=getSelMenu()){ return ensureMenuSampleData(menu); }
function setSampleRows(menu,rows){ if(!menu) return; menu.sampleData=normalizeSampleRows(rows,menu); }
function generateSampleRowsForMenu(menu,count=5){ if(!menu) return []; const safe=Math.max(parseInt(count,10)||5,1); const rows=Array.from({length:safe},(_,i)=>buildSampleRowFromMenu(menu,i)); setSampleRows(menu,rows); return rows; }
function getCellDisplayValue(row,col,ri){
  if(col.checkbox || col.name==='☐') return `<input type="checkbox" ${row[col.name] ? 'checked' : ''}>`;
  let value=row && Object.prototype.hasOwnProperty.call(row,col.name)?row[col.name]:inferSampleValue(col,ri);
  if(col.type==='amount'){
    const raw=String(value ?? '').replace(/,/g,'').trim();
    const num=Number(raw);
    value=!isNaN(num)&&raw!==''?num.toLocaleString('ko-KR'):value;
  }
  if(col.type==='status' || col.name==='상태'){
    const st=String(value||'');
    const color=st==='완료'?'#1659c5':st==='반려'?'#e53935':'#f57c00';
    return `<span style="color:${color};font-weight:600;">${escHtml(st || '대기')}</span>`;
  }
  return escHtml(value ?? '');
}

function runChangeHandler(handler, value){
  // 스타일/레이아웃/인터랙션 탭에서의 값 변경은 좌측 패널을 다시 그리지 않음 (스크롤 보존)
  const skipLeft=S.leftTab==='style'||S.leftTab==='layout'||S.leftTab==='ix';
  try{
    if(typeof handler==='function'){
      const result=handler(value);
      if(typeof result==='string' && result.trim()){
        const code=skipLeft?result.replace(/\brenderAll\(\)/g,'renderNoLeft()'):result;
        (0,eval)(code);
      }
      return;
    }
    if(typeof handler==='string' && handler.trim()){
      const code=skipLeft?handler.replace(/\brenderAll\(\)/g,'renderNoLeft()'):handler;
      (0,eval)(code);
    }
  }catch(err){
    console.error('change handler failed:', err);
  }
}

  const fn=onChange.toString();
  const opts=CPRESETS.map(p=>`<option value="${p.v}" ${p.v===val?"selected":""}>${p.n}</option>`).join("");
  return `<div class="color-row"><input type="color" value="${val}" oninput="runChangeHandler(${fn}, this.value)"><input type="text" value="${escHtml(val)}" oninput="runChangeHandler(${fn}, this.value)" style="width:72px;font-family:monospace;"><select onchange="if(this.value) runChangeHandler(${fn}, this.value)"><option value="">프리셋</option>${opts}</select></div>`;
}
function numSel(val,opts,onChange,unit="px"){
  const fn=onChange.toString();
  const optHtml=opts.map(o=>`<option value="${o}" ${o===val?"selected":""}>${o}</option>`).join("");
  return `<div class="numsel"><select onchange="if(this.value) runChangeHandler(${fn}, this.value)"><option value="">목록</option>${optHtml}</select><input type="text" value="${escHtml(val)}" oninput="runChangeHandler(${fn}, this.value)" style="width:40px;text-align:center;">${unit?`<span>${unit}</span>`:""}</div>`;
}

async function parseJsonResponse(r){
  let data=null;
  try{data=await r.json();}catch(e){data=null;}
  if(!r.ok){
    const msg=data?.error?.message||data?.message||('HTTP '+r.status+' '+r.statusText);
    throw new Error(msg);
  }
  return data||{};
}
async function callClaude(body){
  const mode=detectMode('claude');
  if(mode==='artifact'){
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    return parseJsonResponse(r);
  }
  if(mode==='proxy'){
    const r=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).catch(e=>_handleFetchError(e));
    return parseJsonResponse(r);
  }
  const key=getApiKey('claude');
  if(!key)throw new Error('Claude API 키가 설정되지 않았습니다.');
  let r;
  try{
    r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-ipc':'true'},
      body:JSON.stringify(body)
    });
  }catch(e){_handleFetchError(e);}
  return parseJsonResponse(r);
}
function _handleFetchError(e){
  const isFile=location.protocol==='file:';
  if(isFile){
    throw new Error('CORS 오류: 파일을 로컬 서버로 열어야 합니다.\n\n터미널에서 아래 명령을 실행하세요:\nnpx http-server . -p 5500\n그 후 http://localhost:5500 으로 접속하세요.');
  }
  throw new Error('네트워크 오류 (Failed to fetch). 인터넷 연결과 API 키를 확인하세요.\n\n원인: '+e.message);
}
async function callGemini(body){
  const key=getApiKey('gemini');
  if(!key)throw new Error('Gemini API 키가 설정되지 않았습니다.');
  const model=body.model||getAiModel('gemini')||'gemini-3.1-pro-preview';
  const payload={contents:body.contents||[]};
  if(body.systemInstruction)payload.systemInstruction=body.systemInstruction;
  if(body.generationConfig)payload.generationConfig=body.generationConfig;
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(key)}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  return parseJsonResponse(r);
}
function extractClaudeText(data){return (data?.content||[]).map(part=>typeof part?.text==='string'?part.text:'').join('').trim();}
function extractGeminiText(data){const parts=data?.candidates?.[0]?.content?.parts||[];return parts.map(p=>p.text||'').join('').trim();}
async function callAiProvider(promptText){
  const provider=getAiProvider();
  const model=getAiModel(provider);
  const systemText='당신은 Branch 업무 시스템 UI 프롬프트 전문가입니다. 한국어로 응답하고, 프롬프트 수정 시 ```prompt ... ``` 코드블록으로 감싸주세요.';
  if(provider==='gemini'){
    const data=await callGemini({model,systemInstruction:{parts:[{text:systemText}]},contents:[{role:'user',parts:[{text:promptText}]}],generationConfig:{temperature:0.4,maxOutputTokens:2000}});
    return {text:extractGeminiText(data)||'응답을 받을 수 없습니다.',raw:data};
  }
  const data=await callClaude({model,max_tokens:1200,system:systemText,messages:[{role:'user',content:promptText}]});
  return {text:extractClaudeText(data)||'응답을 받을 수 없습니다.',raw:data};
}

function _stateTokenBlock(sid){
  const s=S.style,ix=S.ix;
  const lines=[];
  if(sid==='default'){
    lines.push(`  버튼(강조): 배경 ${s.btnSolidBg||s.primaryColor} / 텍스트 ${s.btnSolidColor||'#fff'} / radius ${s.buttonRadius}px`);
    lines.push(`  버튼(라인): 배경 ${s.btnLineBg||'#fff'} / 텍스트 ${s.btnLineColor||s.lineColor} / 테두리 1px solid ${s.btnLineBorderColor||s.lineColor}`);
    lines.push(`  입력 필드: 테두리 1px solid ${s.borderColor} / 배경 ${s.inputBg||'#fff'} / 높이 ${s.inputHeight}px`);
    lines.push(`  그리드: 홀수행 ${s.gridRowOdd} / 짝수행 ${s.gridRowEven} / 헤더 ${s.gridHeaderBg}`);
  }else if(sid==='hover'){
    lines.push(`  버튼(강조) hover: filter ${ix.btnSolidHover||'brightness(0.9)'} / transition 150ms`);
    lines.push(`  버튼(라인) hover: 배경 ${ix.btnLineHover||s.rowHoverBg||'#f0f4ff'} / transition 150ms`);
    lines.push(`  그리드 행 hover: 배경 ${s.rowHoverBg} / cursor pointer`);
  }else if(sid==='click'){
    lines.push(`  버튼(강조) active: transform ${ix.btnSolidActive||'scale(0.97)'}`);
    lines.push(`  버튼(라인) active: 배경 #dde8ff / transform scale(0.97)`);
    lines.push(`  그리드 행 선택: 배경 ${s.gridRowClickBg||'#c8d8f8'}`);
  }else if(sid==='error'){
    lines.push(`  입력 필드: 테두리 1px solid ${s.fieldErrorBorder} / 배경 #fff8f8`);
    lines.push(`  에러 메시지: 필드 하단 표시 / 색 ${s.fieldErrorBorder}`);
    lines.push(`  메시지 텍스트: "${ix.fieldErrorMsg||'필수 항목을 입력해 주세요.'}"`);
    lines.push(`  필수 표시: "${s.requiredMark}" (색 ${s.requiredColor})`);
  }else if(sid==='focus'){
    lines.push(`  입력 필드: 테두리 2px solid ${s.fieldFocusBorder}`);
    lines.push(`  box-shadow: 0 0 0 3px rgba(22,89,197,.12)`);
    lines.push(`  transition: border-color 0.12s ease`);
  }else if(sid==='disabled'){
    lines.push(`  버튼(강조): 배경 ${s.btnSolidDisabledBg||'#b0bec5'} / opacity 0.6 / cursor not-allowed`);
    lines.push(`  버튼(라인): 배경 #f5f5f5 / 텍스트 #bbb / 테두리 1px solid #ddd`);
    lines.push(`  입력 필드: 배경 ${s.inputDisabledBg||'#f5f5f5'} / 텍스트 ${s.inputDisabledColor||'#aaa'} / cursor not-allowed`);
  }
  return lines;
}

        (t.fields||[]).forEach((f,fi)=>H('    [입력'+(fi+1)+'] '+f.label+' (type:'+f.type+(f.placeholder?', placeholder:"'+f.placeholder+'"':'')+')'));
      } else {
        H('    입력 필드 없음');
      }
      H('    [버튼] '+t.loginBtnText+' — bg:'+t.loginBtnBg+' / color:'+t.loginBtnColor);
      const opts3=[];if(t.saveId)opts3.push('아이디 저장');if(t.autoLogin)opts3.push('자동 로그인');
      if(opts3.length)H('    [체크박스] '+opts3.join(' / '));
      if((t.extraLinks||[]).length)H('    [링크] '+(t.extraLinks||[]).join(' / '));
    });
    if(lg.noticeText)H('  [안내문구]   '+lg.noticeText.slice(0,60)+(lg.noticeText.length>60?'…':''));
    H('  [푸터 링크] '+(lg.footerLinks||[]).join(' | '));
    sec('구현 요청');
    H('  위 구성대로 로그인 화면을 구현해 주세요.');
    H('  • 전체 화면 중앙 정렬 카드 레이아웃');
    H('  • 탭 전환 시 동일 카드 내 폼 영역만 교체');
    H('  • 반응형: 카드 너비 max-width:'+cardW+'px, 모바일 full-width');
    H('  • transition: all 0.15s ease 기본 적용');
    H(_targetBlock());
    return lines.join('\n');
  }

  // ── 메인(Home) 화면 ──────────────────────────
  if(isHomeSelected()){
    const h=S.home;
    const cols=parseInt(h.layout?.columns)||3;
    const enabledCards=(h.cards||[]).filter(c=>c.enabled);
    H('━'.repeat(44));
    H('■ Branch UI 화면 구성도: ['+h.name+']');
    H('━'.repeat(44));
    H('');
    H('┌'+'─'.repeat(62)+'┐');
    H('│ GNB ('+gnbH+'px)  K Branch  |  '+allTop.slice(0,4).join(' · ')+'  ···    │');
    H('├'+'─'.repeat(62)+'┤');
    H('│ 서브헤더('+l.subHeaderHeight+'px)  '+( l.subHeaderCompanyText||'웹케시씨엔에스(주)').padEnd(30)+'          │');
    H('├─────────┬'+'─'.repeat(52)+'┤');
    H('│사이드바 │ 본문 영역                                          │');
    H('│('+sideW+'px) │'+' '.repeat(52)+'│');
    if(h.layout?.showBanner&&h.banner?.show){
      H('│ 메뉴 목록│ ┌──────────────────────────────────────────────┐ │');
      H('│         │ │ 알림 배너: '+escHtml((h.banner.text||'').slice(0,34)).padEnd(35)+'│ │');
      H('│         │ └──────────────────────────────────────────────┘ │');
    }
    if(h.layout?.showKpi&&(h.kpis||[]).length){
      const kpiItems=(h.kpis||[]).map(k=>k.label+':'+k.value).slice(0,4);
      H('│         │ ┌'+'─KPI─┐ '.repeat(Math.min(kpiItems.length,4))+'│');
      H('│         │ │ '+kpiItems.join(' │ │ ')+' │ │');
      H('│         │ └'+'─────┘ '.repeat(Math.min(kpiItems.length,4))+'│');
    }
    H('│         │ 카드 그리드 ('+cols+'열, 간격'+h.layout?.cardGap+'px)                      │');
    const row1=enabledCards.slice(0,cols);
    const row2=enabledCards.slice(cols,cols*2);
    H('│         │ ┌'+row1.map(c=>'─ '+c.label.padEnd(12)+' ─').join('┬')+'┐ │');
    H('│         │ │'+row1.map(c=>' ['+c.type.padEnd(4)+']         ').join('│')+'│ │');
    H('│         │ └'+row1.map(_=>'─'.repeat(16)).join('┴')+'┘ │');
    if(row2.length)H('│         │  '+row2.map(c=>'['+c.label+']').join('  ')+'                       │');
    if((h.quickActions||[]).length){
      H('│         │ ─── Quick Action ────────────────────────────── │');
      H('│         │ '+(h.quickActions||[]).map(q=>'['+q+']').join(' ')+'   │');
    }
    H('└─────────┴'+'─'.repeat(52)+'┘');
    H('');
    sec('구성 요소');
    H('  [GNB]        높이 '+gnbH+'px / 배경 '+l.gnbBg);
    H('  [서브헤더]   높이 '+l.subHeaderHeight+'px / 사업장명 표시');
    H('  [사이드바]   너비 '+sideW+'px / 배경 '+l.sidebarBg);
    if(h.layout?.showBanner&&h.banner?.show)H(`  [알림배너]   "${(h.banner.text||'').slice(0,40)}…`);
    if(h.layout?.showKpi)H('  [KPI 카드]   '+(h.kpis||[]).map(k=>k.label+'('+k.value+(k.highlight?' ★':'')+')').join(' / '));
    H('  [카드 그리드] '+cols+'열 / 활성 '+enabledCards.length+'개');
    enabledCards.forEach((c,i)=>H('    '+(i+1)+'. '+c.label+' (타입:'+c.type+')'));
    if((h.quickActions||[]).length)H('  [Quick Action] '+(h.quickActions||[]).join(' / '));
    sec('구현 요청');
    H('  위 구성대로 메인(Home) 대시보드를 구현해 주세요.');
    H('  • 카드 그리드: CSS Grid '+cols+'열, gap '+h.layout?.cardGap+'px');
    H('  • 카드 배경: '+l.cardBg+' / 반경: '+l.cardRadius+'px / 그림자: '+(l.cardShadow||'없음'));
    H('  • 반응형: 2열 → 1열로 축소 (모바일)');
    H(_targetBlock());
    return lines.join('\n');
  }

  // ── 일반 메뉴 화면 ───────────────────────────
  const menu=getSelMenu();
  if(!menu)return '화면을 선택하세요.';
  const found=findMenu(menu.id);
  const fieldCols=menu.fieldCols||2;
  const fields=menu.fields||[];
  const grid=(menu.grid||[]).filter(c=>!c.hidden);
  const btns=menu.buttons||[];
  const solidBtns=btns.filter(b=>b.type==='solid');
  const lineBtns=btns.filter(b=>b.type==='line');
  const subH=parseInt(l.subHeaderHeight)||36;
  const tabH=parseInt(l.tabBarHeight)||36;
  const pg=menu.pagination||{show:true,pageSize:10};
  const innerTabs=menu.innerTabShow?(menu.innerTabItems||'').split(',').map(t=>t.trim()).filter(Boolean):[];

  H('━'.repeat(44));
  H('■ Branch UI 화면 구성도: ['+menu.name+']');
  if(menu.desc)H('  '+menu.desc);
  H('━'.repeat(44));
  H('');

  // ASCII 레이아웃 다이어그램
  H('┌'+'─'.repeat(62)+'┐');
  H('│ GNB ('+gnbH+'px)  K Branch  |  '+allTop.slice(0,5).map((n,i)=>n===( found?.top?.name||'')?'['+n+']':n).join(' · ')+'  │');
  H('├'+'─'.repeat(62)+'┤');
  H('│ 서브헤더 ('+subH+'px)  '+( l.subHeaderCompanyText||'웹케시씨엔에스(주)').slice(0,20).padEnd(22)+'│ 탭바 ('+tabH+'px) │');
  H('│              탭: ['+( menu.tabLabel||menu.name)+']'+' '.repeat(Math.max(0,28-(menu.tabLabel||menu.name).length))+'│');
  H('├─────────┬'+'─'.repeat(52)+'┤');
  H('│ 사이드바 │ 페이지 제목: '+( menu.name)+'  '.repeat(Math.max(1,4-(menu.name.length/4|0)))+'│');
  H('│('+sideW+'px) │'+' '.repeat(52)+'│');

  if(menu.banner?.show){
    H('│  메뉴   │ ┌── 알림 배너 ──────────────────────────────────┐ │');
    H('│  목록   │ │ ⚠ '+(menu.banner.text||'').slice(0,44).padEnd(44)+'  │ │');
    H('│         │ └'+'─'.repeat(50)+'┘ │');
  }
  if(innerTabs.length){
    H('│         │ ┌'+'─'.repeat(50)+'┐ │');
    H('│         │ │ 내부탭: '+(innerTabs.map((t,i)=>i===0?'['+t+']':t).join(' | ')).padEnd(41)+'│ │');
    H('│         │ └'+'─'.repeat(50)+'┘ │');
  }
  if(fields.length){
    H('│         │ ┌── 조회 조건 ('+fieldCols+'열) ──────────────────────────┐ │');
    // Group fields by rows
    for(let i=0;i<fields.length;i+=fieldCols){
      const rowFields=fields.slice(i,i+fieldCols);
      const rowStr=rowFields.map(f=>{
        const comp=f.component==='DateRange'?'[──날짜범위──]':f.component==='Select'?'[▼'+f.label.slice(0,5)+']':'['+f.label.slice(0,6)+'______]';
        return f.label.slice(0,6).padEnd(7)+comp;
      }).join('  ');
      H('│         │ │ '+rowStr.padEnd(47)+'│ │');
    }
    const btnStr=[...lineBtns,...solidBtns].map(b=>b.type==='solid'?'[■ '+b.label+' ]':'[  '+b.label+'  ]').join(' ');
    H('│         │ │ '+' '.repeat(36)+btnStr+'│ │');
    H('│         │ └'+'─'.repeat(50)+'┘ │');
  }else{
    H('│         │  (조회 조건 없음)'+' '.repeat(33)+'│');
  }
  if(grid.length){
    H('│         │ ┌── 그리드 ('+grid.length+'열) ──────────────────────────────┐ │');
    H('│         │ │ '+grid.map(c=>(c.checkbox?'☐ ':'')+c.name.slice(0,5)).join(' │ ').padEnd(47)+'│ │');
    H('│         │ │ '+'─'.repeat(47)+'│ │');
    H('│         │ │ (데이터 행 × '+s.gridRowHeight+'px)'+' '.repeat(28)+'│ │');
    if(menu.summaryBar)H('│         │ │ [합계 행]'+' '.repeat(38)+'│ │');
    H('│         │ └'+'─'.repeat(50)+'┘ │');
    if(pg.show)H('│         │  [건수 ▼]  ◀ 1 [2] 3 4 5 ▶  총N건'+(menu.pgRightButtons?.length?'  ['+menu.pgRightButtons.map(b=>b.label).join('][')+'  ]':'')+'    │');
  }
  if(menu.notes?.length){
    H('│         │  ℹ '+menu.notes[0].slice(0,48)+'  │');
  }
  H('└─────────┴'+'─'.repeat(52)+'┘');
  H('');

  sec('영역별 상세 명세');
  H('[GNB]');
  H('  높이: '+gnbH+'px / 배경: '+l.gnbBg+' / 메뉴 정렬: '+(l.gnbMenuAlign||'left'));
  H('  대메뉴: '+allTop.join(' / ')+' / 활성: '+(found?.top?.name||''));
  H('[서브헤더 + 탭바]');
  H('  사업장명: '+(l.subHeaderCompanyText||'웹케시씨엔에스(주)')+' / 탭: ['+(menu.tabLabel||menu.name)+']');
  H('[사이드바]  너비: '+sideW+'px / 배경: '+l.sidebarBg);
  H('  현재 위치: '+(found?.top?.name||'')+' > '+(found?.mid?.name||'')+' > '+menu.name);
  if(menu.banner?.show){H('[알림배너]  ⚠ '+menu.banner.text);}
  if(innerTabs.length){H('[내부탭]    '+(innerTabs.map((t,i)=>i===0?'● '+t:t).join(' / ')));}
  if(fields.length){
    H('[조회조건]  '+fieldCols+'열 배치 / '+fields.length+'개 필드');
    for(let i=0;i<fields.length;i+=fieldCols){
      const rf=fields.slice(i,i+fieldCols);
      H('  행'+(Math.floor(i/fieldCols)+1)+': '+rf.map(f=>{
        const opts=f.component==='Select'?'('+( f.options||[]).map(o=>o.label).join('/')+')':(f.placeholder?'(placeholder:"'+f.placeholder+'")':'');
        return f.label+(f.required?'*':'')+' ['+f.component+'] '+opts+(f.colspan>1?' colspan:'+f.colspan:'');
      }).join('  |  '));
    }
    H('  버튼: '+(solidBtns.length?'솔리드 — '+solidBtns.map(b=>b.label).join(', '):'')+(lineBtns.length?'  라인 — '+lineBtns.map(b=>b.label).join(', '):''));
  }
  if(grid.length){
    H('[그리드]    '+grid.length+'컬럼 / 헤더높이:'+s.gridHeaderHeight+'px / 행높이:'+s.gridRowHeight+'px');
    grid.forEach(c=>H('  '+c.name.padEnd(10)+': width '+c.width+'px / 정렬 '+(c.align==='right'?'우측':c.align==='center'?'가운데':'좌측')+(c.checkbox?' [체크박스]':'')+(c.flex?' [flex 확장]':'')+(c.type!=='text'?' type:'+c.type:'')));
    if(menu.summaryBar)H('  [합계바]   '+(menu.summaryItems||[]).map(it=>it.label+(it.highlight?'★':'')).join(' / '));
    if(pg.show)H('  [페이지네이션] 건수: '+(pg.pageSizeOptions||[10,20,50]).join('/')+' / 활성배경: '+(s.pgActiveBg||s.primaryColor));
    if(menu.pgRightButtons?.length)H('  [그리드 우측 버튼] '+(menu.pgRightButtons.map(b=>b.label).join(', ')));
  }
  if(menu.notes?.length){H('[안내문구]  '+(menu.notes.map(n=>'• '+n).join('\n           ')));}

  sec('디자인 토큰 (구현 시 참고)');
  H('  폰트: '+s.fontFamily+' / 기본크기: '+s.fontSize+'px / 입력높이: '+s.inputHeight+'px');
  H('  주요색: '+s.primaryColor+' / 테두리: 1px solid '+s.borderColor+' / radius: '+s.borderRadius+'px');
  H('  버튼 높이: '+s.buttonHeight+'px / radius: '+s.buttonRadius+'px');
  H('  그리드 헤더: '+s.gridHeaderBg+' / hover: '+s.rowHoverBg+' / click: '+(s.gridRowClickBg||'#c8d8f8'));

  sec('구현 요청');
  H('  위 구성도대로 ['+menu.name+'] 화면을 구현해 주세요.');
  H('  • 전체 레이아웃: GNB('+gnbH+'px) + 서브헤더('+subH+'px) + 탭바('+tabH+'px) + 사이드바('+sideW+'px) + 본문');
  if(fields.length)H('  • 조회조건 영역: '+fieldCols+'열 grid layout, label 너비 '+s.labelWidth+'px 고정');
  if(grid.length)H('  • 그리드: 스크롤 가능, 헤더 고정, 행 클릭 이벤트');
  if(pg.show)H('  • 페이지네이션: 건수선택 + 페이지번호 + 총건수 3구역');
  H('  • transition: all 0.15s ease 기본 적용');
  H('  • 토큰 외 신규 색상 생성 금지');
  H(_targetBlock());
  return lines.join('\n');
}

function buildComprehensivePrompt(){

  const allTop=[...new Set([...GNB_MENUS,...S.tree.map(g=>g.name)])].slice(0,6);
  const ver=new Date().toISOString().slice(0,10);
  const lines=[];
  const H=t=>lines.push(t);

  // ── 헤더 ──

  H('■■ Branch UI 종합 기획서  ['+ver+']');

  // ── 1. 디자인 시스템 ──
  sec('1. 디자인 시스템 (Design Tokens)');
  sub('색상');
  H('  주요색(Primary)    : '+s.primaryColor);
  H('  라인버튼색          : '+s.lineColor);
  H('  페이지 배경         : '+s.pageBg);
  H('  본문 배경           : '+(s.detailBg||s.pageBg));

  H('  필드 포커스         : '+s.fieldFocusBorder);
  sub('타이포그래피');
  H('  기본 폰트  : '+s.fontFamily+(l.gnbFontFamily?' / GNB: '+l.gnbFontFamily:'')+(l.sidebarFontFamily?' / 사이드바: '+l.sidebarFontFamily:''));
  H('  기본 크기  : '+s.fontSize+'px');
  H('  라벨 색상  : '+(s.labelColor||'#555')+' / 굵기: '+(s.labelWeight||'400'));
  sub('버튼');
  H('  솔리드: 배경 '+(s.btnSolidBg||s.primaryColor)+' / 텍스트 '+(s.btnSolidColor||'#fff')+' / radius '+s.buttonRadius+'px / 높이 '+s.buttonHeight+'px');
  H('    hover '+(s.btnSolidHoverBg||'') +' / active '+(s.btnSolidActiveBg||'')+' / disabled '+(s.btnSolidDisabledBg||'#b0bec5'));
  H('  라인:   배경 '+(s.btnLineBg||'#fff')+' / 텍스트 '+(s.btnLineColor||s.lineColor)+' / 테두리 1px solid '+(s.btnLineBorderColor||s.lineColor));
  H('    hover '+(s.btnLineHoverBg||'#f0f4ff')+' / active '+(s.btnLineActiveBg||'#dde8ff'));
  sub('입력 필드');
  H('  높이: '+s.inputHeight+'px / 테두리: 1px solid '+s.borderColor+' / radius: '+s.borderRadius+'px');
  H('  배경: '+(s.inputBg||'#fff')+' / disabled 배경: '+(s.inputDisabledBg||'#f5f5f5'));
  H('  focus: 2px solid '+s.fieldFocusBorder+' / error: 1px solid '+s.fieldErrorBorder);
  H('  필수 표시: "'+s.requiredMark+'" ('+s.requiredColor+')');
  sub('그리드');
  H('  헤더: 배경 '+s.gridHeaderBg+' / 텍스트 '+s.gridHeaderColor+' / 높이 '+s.gridHeaderHeight+'px / 굵기 '+(s.gridHeaderFontWeight||'600'));
  H('  행: 높이 '+s.gridRowHeight+'px / 홀수 '+s.gridRowOdd+' / 짝수 '+s.gridRowEven);
  H('  hover: '+s.rowHoverBg+' / click: '+(s.gridRowClickBg||'#c8d8f8')+' / 구분선: '+s.gridBorderColor);
  H('  셀 패딩: '+(s.gridCellPadding||'10')+'px / wrapper radius: '+(s.gridWrapRadius||'4')+'px');

  // ── 2. 레이아웃 구조 ──
  sec('2. 레이아웃 구조');
  H('[GNB]      높이: '+l.gnbHeight+'px / 배경: '+l.gnbBg+(l.gnbShadow?' / 그림자: '+l.gnbShadow:''));
  H('           메뉴 정렬: '+(l.gnbMenuAlign||'left')+' / 대메뉴: '+allTop.join(' > '));
  H('[서브헤더]  높이: '+(l.subHeaderHeight||'36')+'px / 배경: '+l.subHeaderBg);
  H('           사업장명: '+(l.subHeaderCompanyText||'웹케시씨엔에스(주)'));
  H('[탭바]     높이: '+l.tabBarHeight+'px / 배경: '+l.tabBarBg);
  H('[사이드바]  너비: '+l.sidebarWidth+'px / 배경: '+l.sidebarBg);
  H('           활성: 배경 '+l.sidebarActiveBg+' / 텍스트 '+l.sidebarActiveColor);
  H('[본문]     배경: '+(s.detailBg||s.pageBg)+' / 섹션 패딩: '+(s.sectionPadding||'16')+'px');
  if(l.showFooter==='true')H('[푸터]     '+l.footerText+' / '+l.footerContactNumber);

  // ── 3. 화면 목록 ──
  sec('3. 화면 목록');
  // 로그인
  const lg=S.login;
  H('\n[0] 로그인 화면');
  (lg.tabs||[]).forEach((t,i)=>{
    H('  ['+(i+1)+'] 탭: "'+t.name+'"'+(t.name===lg.activeTab?' (기본)':''));
    H('    필드: '+((t.fields||[]).length?(t.fields||[]).map(f=>f.label+'('+f.type+')').join(' / '):'없음'));
    H('    버튼: '+t.loginBtnText+' ('+t.loginBtnBg+')'+(t.saveId?' / 아이디저장':'')+(t.autoLogin?' / 자동로그인':''));
    if((t.extraLinks||[]).length)H('    링크: '+(t.extraLinks||[]).join(' / '));
  });
  // 메인(Home)
  const h=S.home;
  H('\n[1] 메인(Home) — '+h.desc);
  H('  KPI: '+(h.kpis||[]).map(k=>k.label+':'+k.value).join(' / '));
  H('  카드: '+(h.cards||[]).filter(c=>c.enabled).map(c=>c.label+'('+c.type+')').join(' / '));
  H('  QuickAction: '+(h.quickActions||[]).join(' / '));
  // 메뉴 트리
  let screenIdx=2;
  for(const g of S.tree){
    H('\n['+g.name+']');
    for(const m of g.children){
      for(const sub of m.children){
        const flds=(sub.fields||[]).map(f=>f.label).join('/');
        const cols=(sub.grid||[]).filter(c=>!c.hidden).map(c=>c.name).join('/');
        H('  ['+(screenIdx++)+'_'+sub.name+'] '+m.name+' > '+sub.name);
        if(sub.desc)H('    설명: '+sub.desc);
        if(flds)H('    조건: '+flds);
        if(cols)H('    그리드: '+cols);
        const btns=(sub.buttons||[]).map(b=>b.label+'('+b.type+')').join('/');
        if(btns)H('    버튼: '+btns);
      }
    }
  }

  // ── 4. 인터랙션 명세 ──
  if(ix.enabled){
    sec('4. 인터랙션 명세');
    H('버튼(솔리드) hover  : filter '+ix.btnSolidHover);
    H('버튼(솔리드) active : transform '+ix.btnSolidActive);
    H('버튼(라인)   hover  : 배경 '+ix.btnLineHover);
    H('그리드 행 hover     : '+(ix.rowHover?'배경 '+s.rowHoverBg:'미적용'));
    H('그리드 행 클릭      : '+(ix.rowClick==='popup'?'상세 팝업':ix.rowClick==='slide'?'우측 슬라이드':ix.rowClick==='expand'?'행 인라인 확장':'없음'));
    H('필드 포커스         : '+(ix.fieldFocus?'2px solid '+s.fieldFocusBorder:'미적용'));
    H('필드 에러           : '+(ix.fieldError?'1px solid '+s.fieldErrorBorder+' / "'+ix.fieldErrorMsg+'"':'미적용'));
  }

  // ── 5. 상태 명세 ──
  if(S.selStates.length){
    sec('5. 상태별 명세 ('+S.selStates.map(s=>STATE_LABEL[s]).join(' / ')+')');
    S.selStates.forEach((sid,i)=>{
      H('\n['+STATE_LABEL[sid]+']  '+STATE_DESC[sid]);
      _stateTokenBlock(sid).forEach(l=>H(l));
    });
  }

  H(_targetBlock());
  H('\n'+'█'.repeat(44));
  H('※ 토큰 외 신규 색상 생성 금지 / spacing 임의변경 금지');
  H('█'.repeat(44));
  return lines.join('\n');
}

function buildRevisionPrompt(){

  H('━'.repeat(44));

  H('  버튼반경:  '+s.buttonRadius+'px  /  필드반경: '+s.borderRadius+'px');
  H('  입력높이:  '+s.inputHeight+'px  /  버튼높이: '+s.buttonHeight+'px  /  라벨너비: '+s.labelWidth+'px');

  if(menu){
    sec('현재 화면 스펙 요약 ['+screenName+']');
    H('  조건 필드: '+(menu.fields||[]).length+'개');
    if((menu.fields||[]).length){
      H('    '+( menu.fields||[]).map(f=>f.label+'('+f.component+')').join(' / '));
    }
    H('  그리드: '+(menu.grid||[]).filter(c=>!c.hidden).length+'컬럼');
    if((menu.grid||[]).filter(c=>!c.hidden).length){
      H('    '+(menu.grid||[]).filter(c=>!c.hidden).map(c=>c.name+'('+c.width+'px)').join(' / '));
    }
    H('  버튼: '+(menu.buttons||[]).map(b=>b.label+'('+b.type+')').join(', ')||'없음');
    if(menu.pagination?.show)H('  페이지네이션: pageSize '+menu.pagination.pageSize+' / '+( menu.pagination.pageSizeOptions||[]).join(','));
    if(menu.summaryBar)H('  합계바: '+(menu.summaryItems||[]).map(it=>it.label).join(' / '));
    if(menu.innerTabShow)H('  내부탭: '+(menu.innerTabItems||''));
  }
  sec('요청 방식');
  H('  • 이전 구현을 기반으로 위 [수정 내용]만 반영해 주세요.');
  H('  • 명시되지 않은 부분은 기존 구현을 그대로 유지하세요.');
  H('  • 토큰 외 신규 색상·스타일 생성 금지');
  if(target==='pencil'){
    H('  • CSS var() 토큰 참조 유지');
  } else {
    H('  • Figma Local Style 참조 유지, 임의 색상 직접 입력 금지');
  }
  return lines.join('\n');
}

function copyStatePrompt(stateId){
  const text=buildStatePrompt(stateId);
  const label=STATE_LABEL[stateId]||stateId;
  if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(text).then(()=>showToast(`📋 [${label}] 상태 프롬프트 복사됨`)).catch(()=>fallbackCopyText(text,()=>showToast(`📋 [${label}] 복사됨`)));return;}
  fallbackCopyText(text,()=>showToast(`📋 [${label}] 복사됨`));
}
function copyAllStatesPrompt(){
  const text=buildAllStatesPrompt();

  fallbackCopyText(text,()=>showToast(`📋 복사됨`));
}

// ── 화면 전용 프롬프트 (프레임 참조형) ──────────
function buildContentPrompt(){
  if(isHomeSelected()){
    const h=S.home,s=S.style,l=S.layout;
    const ver=new Date().toISOString().slice(0,10);
    const lines=[];
    lines.push('━'.repeat(42));
    lines.push('■ SCREEN: 메인(Home)');
    lines.push('  ※ 공통 프레임(KBranch UI / '+ver+') 준수');
    if(h.desc)lines.push('  설명: '+h.desc);
    lines.push('━'.repeat(42));
    lines.push('\n【LAYOUT】');
    lines.push('  columns: '+(h.layout?.columns||3)+'  gap: '+(h.layout?.cardGap||12)+'px');
    lines.push('  search: '+(h.layout?.showSearch?'표시':'숨김')+'  banner: '+(h.layout?.showBanner?'표시':'숨김')+'  kpi: '+(h.layout?.showKpi?'표시':'숨김'));
    lines.push('\n【HERO】');
    lines.push('  title:    '+h.heroTitle);
    lines.push('  subtitle: '+h.heroSubtitle);
    if(h.banner?.show)lines.push('  banner:   "'+h.banner.text+'"');
    if((h.kpis||[]).length){
      lines.push('\n【KPI】');
      (h.kpis||[]).forEach((k,i)=>lines.push('  '+(i+1)+'. '+k.label+': '+k.value+(k.highlight?' [강조]':'')));
    }
    const ec=(h.cards||[]).filter(c=>c.enabled);
    if(ec.length){
      lines.push('\n【CARDS】');
      ec.forEach((c,i)=>lines.push('  '+(i+1)+'. '+c.label.padEnd(14)+'type:'+c.type));
    }
    if((h.quickActions||[]).length){
      lines.push('\n【QUICK ACTIONS】');
      (h.quickActions||[]).forEach((q,i)=>lines.push('  '+(i+1)+'. '+q));
    }
    lines.push('\n【STATES】  '+(h.states||[]).join(' / '));
    lines.push('\n【CARD STYLE】  (--card-radius / --card-bg / --card-shadow 토큰 준수)');
    lines.push(_targetBlock());
    return lines.join('\n');
  }
  const menu=getSelMenu();if(!menu)return '메뉴를 선택하세요';
  const s=S.style,l=S.layout,found=findMenu(menu.id),ix=S.ix;
  const ver=new Date().toISOString().slice(0,10);
  const lines=[];
  lines.push('━'.repeat(42));
  lines.push('■ SCREEN: '+menu.name);
  lines.push('  위치: '+(found?.top?.name||'?')+' > '+(found?.mid?.name||'?')+' > '+menu.name);
  lines.push('  탭:   '+(menu.tabLabel||menu.name));
  lines.push('  ※ 공통 프레임(KBranch UI / '+ver+') 준수');
  if(menu.desc)lines.push('  설명: '+menu.desc);
  lines.push('━'.repeat(42));
  if(menu.banner?.show){lines.push('\n【BANNER】');lines.push('  "'+menu.banner.text+'"');}
  if(menu.innerTabShow&&menu.innerTabItems){lines.push('\n【INNER TABS】  '+(menu.innerTabItems));lines.push('  active: 첫 번째 탭  (--inner-tab-* 토큰 준수)');}
  if((menu.fields||[]).length>0){
    lines.push('\n【CONDITION】  '+(menu.fieldCols||2)+'열 배치');
    (menu.fields||[]).forEach(f=>{
      const span=f.colspan>1?' colspan:'+f.colspan:'';
      const ph=f.placeholder?' placeholder:"'+f.placeholder+'"':'';
      const opts=f.component==='Select'&&(f.options||[]).length?' ['+f.options.map(o=>o.label).join('/')+']':'';
      lines.push('  '+(f.required?'* ':  '  ')+f.label.padEnd(12)+f.component.padEnd(12)+(f.width?'w:'+f.width+'px':'').padEnd(10)+span+ph+opts);
    });
    const solid=(menu.buttons||[]).filter(b=>b.type==='solid').map(b=>b.label);
    const line=(menu.buttons||[]).filter(b=>b.type==='line').map(b=>b.label);
    lines.push('  [Buttons]  solid:('+solid.join(',')+')  line:('+line.join(',')+')');
  }
  if((menu.grid||[]).filter(c=>!c.hidden).length>0){
    lines.push('\n【GRID】  '+(menu.grid||[]).filter(c=>!c.hidden).length+'컬럼'+(ix.rowClick&&ix.rowClick!=='none'?'  row-click:'+ix.rowClick:''));
    (menu.grid||[]).filter(c=>!c.hidden).forEach(col=>{
      const flags=[col.checkbox?'checkbox':'',col.flex?'flex':'',col.type!=='text'?col.type:''].filter(Boolean).join(' ');
      lines.push('  '+col.name.padEnd(12)+col.align.padEnd(8)+(col.flex?'flex    ':'w:'+(col.width||60)+'px ').padEnd(10)+(flags||''));
    });
  }
  if(menu.summaryBar){
    lines.push('\n【SUMMARY BAR】  ← 그리드 바로 아래, 페이지네이션 위에 위치 (순서 엄수)');
    lines.push('  배경: '+s.summaryBarBg+' / 상단선: 2px solid '+(s.summaryBarBorderColor||s.gridBorderColor)+' / 강조색: '+s.summaryBarHighlight);
    (menu.summaryItems||[]).forEach(it=>lines.push('  '+it.label+(it.highlight?' [강조]':'')));
  }
  if(menu.pagination?.show){
    const pgSizes=(menu.pagination.pageSizeOptions||[10,20,50]).join('/');
    lines.push('\n【PAGINATION】  ← 합계바 아래, 화면 최하단 위치 (순서 엄수)');
    lines.push('  좌: 건수선택('+pgSizes+') / 가운데: 페이지 네비게이션 / 우: 총N건');
    lines.push('  네비게이션 버튼 구성 (좌→우): [처음 «] [이전 ‹] [1] [2] [3] [4] [5] [다음 ›] [마지막 »]');
    lines.push('  ※ 처음(«)·이전(‹)·다음(›)·마지막(») 네비게이션 버튼 반드시 포함');
    lines.push('  활성 페이지: 배경 '+(s.pgActiveBg||s.primaryColor)+' / 텍스트 '+(s.pgActiveColor||'#fff'));
    lines.push('  비활성 페이지: 배경 '+(s.pgItemBg||'#fff')+' / 텍스트 '+(s.pgItemColor||'#333'));
    lines.push('  전체 border: 1px solid '+(s.pgBarBorderColor||s.gridBorderColor));
    if(menu.pgRightButtons?.length)lines.push('  우측 버튼: '+menu.pgRightButtons.map(b=>b.label).join(', '));
  }
  if((menu.notes||[]).length>0){
    lines.push('\n【NOTE】');
    (menu.notes||[]).forEach(n=>lines.push('  • '+n));
  }
  const states=ix.outputRequest&&(ix.outputStates||[]).length?(ix.outputStates||[]).join(' / '):'default';
  lines.push('\n【STATES】  '+states);
  if(ix.fieldError)lines.push('\n【VALIDATION】  error-msg: "'+ix.fieldErrorMsg+'"');
  lines.push(_targetBlock());
  return lines.join('\n');
}

function buildInteractionSection(){
  const ix=S.ix,s=S.style;
  if(!ix.enabled)return"";
  const lines=["\n▣ 인터랙션 명세\n─────────────────────────────────────","[버튼 - 강조(solid)]","  hover  : filter "+ix.btnSolidHover+" / transition 150ms","  active : transform "+ix.btnSolidActive,"[버튼 - 라인(line)]","  hover  : background "+ix.btnLineHover+" / transition 150ms","  active : transform scale(0.97)"];
  if(ix.rowHover){lines.push("[그리드 행]");lines.push("  hover  : background "+s.rowHoverBg+" / cursor pointer");if(ix.rowClick==="popup")lines.push("  click  : 상세 팝업 오픈");else if(ix.rowClick==="slide")lines.push("  click  : 우측 슬라이드 패널");else if(ix.rowClick==="expand")lines.push("  click  : 행 인라인 확장");}
  if(ix.fieldFocus){lines.push("[입력 필드]");lines.push("  focus  : border 2px solid "+s.fieldFocusBorder);}
  if(ix.fieldError){lines.push("[입력 필드 - 에러]");lines.push("  border : 1px solid "+s.fieldErrorBorder);lines.push("  message: \""+ix.fieldErrorMsg+"\"");}
  lines.push("※ transition 기본값: all 0.15s ease");
  if(ix.outputRequest&&(ix.outputStates||[]).length>0){
    const SL={default:"기본 (Default) — 초기 진입 상태",hover:"호버 (Hover) — 버튼/행 마우스 오버",click:"클릭/활성 (Active) — 버튼 눌림 + 행 클릭",error:"에러 (Error) — 필수값 미입력 에러",focus:"포커스 (Focus) — 필드 선택 시 테두리 강조",disabled:"비활성 (Disabled) — 버튼·필드 disabled"};
    const fmtLabel=ix.outputFormat==="react"?"React 컴포넌트":ix.outputFormat==="html"?"HTML+CSS":"Figma 프레임";
    lines.push("\n▣ 산출물 요청\n─────────────────────────────────────");
    lines.push("출력 형식: "+fmtLabel);
    lines.push("아래 "+ix.outputStates.length+"가지 상태를 각각 독립된 화면으로 생성해 주세요.\n");
    ix.outputStates.forEach((sid,idx)=>{const label=SL[sid];if(!label)return;lines.push("["+(idx+1)+"] "+label);lines.push("");});
    if(ix.outputFormat==="react")lines.push("구현: 단일 파일, 상단 탭으로 상태 전환");
    else if(ix.outputFormat==="html")lines.push("구현: .state-hover 등 CSS 클래스 분리");
    else lines.push("구현: 각 상태를 별도 프레임으로 생성");
  }
  return lines.join("\n");
}

  return lines.join('\n');
}

// ─── Pencil.dev 실행 가능 batch_design 코드 자동 생성 ───
function _q(s){return String(s||'').replace(/\\/g,'\\\\').replace(/"/g,'\\"').replace(/'/g,"\\'");}

// ─── ops 자동 카운터: 25개 초과 시 Call 자동 분할 ───
const _PEN_MAX_OPS=22;
let _penCallNum=1,_penOpCount=0;
function _penResetCounter(){_penCallNum=1;_penOpCount=0;}
function _penOp(lines,line){
  const trimmed=line.trim();
  // I(), U(), R(), C(), D(), G() 호출 감지 (바인딩 할당 포함)
  if(/^[a-zA-Z_][a-zA-Z0-9_]*=?[IURCDG]\(/.test(trimmed)||/^[IURCDG]\(/.test(trimmed)){
    _penOpCount++;
    if(_penOpCount>_PEN_MAX_OPS){
      _penCallNum++;
      _penOpCount=1;
      lines.push('');
      lines.push('// ═══ batch_design Call '+_penCallNum+' (자동 분할 — 위 Call을 먼저 실행하세요) ═══');
      lines.push('// ⚠ filePath: pencil/기본.pen');
    }
  }
  lines.push(line);
}

    const fieldCols=menu.fieldCols||2;
    for(let i=0;i<fields.length;i+=fieldCols){

      });
      H(`I(pgBar,{type:"text",content:"총 ${sampleRows.length}건",fill:"$--text-label",fontSize:11})`);
    }
    if((menu.notes||[]).length>0){
      H(`noteBox=I(content,{type:"frame",layout:"vertical",width:"fill_container",padding:[10,14],gap:4,fill:"#F2F8F1",stroke:{align:"inside",fill:"$--primary",thickness:1},cornerRadius:4})`);
      menu.notes.forEach(n=>{
        H(`I(noteBox,{type:"text",content:"• ${_q(n)}",fill:"$--text-label",fontSize:12,textGrowth:"fixed-width",width:"fill_container"})`);
      });
    }
    if(l.showFooter==='true'){
      H(`footer=I(screen,{type:"frame",layout:"horizontal",width:"fill_container",height:34,padding:[0,20],alignItems:"center",justifyContent:"space_between",fill:"$--white",stroke:{align:"inside",fill:"$--field-border",thickness:{top:1}}})`);
      H(`I(footer,{type:"text",content:"${_q(l.footerText)}",fill:"#888",fontSize:12})`);
      H(`I(footer,{type:"text",content:"전화상담 ${_q(l.footerContactNumber)}",fill:"#888",fontSize:12})`);
    }
  }
  P(`\n// ═══ placeholder 해제 (마지막 Call에 포함) ═══`);
  H(`U(screen,{placeholder:false})`);

  return lines.join('\n');
}

function _targetBlock(){

    return '\n▣ 구현 요청 (Pencil.dev MCP)\n'+sep+'\n'+[
      '  • Pencil.dev batch_design MCP 도구의 I()/U()/R()/C()/D() 명령으로 구현해 주세요.',
      '  • 색상은 반드시 "$--변수명" 토큰으로 참조 (예: fill:"$--primary")',

      '  • 크기: fill_container / fit_content 우선, 고정 px는 최소한으로',

      '  • 텍스트: fill 속성 필수 (없으면 투명!), width 필요 시 textGrowth:"fixed-width" 선행',

    '  • Auto-Layout 적극 사용 — direction / gap / padding 위 수치 그대로 적용',

let _rightScroll=0;

let _leftScroll=0;
function saveRightScroll(){const el=document.getElementById('right-content');if(el)_rightScroll=el.scrollTop;}
function restoreRightScroll(){const el=document.getElementById('right-content');if(el)el.scrollTop=_rightScroll;}
function savePreviewScroll(){const el=document.getElementById('preview-scroll');if(el)_previewScroll=el.scrollTop;}
function restorePreviewScroll(){const el=document.getElementById('preview-scroll');if(el)el.scrollTop=_previewScroll;}
function saveLeftScroll(){const el=document.querySelector('#left .scroll-area');if(el)_leftScroll=el.scrollTop;}
function restoreLeftScroll(){const el=document.querySelector('#left .scroll-area');if(el)el.scrollTop=_leftScroll;}
function renderCenter(){savePreviewScroll();renderMainContent();requestAnimationFrame(()=>{requestAnimationFrame(()=>{restorePreviewScroll();});});}
function renderRightOnly(){saveRightScroll();renderRight();requestAnimationFrame(()=>{requestAnimationFrame(()=>{restoreRightScroll();});});}
let _skipLeftRender=false;
function renderNoLeft(){
  // 좌측 패널은 건드리지 않고 미리보기+우측만 갱신 (스크롤 위치 보존)
  saveRightScroll();savePreviewScroll();
  renderMainContent();renderRight();

}
function renderAll(){
  saveRightScroll();
  savePreviewScroll();
  renderLeftTabs();renderMainTabs();renderLeftContent();renderMainContent();renderRight();
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{
    restoreRightScroll();
    restorePreviewScroll();
  });});
}

// ─── 드래그앤드롭 ───────────────────────────────
let _dnd={type:null,fromIdx:null,fromGid:null,fromMid:null};
function dndStart(e,type,fromIdx,fromGid,fromMid){
  _dnd={type,fromIdx:fromIdx??null,fromGid:fromGid??null,fromMid:fromMid??null};
  e.dataTransfer.effectAllowed='move';
  e.stopPropagation();
}
function dndOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';}
function dndEnterCard(el){el.classList.add('dnd-card-over');}
function dndLeaveCard(e,el){if(e.relatedTarget&&el.contains(e.relatedTarget))return;el.classList.remove('dnd-card-over');}
function dndEnterTree(el){el.classList.add('dnd-tree-over');}
function dndLeaveTree(e,el){if(e.relatedTarget&&el.contains(e.relatedTarget))return;el.classList.remove('dnd-tree-over');}
function dropField(e,toIdx){
  e.currentTarget.classList.remove('dnd-card-over');
  if(_dnd.type!=='field')return;
  const from=_dnd.fromIdx; if(from===null||from===toIdx)return;
  const m=getSelMenu();if(!m)return;
  const a=[...m.fields];const[item]=a.splice(from,1);a.splice(toIdx,0,item);
  m.fields=a;_dnd={type:null};renderAll();
}
function dropCol(e,toIdx){
  e.currentTarget.classList.remove('dnd-card-over');
  if(_dnd.type!=='col')return;
  const from=_dnd.fromIdx; if(from===null||from===toIdx)return;
  const m=getSelMenu();if(!m)return;
  const a=[...m.grid];const[item]=a.splice(from,1);a.splice(toIdx,0,item);
  m.grid=a;_dnd={type:null};renderAll();
}
function dropTreeG(e,toIdx){
  e.currentTarget.classList.remove('dnd-tree-over');
  if(_dnd.type!=='tree-g')return;
  const from=_dnd.fromIdx; if(from===null||from===toIdx)return;
  const a=[...S.tree];const[item]=a.splice(from,1);a.splice(toIdx,0,item);
  S.tree=a;_dnd={type:null};renderAll();
}
function dropTreeM(e,toIdx,gid){
  e.currentTarget.classList.remove('dnd-tree-over');
  if(_dnd.type!=='tree-m'||_dnd.fromGid!==gid)return;
  const from=_dnd.fromIdx; if(from===null||from===toIdx)return;
  const g=S.tree.find(x=>x.id===gid);if(!g)return;
  const a=[...g.children];const[item]=a.splice(from,1);a.splice(toIdx,0,item);
  g.children=a;_dnd={type:null};renderAll();
}
function dropTreeS(e,toIdx,mid){
  e.currentTarget.classList.remove('dnd-tree-over');
  if(_dnd.type!=='tree-s'||_dnd.fromMid!==mid)return;
  const from=_dnd.fromIdx; if(from===null||from===toIdx)return;
  for(const g of S.tree)for(const m of g.children)if(m.id===mid){
    const a=[...m.children];const[item]=a.splice(from,1);a.splice(toIdx,0,item);
    m.children=a;_dnd={type:null};renderAll();return;
  }
}

function attachTreeEvents(){
  document.querySelectorAll(".tree-g").forEach(el=>{el.addEventListener("click",e=>{if(e.target.closest("button"))return;if(el.dataset.login){S.selId='login';saveSelectedView();renderAll();return;}if(el.dataset.home){S.selId='home';saveSelectedView();renderAll();return;}const g=S.tree.find(g=>g.id===el.dataset.gid);if(g){g.open=!g.open;renderLeftContent();}});});
  document.querySelectorAll(".tree-m").forEach(el=>{el.addEventListener("click",e=>{if(e.target.closest("button"))return;for(const g of S.tree)for(const m of g.children)if(m.id===el.dataset.mid){m.open=!m.open;renderLeftContent();return;}});});
  document.querySelectorAll(".tree-s").forEach(el=>{el.addEventListener("click",e=>{if(e.target.closest("button"))return;S.selId=el.dataset.sid;saveSelectedView();renderAll();});});
  document.querySelectorAll("[data-action]").forEach(btn=>{btn.addEventListener("click",e=>{e.stopPropagation();const{action,gid,mid,sid}=btn.dataset;if(action==="aG")openModal("aG",null,null,null,"대메뉴 추가");else if(action==="aM")openModal("aM",gid,null,null,"중메뉴 추가");else if(action==="aS")openModal("aS",gid,mid,null,"소메뉴 추가");else if(action==="rG")openModal("rG",gid,null,null,"이름 변경");else if(action==="rM")openModal("rM",null,mid,null,"이름 변경");else if(action==="rS")openModal("rS",null,null,sid,"이름 변경");else if(action==="dG"){S.tree=S.tree.filter(g=>g.id!==gid);renderAll();}else if(action==="dM"){for(const g of S.tree)if(g.id===gid){g.children=g.children.filter(m=>m.id!==mid);break;}renderAll();}else if(action==="dS"){for(const g of S.tree)for(const m of g.children)if(m.id===mid){m.children=m.children.filter(s=>s.id!==sid);break;}if(S.selId===sid){S.selId='m5';saveSelectedView();}renderAll();}else if(action==="cS"){copySubMenu(gid,mid,sid);}});});
}

// 모달
let _mc={};
function openModal(type,gid,mid,sid,title){_mc={type,gid,mid,sid};document.getElementById("modal-title").textContent=title;document.getElementById("modal-input").value="";document.getElementById("modal-overlay").classList.add("open");setTimeout(()=>document.getElementById("modal-input").focus(),50);}
function closeModal(){document.getElementById("modal-overlay").classList.remove("open");}
function confirmModal(){
  const val=document.getElementById("modal-input").value.trim();if(!val)return;
  const{type,gid,mid,sid}=_mc;
  if(type==="aG"){S.tree.push({id:uid(),name:val,open:true,children:[]});}
  else if(type==="aM"){for(const g of S.tree)if(g.id===gid){g.children.push({id:uid(),name:val,open:true,children:[]});break;}}
  else if(type==="aS"){const ns=mkMenu({id:uid(),name:val,tabLabel:val});for(const g of S.tree)for(const m of g.children)if(m.id===mid){m.children.push(ns);S.selId=ns.id;saveSelectedView();break;}}
  else if(type==="rG"){for(const g of S.tree)if(g.id===gid){g.name=val;break;}}
  else if(type==="rM"){for(const g of S.tree)for(const m of g.children)if(m.id===mid){m.name=val;break;}}
  else if(type==="rS"){for(const g of S.tree)for(const m of g.children)for(const s of m.children)if(s.id===sid){s.name=val;break;}}
  closeModal();renderAll();
}
document.getElementById("modal-input").addEventListener("keydown",e=>{if(e.key==="Enter")confirmModal();if(e.key==="Escape")closeModal();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeJsonModal();});

function getLoginTabConfig(name){return(S.login.tabs||[]).find(t=>t.name===name)||(S.login.tabs||[])[0]||{};}
function getActiveLoginTab(){return getLoginTabConfig(S.login.activeTab);}
function addLoginTab(){
  const n='새 탭 '+(S.login.tabs.length+1);
  S.login.tabs.push({name:n,fields:[],saveId:false,autoLogin:false,loginBtnText:n,loginBtnBg:'#1659c5',loginBtnColor:'#FFFFFF',extraLinks:[]});
  S.login.activeTab=n;renderRightOnly();renderCenter();
}
function removeLoginTab(idx){
  if((S.login.tabs||[]).length<=1)return;
  S.login.tabs.splice(idx,1);
  S.login.activeTab=S.login.tabs[0].name;
  renderRightOnly();renderCenter();
}
function migrateLoginFormat(){
  const lg=S.login;
  if(!lg.tabs||!lg.tabs.length)return;
  if(typeof lg.tabs[0]==='string'){
    const oldTabs=lg.tabs;
    lg.tabs=[
      {name:oldTabs[0],fields:lg.fields||[],saveId:!!lg.saveId,autoLogin:!!lg.autoLogin,loginBtnText:lg.loginBtnText||'로그인',loginBtnBg:lg.loginBtnBg||'#209F85',loginBtnColor:lg.loginBtnColor||'#FFFFFF',extraLinks:['비밀번호 찾기']},
      ...oldTabs.slice(1).map(n=>({name:n,fields:[],saveId:false,autoLogin:false,loginBtnText:lg.certBtnText||n,loginBtnBg:lg.certBtnBg||'#ACACAC',loginBtnColor:lg.certBtnColor||'#FFFFFF',extraLinks:[]}))
    ];
    delete lg.fields;delete lg.saveId;delete lg.autoLogin;
    delete lg.loginBtnText;delete lg.loginBtnBg;delete lg.loginBtnColor;
    delete lg.certBtnText;delete lg.certBtnBg;delete lg.certBtnColor;
    if(!lg.activeTab)lg.activeTab=lg.tabs[0].name;
  }
}

function renderSampleDataPanel(menu){
  const rows=getSampleRows(menu);
  const cols=(menu?.grid||[]).filter(c=>!c.hidden);
  let html=`<div style="display:flex;flex-direction:column;gap:8px;">
    <div style="font-size:10px;color:#666;line-height:1.7;">메뉴별로 샘플 데이터가 따로 저장됩니다. 현재 표 미리보기와 즉시 동기화됩니다.</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      <button class="btn-add" onclick="openSampleJsonImportModal()">JSON 가져오기</button>
      <button class="btn-add" onclick="exportSampleJson()">JSON 내보내기</button>
      <button class="btn-add" onclick="resetMenuSampleRows()">초기화</button>
    </div>`;
  if(cols.length===0){
    html+=`<div style="padding:14px 10px;text-align:center;color:#bbb;font-size:11px;border:1px dashed #dde1e9;border-radius:4px;">그리드 컬럼을 먼저 추가하세요.</div></div>`;
    return html;
  }
  rows.forEach((row,ri)=>{
    html+=`<div class="sample-row-card"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px;"><div style="font-size:11px;font-weight:700;color:#1659c5;">행 ${ri+1}</div><button class="btn-icon" style="font-size:14px;" onclick="deleteSampleRow(${ri})">✕</button></div><div class="sample-grid">`;
    cols.forEach(col=>{
      const value=row && Object.prototype.hasOwnProperty.call(row,col.name)?row[col.name]:'';
      let control='';
      const safeName=String(col.name).replace(/'/g,"\'");
      if(col.checkbox || col.name==='☐') control=`<label style="display:flex;align-items:center;gap:6px;height:32px;font-size:11px;color:#555;"><input type="checkbox" ${value?'checked':''} onchange="updateSampleCell(${ri},'${safeName}',this.checked)">선택</label>`;
      else if(col.type==='status' || col.name==='상태') control=`<select style="${si}width:100%;" onchange="updateSampleCell(${ri},'${safeName}',this.value)">${SAMPLE_STATUS_OPTIONS.map(st=>`<option value="${st}" ${String(value)===st?'selected':''}>${st}</option>`).join('')}</select>`;
      else control=`<input type="text" value="${escHtml(value ?? '')}" style="${si}width:100%;" oninput="updateSampleCell(${ri},'${safeName}',this.value)">`;
      html+=`<div class="sample-cell"><label>${escHtml(col.name)} <span style="color:#aaa;">(${escHtml(col.type)})</span></label>${control}</div>`;
    });
    html+=`</div></div>`;
  });
  html+=`</div>`;
  return html;
}

function openJsonModal(title,text,mode='view'){_jsonModalMode=mode;const ov=document.getElementById('json-modal-overlay');const ta=document.getElementById('json-modal-text');document.getElementById('json-modal-title').textContent=title;ta.value=text||'';ta.readOnly=mode!=='import';document.getElementById('json-apply-btn').style.display=mode==='import'?'inline-flex':'none';document.getElementById('json-copy-btn').style.display='inline-flex';ov.classList.add('open');setTimeout(()=>ta.focus(),30);}

function copyJsonModalText(){
  const ta=document.getElementById('json-modal-text');
  if(!ta)return;
  const text=ta.value;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>showToast('복사됨')).catch(()=>{ta.select();document.execCommand('copy');showToast('복사됨');});
  } else {
    ta.select();document.execCommand('copy');showToast('복사됨');
  }
}
function applySampleJsonImport(){const m=getSelMenu();if(!m)return;const raw=document.getElementById('json-modal-text').value.trim();try{const parsed=raw?JSON.parse(raw):[];if(!Array.isArray(parsed))throw new Error('JSON 배열이어야 합니다.');setSampleRows(m,parsed);closeJsonModal();renderRightOnly();renderCenter();}catch(err){alert('JSON 형식이 올바르지 않습니다.\n'+err.message);}}

function togglePanel(id,hd){

function updatePageSizeOptions(v){
  const m=getSelMenu();if(!m)return;
  const arr=String(v).split(',').map(x=>parseInt(String(x).trim(),10)).filter(n=>!isNaN(n)&&n>0);
  const opts=arr.length?[...new Set(arr)]:[10,20,50];
  const prev=m.pagination||{show:true,pageSize:10,pageSizeOptions:[10,20,50]};

function toggleOutputState(id,checked){
  const current=Array.isArray(S.ix.outputStates)?S.ix.outputStates:[];
  if(checked){
    S.ix.outputStates=current.includes(id)?current:[...current,id];
  }else{
    S.ix.outputStates=current.filter(x=>x!==id);
  }
  regenPrompt();
  renderRightOnly();
  if(S.mainTab==='prompt') renderMainContent();
}

function loadGoogleFont(name){
  const allGoog=[...KR_GG,...EN_GG];
  if(!allGoog.includes(name))return;
  const id='gf-'+name.replace(/\s/g,'_');
  if(document.getElementById(id))return;
  const link=document.createElement('link');
  link.id=id;link.rel='stylesheet';
  const isKr=KR_GG.includes(name);
  const query=name.replace(/\s/g,'+')+(isKr?':wght@400;700':':wght@400;500;600;700');
  link.href='https://fonts.googleapis.com/css2?family='+query+'&display=swap';
  document.head.appendChild(link);
}
function setFontFamily(v){S.style.fontFamily=v;loadGoogleFont(v);renderAll();}

function applyPreset(name){
  const p=LPRESETS[name];if(!p)return;
  ["inputHeight","buttonHeight","fontSize","gridRowHeight","gridHeaderHeight","fieldGap","groupGap","sectionPadding"].forEach(k=>{if(p[k])S.style[k]=p[k];});
  ["gnbHeight","subHeaderHeight","tabBarHeight","sidebarWidth"].forEach(k=>{if(p[k])S.layout[k]=p[k];});
  renderAll();
}

function renderStateCard(st){
  const menu=getSelMenu(),s=S.style;
  const ih=parseInt(s.inputHeight)||30,br=parseInt(s.borderRadius)||4,bh=parseInt(s.buttonHeight)||30,btnR=parseInt(s.buttonRadius)||4,fs=parseInt(s.fontSize)||13;

    var base='height:'+bh+'px;padding:0 16px;font-size:'+fs+'px;cursor:pointer;border-radius:'+btnR+'px;font-family:'+font+';';
    if(type==='solid'){
      if(st.id==='hover')return base+'background:'+(s.btnSolidHoverBg||s.primaryColor)+';color:'+(s.btnSolidColor||'#fff')+';border:none;';
      if(st.id==='click')return base+'background:'+(s.btnSolidActiveBg||s.primaryColor)+';color:'+(s.btnSolidColor||'#fff')+';border:none;transform:scale(0.97);';
      if(st.id==='disabled')return base+'background:'+(s.btnSolidDisabledBg||'#b0bec5')+';color:'+(s.btnSolidColor||'#fff')+';border:none;cursor:not-allowed;opacity:.6;';
      return base+'background:'+s.primaryColor+';color:#fff;border:none;';
    }else{
      if(st.id==='hover')return base+'background:'+(s.rowHoverBg||'#f0f4ff')+';color:'+s.lineColor+';border:1px solid '+s.lineColor+';';
      if(st.id==='click')return base+'background:#dde8ff;color:'+s.lineColor+';border:1px solid '+s.lineColor+';transform:scale(0.97);';
      if(st.id==='disabled')return base+'background:#f5f5f5;color:#bbb;border:1px solid #ddd;cursor:not-allowed;';
      return base+'background:#fff;color:'+s.lineColor+';border:1px solid '+s.lineColor+';';
    }
  }
  function getInputStyle(){
    const base=`height:${ih}px;border-radius:${br}px;font-size:${fs}px;padding:0 8px;box-sizing:border-box;background:#fff;outline:none;width:100%;`;
    if(st.id==="focus")return base+`border:2px solid ${s.fieldFocusBorder};box-shadow:0 0 0 3px rgba(22,89,197,.12);`;if(st.id==="error")return base+`border:1px solid ${s.fieldErrorBorder};background:#fff8f8;`;if(st.id==="disabled")return base+`background:#f5f5f5;color:#aaa;cursor:not-allowed;border:1px solid #ddd;`;if(st.id==="hover")return base+`border:1px solid #999;`;return base+`border:1px solid ${s.borderColor};`;
  }
  const visGrid=(menu?.grid||[]).filter(c=>!c.hidden).slice(0,3);
  const sampleRows=getSampleRows(menu).slice(0,3);
  return`<div class="state-card"><div class="state-card-hd" style="background:${st.color};display:flex;align-items:center;justify-content:space-between;"><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:12px;font-weight:700;color:#fff;">${st.label}</span><span style="font-size:10px;color:rgba(255,255,255,.7);">${st.id.toUpperCase()}</span></div><button onclick="copyStatePrompt('${st.id}')" style="height:22px;padding:0 8px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);color:#fff;border-radius:3px;cursor:pointer;font-size:10px;font-weight:600;flex-shrink:0;" title="이 상태 프롬프트만 복사">📋 복사</button></div>
    <div class="state-card-body" style="font-family:${font};">
      <div class="state-card-section"><div class="state-card-label">BUTTON</div><div style="display:flex;gap:8px;flex-wrap:wrap;">${btns.map(b=>`<button style="${getBtnStyle(b.type)}" ${st.id==="disabled"?"disabled":""}>${escHtml(b.label)}</button>`).join("")}</div></div>
      <div class="state-card-section"><div class="state-card-label">INPUT</div><input style="${getInputStyle()}" placeholder="${st.id==="error"?"필수 항목입니다":st.id==="focus"?"입력 중...":"검색어 입력"}" ${st.id==="disabled"?"disabled":""} readonly>
        ${st.id==="error"?`<div style="font-size:10px;color:${s.fieldErrorBorder};margin-top:3px;">⚠ 필수 항목을 입력해 주세요.</div>`:""}
        ${st.id==="focus"?`<div style="font-size:10px;color:${s.fieldFocusBorder};margin-top:3px;">포커스 상태</div>`:""}
      </div>
      ${visGrid.length>0?`<div class="state-card-section"><div class="state-card-label">GRID ROW</div><div style="border:1px solid ${s.gridBorderColor};border-radius:2px;overflow:hidden;"><div style="background:${s.gridHeaderBg};display:flex;">${visGrid.map((col,ci)=>`<div style="flex:1;padding:5px 8px;color:${s.gridHeaderColor};font-size:10px;font-weight:600;text-align:${col.align};border-right:${ci<visGrid.length-1?"1px solid rgba(255,255,255,.1)":"none"};overflow:hidden;white-space:nowrap;">${escHtml(col.name)}</div>`).join("")}</div>${sampleRows.map((row,ri)=>`<div style="display:flex;background:${(st.id==="hover"&&ri===1)?s.rowHoverBg:(st.id==="click"&&ri===1)?"#c8d8f8":ri%2===0?s.gridRowOdd:s.gridRowEven};">${visGrid.map((col,ci)=>`<div style="flex:1;padding:5px 8px;font-size:10px;text-align:${col.align};border-right:${ci<visGrid.length-1?"1px solid "+s.gridBorderColor:"none"};border-bottom:1px solid ${s.gridBorderColor};overflow:hidden;white-space:nowrap;">${getCellDisplayValue(row,col,ri)}</div>`).join("")}</div>`).join("")}</div></div>`:""}
    </div>
  </div>`;
}
