function openFigmaModal(){
  const ov=document.getElementById('figma-modal-overlay');
  ov.style.display='flex';
  // restore saved token
  const savedToken=localStorage.getItem('figma_token_v25');
  if(savedToken){const ti=document.getElementById('figma-token-input');if(ti)ti.value=savedToken;}
  const statusEl=document.getElementById('figma-status');
  if(statusEl){statusEl.style.display='none';statusEl.textContent='';}
}
function closeFigmaModal(){document.getElementById('figma-modal-overlay').style.display='none';}
async function runFigmaAnalyze(){
  const tokenEl=document.getElementById('figma-token-input');
  const urlEl=document.getElementById('figma-url-input');
  const statusEl=document.getElementById('figma-status');
  const btn=document.getElementById('figma-analyze-btn');
  if(!tokenEl||!urlEl||!statusEl)return;
  const token=tokenEl.value.trim();
  const url=urlEl.value.trim();
  statusEl.style.display='block';
  if(!token){statusEl.textContent='⚠ Figma 토큰을 입력해 주세요.';statusEl.style.color='#e53935';return;}
  // save token if checkbox checked
  if(document.getElementById('figma-token-save')?.checked) localStorage.setItem('figma_token_v25',token);
  if(!url){statusEl.textContent='⚠ Figma 링크를 입력해 주세요.';statusEl.style.color='#e53935';return;}
  // Extract file key from URL
  let fileKey='';
  const fkMatch=url.match(/figma\.com\/(?:file|design)\/([A-Za-z0-9]+)/);
  if(fkMatch)fileKey=fkMatch[1];
  else if(/^[A-Za-z0-9]{10,}$/.test(url))fileKey=url;
  else{statusEl.textContent='⚠ Figma URL에서 파일 키를 찾을 수 없습니다.';statusEl.style.color='#e53935';return;}
  btn.disabled=true;btn.textContent='분석 중...';
  statusEl.style.color='#555';statusEl.textContent='파일 정보를 가져오는 중...';
  try{
    // Fetch file metadata
    const resp=await fetch(`https://api.figma.com/v1/files/${fileKey}?depth=1`,{headers:{'X-Figma-Token':token}});
    if(!resp.ok){throw new Error(`Figma API 오류: ${resp.status} ${resp.statusText}`);}
    const data=await resp.json();
    const docName=data.name||'Unknown';
    statusEl.textContent=`파일: ${docName} — 스타일 분석 중...`;
    // Fetch styles
    const stylesResp=await fetch(`https://api.figma.com/v1/files/${fileKey}/styles`,{headers:{'X-Figma-Token':token}});
    const stylesData=stylesResp.ok?await stylesResp.json():null;
    // Extract colors from styles
    const colorStyles=(stylesData?.meta?.styles||[]).filter(s=>s.style_type==='FILL');
    statusEl.textContent=`색상 스타일 ${colorStyles.length}개 발견 — 노드 상세 분석 중...`;
    // Fetch first page nodes at depth=2 for color extraction
    const pages=data.document?.children||[];
    let primaryColor='',secondaryColor='',bgColor='',textColor='';
    if(pages.length>0){
      const firstPageId=pages[0].id;
      const nodesResp=await fetch(`https://api.figma.com/v1/files/${fileKey}/nodes?ids=${encodeURIComponent(firstPageId)}&depth=3`,{headers:{'X-Figma-Token':token}});
      if(nodesResp.ok){
        const nodesData=await nodesResp.json();
        const doc=nodesData.nodes[firstPageId]?.document;
        // Find GNB-like frame (header bar)
        const frames=(doc?.children||[]).filter(c=>c.type==='FRAME'||c.type==='GROUP');
        for(const f of frames){
          const bb=f.absoluteBoundingBox||{};
          if(!primaryColor&&bb.width>600&&bb.height>40&&bb.height<120&&f.fills?.length){
            const fill=f.fills[0];if(fill.type==='SOLID'&&fill.color){
              const {r,g,b}=fill.color;
              const hex='#'+[r,g,b].map(v=>Math.round(v*255).toString(16).padStart(2,'0')).join('').toUpperCase();
              primaryColor=hex;
            }
          }
        }
      }
    }
    // Check which scopes to apply
    const scopeChecks=document.querySelectorAll('.figma-scope');
    const scopes=new Set([...scopeChecks].filter(c=>c.checked).map(c=>c.value));
    const applyStyle=scopes.has('style');
    const applyLayout=scopes.has('layout');
    const applyLogin=scopes.has('login');
    const applied=[];
    if(primaryColor&&applyStyle){
      S.style.primaryColor=primaryColor;S.style.lineColor=primaryColor;
      S.style.gridHeaderBg=primaryColor;S.layout.gnbBg=primaryColor;S.layout.gnbLogoColor=primaryColor;
      applied.push(`기본 색상 → ${primaryColor}`);
    }
    if(applyStyle&&primaryColor){S.style.fontFamily='Inter';applied.push('폰트 → Inter');}
    if(applyLogin&&primaryColor){S.login.loginBtnBg=primaryColor;S.login.bgColor='#F2F8F1';applied.push('로그인 버튼 색 반영');}
    const summary=applied.length?applied.join(' / '):'변경된 값 없음';
    statusEl.innerHTML=`<span style="color:#2e7d32;">✓ 완료!</span> ${escHtml(summary)}`;
    setTimeout(()=>{closeFigmaModal();renderAll();showToast('🎨 Figma 스타일이 적용되었습니다');},1500);
  }catch(e){
    statusEl.textContent='⚠ '+e.message;statusEl.style.color='#e53935';
  }finally{
    btn.disabled=false;btn.textContent='🔍 분석 시작';
  }
}

function auditEditorHandlers(){
  const missing=[];
  document.querySelectorAll('[onclick],[onchange],[oninput]').forEach(el=>{
    for(const attr of ['onclick','onchange','oninput']){
      const code=el.getAttribute(attr);
      if(!code) continue;
      const m=code.match(/^\s*([A-Za-z_][A-Za-z0-9_]*)\s*\(/);
      if(m && typeof window[m[1]]!=='function' && !['alert','confirm','parseInt'].includes(m[1])) missing.push(m[1]);
    }
  });
  return [...new Set(missing)];
}

}

const _PROMPT_TOKEN_MAP={
  // style
  'primaryColor':{o:'style',k:'primaryColor'},
  'Primary':{o:'style',k:'primaryColor'},
  'btnSolidBg':{o:'style',k:'btnSolidBg'},
  'btnSolidColor':{o:'style',k:'btnSolidColor'},

function parsePromptTokens(text){
  const patch={style:{},layout:{}};
  // "  key     value" 또는 "  key: value" 또는 "  key = value" 형식
  const re=/^\s{1,6}([A-Za-z][A-Za-z0-9_/]+)\s*[=:]\s*(.+)$/gm;
  let m;
  while((m=re.exec(text))!==null){
    const label=m[1].trim();
    const raw=m[2].trim().split(/\s/)[0]; // 첫 토큰만
    const map=_PROMPT_TOKEN_MAP[label];
    if(!map)continue;
    let val=map.strip?raw.replace(new RegExp(map.strip+'$'),''):raw;
    if(map.o==='style')patch.style[map.k]=val;
    else patch.layout[map.k]=val;
  }
  // 공백 구분 형식 "  key          #hexvalue"
  const re2=/^\s{1,6}([A-Za-z][A-Za-z0-9_/]+)\s{2,}(#[0-9a-fA-F]{3,8}|\d+(?:px)?|[A-Za-z][\w\s,']+)$/gm;
  while((m=re2.exec(text))!==null){
    const label=m[1].trim();
    const raw=m[2].trim();
    const map=_PROMPT_TOKEN_MAP[label];
    if(!map)continue;
    let val=map.strip?raw.replace(new RegExp(map.strip+'$'),''):raw;
    if(map.o==='style')patch.style[map.k]=val;
    else patch.layout[map.k]=val;
  }
  return patch;
}

function finishEditMode(){
  const ta=document.getElementById('prompt-text');
  const edited=ta?ta.value:S.editedText;
  S.editedText=edited;
  // 원본과 비교해서 변경된 토큰 추출
  const orig=getActivePromptText();
  const origTokens=parsePromptTokens(orig);
  const editTokens=parsePromptTokens(edited);
  const patch={style:{},layout:{}};
  for(const[k,v] of Object.entries(editTokens.style)){if(v&&v!==origTokens.style[k])patch.style[k]=v;}
  for(const[k,v] of Object.entries(editTokens.layout)){if(v&&v!==origTokens.layout[k])patch.layout[k]=v;}
  const changed=applyCfgPatch(patch);
  S.editMode=false;
  if(changed.length){
    showToast('✓ 설정 반영: '+changed.join(', '));
    renderAll();
  } else {
    renderMainContent();
  }
}

function fallbackCopyText(text,onSuccess){
  const ta=document.createElement('textarea');
  ta.value=text;
  ta.setAttribute('readonly','');
  ta.style.position='fixed';
  ta.style.opacity='0';
  ta.style.left='-9999px';
  document.body.appendChild(ta);
  ta.select();
  try{
    const ok=document.execCommand('copy');
    if(ok&&typeof onSuccess==='function')onSuccess();
    else alert('복사에 실패했습니다. 텍스트를 수동으로 복사해 주세요.');
  }catch(e){
    alert('복사에 실패했습니다. 텍스트를 수동으로 복사해 주세요.');
  }finally{
    document.body.removeChild(ta);
  }
}

  const gfontUrl=`https://fonts.googleapis.com/css2?family=${encodeURIComponent(font)}:wght@400;500;600;700;900&display=swap`;
  const snap={_ver:EXPORT_VERSION,_date:new Date().toISOString(),layout:S.layout,style:S.style,ix:S.ix,home:S.home,login:JSON.parse(JSON.stringify(S.login)),tree:S.tree,promptMode:S.promptMode||'solo',promptTarget:S.promptTarget||'pencil'};

<!-- BRANCH_UI_STATE_B64:${stateB64}:END -->
</head>

</html>`;

function _applySnap(snap){
  if(!snap.layout&&!snap.style&&!snap.tree)throw new Error('Branch UI 내보내기 파일이 아닙니다.');
  if(!confirm('현재 설정을 가져온 파일로 덮어씁니다. 계속할까요?'))return false;
  if(snap.layout)Object.assign(S.layout,snap.layout);
  if(snap.style)Object.assign(S.style,snap.style);
  if(snap.ix)Object.assign(S.ix,snap.ix);
  if(snap.home)Object.assign(S.home,snap.home);
  if(snap.login)Object.assign(S.login,snap.login);
  if(Array.isArray(snap.tree))S.tree=snap.tree;
  if(snap.promptMode)S.promptMode=snap.promptMode;
  if(snap.promptTarget)S.promptTarget=snap.promptTarget;
  if(snap.promptContext!==undefined)S.promptContext=snap.promptContext;
  if(snap.selStates)S.selStates=snap.selStates;
  migrateLoginFormat();
  renderAll();
  return true;
}
function importAllJson(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json,application/json,.html,text/html';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const text=ev.target.result;
        let snap;
        if(file.name.endsWith('.html')||file.type==='text/html'){
          const m=text.match(/<!--\s*BRANCH_UI_STATE_B64:([\s\S]*?):END\s*-->/);
          if(!m)throw new Error('Branch UI에서 내보낸 HTML 파일이 아닙니다.\n(상태 정보가 포함되지 않은 HTML)');
          snap=JSON.parse(decodeURIComponent(escape(atob(m[1].trim()))));
        } else {
          snap=JSON.parse(text);
        }
        if(_applySnap(snap))showToast('📥 가져오기 완료');
      }catch(err){alert('파일 오류: '+err.message);}
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input);input.click();document.body.removeChild(input);
}

const THEME_STORAGE='branch_ui_themes_v24';
function getSavedThemes(){try{return JSON.parse(localStorage.getItem(THEME_STORAGE)||'{}');}catch{return {};}}
function saveTheme(){
  const name=prompt('테마 이름을 입력하세요:','');
  if(!name||!name.trim())return;
  const themes=getSavedThemes();
  themes[name.trim()]={layout:JSON.parse(JSON.stringify(S.layout)),style:JSON.parse(JSON.stringify(S.style))};
  localStorage.setItem(THEME_STORAGE,JSON.stringify(themes));
  showToast('💅 테마 "'+name.trim()+'"이 저장되었습니다');
  if(S.leftTab==='style'||S.leftTab==='layout')renderLeftContent();
}
function applyTheme(name){
  const themes=getSavedThemes();
  const t=themes[name];if(!t)return;
  if(!confirm('"'+name+'" 테마를 적용합니다. 현재 스타일이 변경됩니다.'))return;
  if(t.layout)Object.assign(S.layout,t.layout);
  if(t.style)Object.assign(S.style,t.style);
  renderAll();showToast('💅 테마 "'+name+'" 적용됨');
}
function deleteTheme(name){
  if(!confirm('"'+name+'" 테마를 삭제할까요?'))return;
  const themes=getSavedThemes();delete themes[name];
  localStorage.setItem(THEME_STORAGE,JSON.stringify(themes));
  if(S.leftTab==='style'||S.leftTab==='layout')renderLeftContent();
}

  loadAppState();
